<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .logo-wrap { width: 600px; height: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="logo-wrap">
  <svg viewBox="0 0 400 420" xmlns="http://www.w3.org/2000/svg" width="360" height="380">
    <!-- House -->
    <path d="M200 40 L60 160 L90 160 L90 310 L310 310 L310 160 L340 160 Z" fill="none" stroke="#2d6a4f" stroke-width="8" stroke-linejoin="round"/>
    <!-- Door -->
    <rect x="170" y="230" width="60" height="80" rx="4" fill="none" stroke="#2d6a4f" stroke-width="5"/>
    <circle cx="220" cy="275" r="4" fill="#2d6a4f"/>
    <!-- Window left -->
    <rect x="110" y="185" width="45" height="35" rx="3" fill="none" stroke="#2d6a4f" stroke-width="4"/>
    <line x1="132" y1="185" x2="132" y2="220" stroke="#2d6a4f" stroke-width="3"/>
    <!-- Window right -->
    <rect x="245" y="185" width="45" height="35" rx="3" fill="none" stroke="#2d6a4f" stroke-width="4"/>
    <line x1="267" y1="185" x2="267" y2="220" stroke="#2d6a4f" stroke-width="3"/>
    <!-- People inside house -->
    <!-- Person 1 (elderly woman with cane) -->
    <circle cx="160" cy="250" r="12" fill="none" stroke="#2d6a4f" stroke-width="3.5"/>
    <line x1="160" y1="262" x2="160" y2="295" stroke="#2d6a4f" stroke-width="3.5"/>
    <line x1="160" y1="275" x2="145" y2="285" stroke="#2d6a4f" stroke-width="3"/>
    <line x1="160" y1="275" x2="170" y2="260" stroke="#2d6a4f" stroke-width="3"/>
    <!-- Person 2 (caregiver) -->
    <circle cx="230" cy="250" r="12" fill="none" stroke="#2d6a4f" stroke-width="3.5"/>
    <line x1="230" y1="262" x2="230" y2="295" stroke="#2d6a4f" stroke-width="3.5"/>
    <line x1="230" y1="275" x2="245" y2="285" stroke="#2d6a4f" stroke-width="3"/>
    <line x1="230" y1="275" x2="215" y2="265" stroke="#2d6a4f" stroke-width="3"/>
    <!-- Hands connecting (care symbol) -->
    <path d="M170 260 Q195 250 215 265" fill="none" stroke="#d4a373" stroke-width="3" stroke-linecap="round"/>
    <!-- Heart above house -->
    <path d="M200 20 C200 12, 190 5, 183 12 C176 5, 166 12, 166 20 C166 30, 183 38, 200 48 C217 38, 234 30, 234 20 C234 12, 224 5, 217 12 C210 5, 200 12, 200 20 Z" fill="#d4a373" opacity="0.9"/>
    <!-- Small hearts from chimney -->
    <rect x="260" y="100" width="25" height="40" fill="#2d6a4f" rx="2"/>
    <path d="M272 88 C272 84, 267 81, 264 84 C261 81, 256 84, 256 88 C256 93, 264 97, 272 101 C280 97, 288 93, 288 88 C288 84, 283 81, 280 84 C277 81, 272 84, 272 88 Z" fill="#d4a373" opacity="0.7" transform="scale(0.5) translate(272, 140)"/>
    <path d="M282 75 C282 72, 278 69, 276 72 C274 69, 270 72, 270 75 C270 79, 276 82, 282 85 C288 82, 294 79, 294 75 C294 72, 290 69, 288 72 C286 69, 282 72, 282 75 Z" fill="#d4a373" opacity="0.5" transform="scale(0.4) translate(440, 130)"/>
    <!-- Text -->
    <text x="200" y="360" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="36" font-weight="700" fill="#2d6a4f" letter-spacing="3">HOGAR</text>
    <text x="200" y="400" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="30" font-weight="400" fill="#2d6a4f" letter-spacing="5">ANA GABRIEL</text>
    <!-- Subtle tagline -->
    <text x="200" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d4a373" letter-spacing="4">CUIDADO CON AMOR</text>
  </svg>
</div>
</body>
</html>
