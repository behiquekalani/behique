<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#000000"/>

  <!-- The Cemí Eye - Outline of three-pointed stone with oracle eye -->
  <!-- Same smooth cemi shape but as a thin white stroke outline -->
  <path d="
    M 35 115
    Q 42 85, 55 80
    Q 62 77, 65 90
    Q 68 100, 75 100
    Q 82 100, 90 70
    Q 95 45, 100 38
    Q 105 45, 110 70
    Q 118 100, 125 100
    Q 132 100, 135 90
    Q 138 77, 145 80
    Q 158 85, 165 115
    Q 165 125, 150 128
    Q 130 132, 100 132
    Q 70 132, 50 128
    Q 35 125, 35 115
    Z
  " fill="none" stroke="#FFFFFF" stroke-width="2"/>

  <!-- The Oracle's Eye - single gold circle centered in the cemi -->
  <circle cx="100" cy="98" r="8" fill="#C9A84C"/>

  <!-- BEHIKE wordmark -->
  <text x="100" y="165" text-anchor="middle" fill="#FFFFFF" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="16" letter-spacing="10">BEHIKE</text>
</svg>