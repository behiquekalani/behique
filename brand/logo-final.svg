<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Cemí node shape: a subtle three-pointed stone silhouette -->
    <symbol id="cemi-small" viewBox="0 0 16 18">
      <path d="M8 0 C8.8 0, 10 2, 11.5 5 C13 8, 14.5 9.5, 15.5 10.5 C16 11, 16 12, 15 13 C14 14, 12 14.5, 10.5 14 C9.5 13.7, 8.8 13, 8 14.5 C7.2 13, 6.5 13.7, 5.5 14 C4 14.5, 2 14, 1 13 C0 12, 0 11, 0.5 10.5 C1.5 9.5, 3 8, 4.5 5 C6 2, 7.2 0, 8 0Z" fill="currentColor"/>
    </symbol>
    <symbol id="cemi-large" viewBox="0 0 16 18">
      <path d="M8 0 C8.8 0, 10 2, 11.5 5 C13 8, 14.5 9.5, 15.5 10.5 C16 11, 16 12, 15 13 C14 14, 12 14.5, 10.5 14 C9.5 13.7, 8.8 13, 8 14.5 C7.2 13, 6.5 13.7, 5.5 14 C4 14.5, 2 14, 1 13 C0 12, 0 11, 0.5 10.5 C1.5 9.5, 3 8, 4.5 5 C6 2, 7.2 0, 8 0Z" fill="currentColor"/>
    </symbol>
  </defs>

  <!-- Black background -->
  <rect width="200" height="200" fill="#000000"/>

  <!-- Vertical axis line — organic ceiba trunk with faintest curve -->
  <path d="M100 42 C99.5 65, 100.5 100, 100 125 C99.6 140, 100.3 150, 100 158"
        stroke="#FFFFFF" stroke-width="1.2" fill="none" opacity="0.55" stroke-linecap="round"/>

  <!-- Top node — Sky world (Coaybay above) — white, small cemí -->
  <g transform="translate(92, 30)" color="#FFFFFF">
    <use href="#cemi-small" width="16" height="18"/>
  </g>

  <!-- Middle node — Living world (Coabey) — gold, larger cemí -->
  <g transform="translate(87.5, 88)" color="#C9A84C">
    <use href="#cemi-large" width="25" height="28"/>
  </g>

  <!-- Bottom node — Underworld (Coaybay below) — white, small cemí -->
  <g transform="translate(92, 152)" color="#FFFFFF">
    <use href="#cemi-small" width="16" height="18"/>
  </g>
</svg>