<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 80" width="500" height="80">
  <defs>
    <symbol id="cemi-h-sm" viewBox="0 0 16 18">
      <path d="M8 0 C8.8 0, 10 2, 11.5 5 C13 8, 14.5 9.5, 15.5 10.5 C16 11, 16 12, 15 13 C14 14, 12 14.5, 10.5 14 C9.5 13.7, 8.8 13, 8 14.5 C7.2 13, 6.5 13.7, 5.5 14 C4 14.5, 2 14, 1 13 C0 12, 0 11, 0.5 10.5 C1.5 9.5, 3 8, 4.5 5 C6 2, 7.2 0, 8 0Z" fill="currentColor"/>
    </symbol>
    <symbol id="cemi-h-lg" viewBox="0 0 16 18">
      <path d="M8 0 C8.8 0, 10 2, 11.5 5 C13 8, 14.5 9.5, 15.5 10.5 C16 11, 16 12, 15 13 C14 14, 12 14.5, 10.5 14 C9.5 13.7, 8.8 13, 8 14.5 C7.2 13, 6.5 13.7, 5.5 14 C4 14.5, 2 14, 1 13 C0 12, 0 11, 0.5 10.5 C1.5 9.5, 3 8, 4.5 5 C6 2, 7.2 0, 8 0Z" fill="currentColor"/>
    </symbol>
  </defs>

  <!-- Black background -->
  <rect width="500" height="80" fill="#000000"/>

  <!-- Symbol group — positioned on the left, scaled to fit 80px height -->
  <g transform="translate(30, 0)">
    <!-- Vertical axis line -->
    <path d="M20 10 C19.8 20, 20.2 30, 20 40 C19.8 50, 20.2 60, 20 70"
          stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.55" stroke-linecap="round"/>

    <!-- Top node -->
    <g transform="translate(14.5, 4)" color="#FFFFFF">
      <use href="#cemi-h-sm" width="11" height="12"/>
    </g>

    <!-- Middle node — gold -->
    <g transform="translate(12, 29)" color="#C9A84C">
      <use href="#cemi-h-lg" width="16" height="18"/>
    </g>

    <!-- Bottom node -->
    <g transform="translate(14.5, 62)" color="#FFFFFF">
      <use href="#cemi-h-sm" width="11" height="12"/>
    </g>
  </g>

  <!-- BEHIKE wordmark — to the right of symbol -->
  <text x="105" y="48" text-anchor="start"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="100" font-size="24" letter-spacing="12"
        fill="#FFFFFF" dominant-baseline="middle">BEHIKE</text>
</svg>