<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#000000"/>

  <!-- The Petroglyph - Minimalist Taíno face -->
  <!-- Circular face outline - thinner, more refined -->
  <circle cx="100" cy="80" r="42" fill="none" stroke="#C9A84C" stroke-width="2"/>

  <!-- Left eye - spiral dot (concentric rings like carved petroglyphs) -->
  <circle cx="84" cy="74" r="8" fill="#C9A84C"/>
  <circle cx="84" cy="74" r="5" fill="#000000"/>
  <circle cx="84" cy="74" r="2.5" fill="#C9A84C"/>

  <!-- Right eye - matching spiral dot -->
  <circle cx="116" cy="74" r="8" fill="#C9A84C"/>
  <circle cx="116" cy="74" r="5" fill="#000000"/>
  <circle cx="116" cy="74" r="2.5" fill="#C9A84C"/>

  <!-- Minimal mouth - short horizontal line -->
  <line x1="93" y1="97" x2="107" y2="97" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>

  <!-- BEHIKE wordmark -->
  <text x="100" y="155" text-anchor="middle" fill="#FFFFFF" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="16" letter-spacing="10">BEHIKE</text>
</svg>