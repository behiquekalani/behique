<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#000000"/>
  <!-- The Axis: vertical line with three nodes -->
  <g transform="translate(100,95)">
    <!-- Vertical line (axis) -->
    <line x1="0" y1="-52" x2="0" y2="52" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Top node - Sky (small) -->
    <circle cx="0" cy="-52" r="7" fill="#C9A84C"/>
    <!-- Middle node - Living world (larger, emphasized) -->
    <circle cx="0" cy="0" r="11" fill="#C9A84C"/>
    <!-- Bottom node - Underworld (small) -->
    <circle cx="0" cy="52" r="7" fill="#C9A84C"/>
  </g>
  <!-- Wordmark -->
  <text x="100" y="180" text-anchor="middle" fill="#C9A84C" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="16" letter-spacing="12">BEHIKE</text>
</svg>