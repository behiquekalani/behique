<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#000000"/>
  <!-- Three Worlds: three horizontal lines connected by vertical axis -->
  <g transform="translate(100,85)">
    <!-- Vertical axis (ceiba trunk) -->
    <line x1="0" y1="-45" x2="0" y2="45" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <!-- Top line - Sky world (shortest) -->
    <rect x="-18" y="-48" width="36" height="6" rx="3" fill="#FFFFFF"/>
    <!-- Middle line - Living world (medium, gold accent) -->
    <rect x="-30" y="-3" width="60" height="6" rx="3" fill="#C9A84C"/>
    <!-- Bottom line - Underworld (longest) -->
    <rect x="-42" y="42" width="84" height="6" rx="3" fill="#FFFFFF"/>
  </g>
  <!-- Wordmark -->
  <text x="100" y="175" text-anchor="middle" fill="#FFFFFF" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="16" letter-spacing="12">BEHIKE</text>
</svg>