<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#000000"/>
  <!-- The Ceiba Leaf: geometric leaf with veins that subtly form a "B" -->
  <g transform="translate(100,100)">
    <!-- Main leaf shape - pointed top, rounded sides -->
    <path d="M 0,-65 C 28,-55 42,-30 44,-5 C 46,20 38,45 25,60 C 15,70 5,75 0,78 C -5,75 -15,70 -25,60 C -38,45 -46,20 -44,-5 C -42,-30 -28,-55 0,-65 Z" fill="#C9A84C"/>
    <!-- Central vein -->
    <path d="M 0,-60 L 0,72" stroke="#000000" stroke-width="2.5" fill="none"/>
    <!-- Left veins forming the "B" back -->
    <path d="M 0,-40 L 0,55" stroke="#000000" stroke-width="2" fill="none"/>
    <!-- Upper B bump - left side veins curving right -->
    <path d="M 0,-35 C 18,-30 20,-15 0,-10" stroke="#000000" stroke-width="2" fill="none"/>
    <!-- Lower B bump - left side veins curving right -->
    <path d="M 0,-10 C 22,-5 24,20 0,28" stroke="#000000" stroke-width="2" fill="none"/>
    <!-- Subtle supporting veins -->
    <path d="M 0,-50 L -25,-30" stroke="#000000" stroke-width="1.2" fill="none"/>
    <path d="M 0,-25 L -30,-10" stroke="#000000" stroke-width="1.2" fill="none"/>
    <path d="M 0,5 L -32,15" stroke="#000000" stroke-width="1.2" fill="none"/>
    <path d="M 0,30 L -28,42" stroke="#000000" stroke-width="1.2" fill="none"/>
    <path d="M 0,50 L -18,58" stroke="#000000" stroke-width="1.2" fill="none"/>
  </g>
  <!-- Wordmark -->
  <text x="100" y="180" text-anchor="middle" fill="#C9A84C" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="16" letter-spacing="12">BEHIKE</text>
</svg>