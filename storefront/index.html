<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behike - Digital Tools for Builders</title>
<meta http-equiv="refresh" content="0;url=behike-store/index.html">
<link rel="canonical" href="https://behike.store">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--text:#F5F5F7;--dim:#86868B;--accent:#007AFF;--surface:#111;--border:#222;--radius:12px;--max:1080px}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:var(--max);margin:0 auto;padding:0 24px}

/* Nav */
nav{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
nav .wrap{display:flex;align-items:center;justify-content:space-between;height:56px}
nav .logo{font-size:18px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
nav .links{display:flex;gap:28px;font-size:14px}
nav .links a{color:var(--dim);transition:color .2s}
nav .links a:hover{color:var(--text);text-decoration:none}

/* Hero */
.hero{text-align:center;padding:120px 24px 80px}
.hero h1{font-size:clamp(36px,6vw,64px);font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:16px}
.hero p{font-size:20px;color:var(--dim);max-width:560px;margin:0 auto 40px}
.hero .cta{display:inline-block;background:var(--accent);color:#fff;padding:14px 32px;border-radius:980px;font-size:16px;font-weight:500;transition:opacity .2s}
.hero .cta:hover{opacity:.85;text-decoration:none}

/* Categories */
.cats{display:flex;justify-content:center;gap:12px;padding:0 24px 64px;flex-wrap:wrap}
.cats a{display:inline-block;padding:8px 20px;border:1px solid var(--border);border-radius:980px;font-size:14px;color:var(--dim);transition:all .2s}
.cats a:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}

/* Grid */
.section-title{font-size:28px;font-weight:600;letter-spacing:-.02em;margin-bottom:32px;padding:0 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;padding:0 24px 80px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;transition:border-color .2s}
.card:hover{border-color:#333}
.card .tag{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:12px}
.card h3{font-size:18px;font-weight:600;letter-spacing:-.01em;margin-bottom:8px}
.card .desc{font-size:14px;color:var(--dim);margin-bottom:20px;line-height:1.5}
.card .bottom{display:flex;align-items:center;justify-content:space-between}
.card .price{font-size:20px;font-weight:600}
.card .price.free{color:var(--accent)}
.card .btn{display:inline-block;padding:8px 20px;border:1px solid var(--border);border-radius:980px;font-size:13px;color:var(--text);transition:all .2s}
.card .btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}

/* Footer */
footer{border-top:1px solid var(--border);padding:48px 24px;text-align:center}
footer .brand{font-size:14px;font-weight:600;margin-bottom:8px}
footer .meta{font-size:13px;color:var(--dim)}
footer .meta a{color:var(--dim)}
footer .meta a:hover{color:var(--text)}

@media(max-width:600px){
  nav .links{gap:16px;font-size:13px}
  .hero{padding:80px 16px 48px}
  .grid{grid-template-columns:1fr;padding:0 16px 48px}
  .section-title{padding:0 16px}
  .cats{padding:0 16px 40px}
}
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <a href="index.html" class="logo">behike</a>
    <div class="links">
      <a href="products.html">Products</a>
      <a href="about.html">About</a>
    </div>
  </div>
</nav>

<section class="hero">
  <h1>Digital tools for builders.</h1>
  <p>Blueprints, guides, and systems for solopreneurs who build instead of wait. Made in Puerto Rico.</p>
  <a href="products.html" class="cta">Browse Products</a>
</section>

<div class="cats">
  <a href="products.html?cat=blueprint">Blueprints</a>
  <a href="products.html?cat=guide">Guides</a>
  <a href="products.html?cat=kit">Kits</a>
  <a href="products.html?cat=template">Templates</a>
  <a href="products.html?cat=free">Free Resources</a>
</div>

<div class="wrap">
  <h2 class="section-title">Featured</h2>
</div>
<div class="wrap">
  <div class="grid" id="featured"></div>
</div>

<footer>
  <div class="brand">behike.co</div>
  <div class="meta">
    Built in Puerto Rico
    &nbsp;&middot;&nbsp;
    <a href="about.html">About</a>
    &nbsp;&middot;&nbsp;
    <a href="products.html">All Products</a>
  </div>
</footer>

<script>
const featured = [
  {id:"ai-automation-blueprint",title:"AI Automation Blueprint",price:24,category:"blueprint",description:"Step-by-step system for automating your business with AI tools and workflows."},
  {id:"creators-first-10k-blueprint",title:"Creator's First $10K Blueprint",price:10,category:"blueprint",description:"The exact path from zero to your first $10K as a digital creator."},
  {id:"solopreneur-os",title:"Solopreneur OS",price:29,category:"kit",description:"Your entire operation in one tab. Dashboard, workflows, tracking."},
  {id:"content-empire-kit",title:"The Content Machine",price:99,category:"kit",description:"Complete content production system. Templates, workflows, automation."},
  {id:"behike-method-v2",title:"The Behike Method v2",price:19,category:"guide",description:"Our signature framework for building a digital business from scratch."},
  {id:"zero-to-1k-roadmap",title:"$0 to $1K Roadmap",price:0,category:"free",description:"Free roadmap from zero to your first $1,000 in digital product sales."}
];
const grid = document.getElementById('featured');
featured.forEach(p => {
  const priceText = p.price === 0 ? 'Free' : '$' + p.price;
  const priceClass = p.price === 0 ? 'price free' : 'price';
  grid.innerHTML += `
    <div class="card">
      <div class="tag">${p.category}</div>
      <h3>${p.title}</h3>
      <div class="desc">${p.description}</div>
      <div class="bottom">
        <span class="${priceClass}">${priceText}</span>
        <a href="products.html?id=${p.id}" class="btn">View</a>
      </div>
    </div>`;
});
</script>
</body>
</html>
