<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus DJ - Adaptive Ambient Music</title>
<meta name="description" content="AI DJ that learns what keeps you focused. Generates ambient music in real-time. Adapts to your work patterns.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0D1B2A;--surface:#1B2838;--card:#243447;--border:#2a3f55;--text:#CAF0F8;--dim:#8BA4B8;--accent:#00B4D8;--font:'Inter',-apple-system,sans-serif}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
.app{display:grid;grid-template-columns:1fr 260px;grid-template-rows:48px 1fr 60px;height:100vh}
.topbar{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px}
.topbar .logo{font-size:14px;font-weight:600;letter-spacing:0.1em}.topbar .logo span{color:var(--accent)}
.mode-pills{display:flex;gap:4px;margin-left:auto}
.mode-pill{padding:6px 14px;border:1px solid var(--border);border-radius:16px;font-size:10px;color:var(--dim);cursor:pointer;background:transparent;font-family:var(--font);transition:all .2s}
.mode-pill:hover{border-color:var(--accent)}.mode-pill.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.main{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
canvas#viz{position:absolute;inset:0;width:100%;height:100%}
.center-info{position:relative;z-index:1;text-align:center}
.center-info .timer{font-size:64px;font-weight:200;letter-spacing:0.05em;font-variant-numeric:tabular-nums;margin-bottom:8px}
.center-info .state{font-size:12px;letter-spacing:0.2em;color:var(--dim);text-transform:uppercase}
.center-info .genre{font-size:11px;color:var(--accent);margin-top:12px;letter-spacing:0.1em}
.center-info .bpm-display{font-size:10px;color:var(--dim);margin-top:4px}
.sidebar{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sb-section{padding:16px;border-bottom:1px solid var(--border)}
.sb-section h3{font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:var(--dim);font-weight:600;margin-bottom:12px}
.genre-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.g-btn{padding:8px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:10px;text-align:center;cursor:pointer;color:var(--text);font-family:var(--font);transition:all .2s}
.g-btn:hover{border-color:var(--accent)}.g-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.slider-row label{font-size:10px;color:var(--dim);width:50px}
.slider-row input{flex:1;-webkit-appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none}
.slider-row input::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}
.slider-row .val{font-size:10px;color:var(--accent);width:30px;text-align:right;font-variant-numeric:tabular-nums}
.session-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--dim)}
.session-item .dur{color:var(--accent)}
.insight{background:var(--card);border-radius:8px;padding:10px;margin-bottom:6px;font-size:10px;color:var(--dim);line-height:1.4}
.insight .highlight{color:var(--accent);font-weight:600}
.bottombar{grid-column:1/-1;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:20px;padding:0 20px}
.play-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--accent);background:transparent;color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.play-btn:hover{background:rgba(0,180,216,0.1)}
.vol-slider{-webkit-appearance:none;width:80px;height:3px;background:var(--border);border-radius:2px}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}
.bottom-info{font-size:10px;color:var(--dim);margin-left:auto}
@media(max-width:768px){.app{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo"><span>Focus</span>DJ</div>
    <div class="mode-pills">
      <button class="mode-pill active" data-mode="focus">Focus</button>
      <button class="mode-pill" data-mode="break">Break</button>
      <button class="mode-pill" data-mode="sleep">Sleep</button>
      <button class="mode-pill" data-mode="create">Create</button>
    </div>
  </div>
  <div class="main">
    <canvas id="viz"></canvas>
    <div class="center-info">
      <div class="timer" id="timer">25:00</div>
      <div class="state" id="state">Ready</div>
      <div class="genre" id="genre-display">Lo-Fi + Binaural 40Hz</div>
      <div class="bpm-display" id="bpm-display">72 BPM</div>
    </div>
  </div>
  <div class="sidebar">
    <div class="sb-section"><h3>Genre</h3><div class="genre-grid" id="genres"><div class="g-btn active" data-genre="lofi">Lo-Fi</div><div class="g-btn" data-genre="ambient">Ambient</div><div class="g-btn" data-genre="jazz">Jazz</div><div class="g-btn" data-genre="nature">Nature</div><div class="g-btn" data-genre="electronic">Electronic</div><div class="g-btn" data-genre="classical">Classical</div></div></div>
    <div class="sb-section"><h3>Sound</h3><div class="slider-row"><label>BPM</label><input type="range" id="bpm" min="40" max="140" value="72"><div class="val" id="bpm-val">72</div></div><div class="slider-row"><label>Rain</label><input type="range" id="rain" min="0" max="100" value="30"><div class="val" id="rain-val">30</div></div><div class="slider-row"><label>Binaural</label><input type="range" id="binaural" min="0" max="100" value="20"><div class="val" id="bin-val">20</div></div><div class="slider-row"><label>Reverb</label><input type="range" id="reverb" min="0" max="100" value="40"><div class="val" id="rev-val">40</div></div></div>
    <div class="sb-section"><h3>Timer</h3><div class="genre-grid" style="grid-template-columns:repeat(4,1fr)"><div class="g-btn" data-min="15">15m</div><div class="g-btn active" data-min="25">25m</div><div class="g-btn" data-min="45">45m</div><div class="g-btn" data-min="90">90m</div></div></div>
    <div class="sb-section"><h3>Insights</h3><div id="insights"><div class="insight">Start a session to begin tracking. <span class="highlight">Focus DJ learns what keeps you focused.</span></div></div></div>
    <div class="sb-section"><h3>Recent Sessions</h3><div id="history"></div></div>
  </div>
  <div class="bottombar"><button class="play-btn" id="play-btn">&#9654;</button><input type="range" class="vol-slider" id="volume" min="0" max="100" value="50"><div class="bottom-info" id="session-info">Session: 00:00</div></div>
</div>
<script>
(function(){
'use strict';
var audioCtx=null,masterGain=null,sources={};
var currentMode='focus',currentGenre='lofi',bpm=72,timerMin=25;
var running=false,timerSec=0,sessionStart=null;
var MODES={focus:{genre:'lofi',bpm:72,rain:30,binaural:20,reverb:40},break:{genre:'nature',bpm:60,rain:50,binaural:0,reverb:60},sleep:{genre:'ambient',bpm:50,rain:60,binaural:10,reverb:80},create:{genre:'jazz',bpm:85,rain:10,binaural:15,reverb:30}};
var CHORDS={lofi:[220,277,330,392],ambient:[196,247,294,370],jazz:[261,329,392,466],nature:[174,220,261,329],electronic:[293,349,440,523],classical:[261,329,392,523]};

function initAudio(){
  if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=0.3;masterGain.connect(audioCtx.destination);
  var N=audioCtx.sampleRate*2,buf=audioCtx.createBuffer(1,N,audioCtx.sampleRate),d=buf.getChannelData(0),b0=0;
  for(var i=0;i<N;i++){var w=Math.random()*2-1;d[i]=(b0+0.02*w)/1.02;b0=d[i];d[i]*=3.5}
  var rs=audioCtx.createBufferSource();rs.buffer=buf;rs.loop=true;var rg=audioCtx.createGain();rg.gain.value=0.15;rs.connect(rg);rg.connect(masterGain);rs.start();sources.rain={gain:rg};
  var oL=audioCtx.createOscillator(),oR=audioCtx.createOscillator(),mg=audioCtx.createChannelMerger(2),bg=audioCtx.createGain();bg.gain.value=0.05;oL.frequency.value=200;oR.frequency.value=240;oL.type='sine';oR.type='sine';
  var gL=audioCtx.createGain(),gR=audioCtx.createGain();gL.gain.value=0.3;gR.gain.value=0.3;oL.connect(gL);oR.connect(gR);gL.connect(mg,0,0);gR.connect(mg,0,1);mg.connect(bg);bg.connect(masterGain);oL.start();oR.start();sources.binaural={gain:bg};
  var cg=audioCtx.createGain();cg.gain.value=0;cg.connect(masterGain);sources.chord={gain:cg,oscs:[]};playChord();
}
function playChord(){
  if(!audioCtx)return;sources.chord.oscs.forEach(function(o){try{o.stop()}catch(e){}});sources.chord.oscs=[];
  var freqs=CHORDS[currentGenre]||CHORDS.lofi;
  freqs.forEach(function(f){var o=audioCtx.createOscillator();o.type='sine';o.frequency.value=f;var g=audioCtx.createGain();g.gain.value=0.03;o.connect(g);g.connect(sources.chord.gain);o.start();sources.chord.oscs.push(o)});
  sources.chord.gain.gain.setTargetAtTime(0.08,audioCtx.currentTime,0.5);
  if(running)setTimeout(function(){sources.chord.gain.gain.setTargetAtTime(0,audioCtx.currentTime,0.3);setTimeout(playChord,500)},(60/bpm)*4*1000);
}
function updateSliders(p){
  document.getElementById('bpm').value=p.bpm;document.getElementById('bpm-val').textContent=p.bpm;bpm=p.bpm;
  document.getElementById('rain').value=p.rain;document.getElementById('rain-val').textContent=p.rain;
  document.getElementById('binaural').value=p.binaural;document.getElementById('bin-val').textContent=p.binaural;
  document.getElementById('reverb').value=p.reverb;document.getElementById('rev-val').textContent=p.reverb;
  if(sources.rain&&audioCtx)sources.rain.gain.gain.setTargetAtTime(p.rain/100*0.3,audioCtx.currentTime,0.3);
  if(sources.binaural&&audioCtx)sources.binaural.gain.gain.setTargetAtTime(p.binaural/100*0.15,audioCtx.currentTime,0.3);
  document.getElementById('bpm-display').textContent=p.bpm+' BPM';
}
document.querySelectorAll('.mode-pill').forEach(function(p){p.addEventListener('click',function(){
  document.querySelectorAll('.mode-pill').forEach(function(b){b.classList.remove('active')});p.classList.add('active');
  currentMode=p.dataset.mode;var pr=MODES[currentMode];currentGenre=pr.genre;
  document.querySelectorAll('.g-btn[data-genre]').forEach(function(b){b.classList.toggle('active',b.dataset.genre===currentGenre)});
  updateSliders(pr);document.getElementById('genre-display').textContent=currentGenre.charAt(0).toUpperCase()+currentGenre.slice(1)+(pr.binaural>0?' + Binaural':'');
  if(running)playChord();
})});
document.getElementById('genres').addEventListener('click',function(e){var b=e.target.closest('.g-btn');if(!b||!b.dataset.genre)return;
  document.querySelectorAll('.g-btn[data-genre]').forEach(function(x){x.classList.remove('active')});b.classList.add('active');
  currentGenre=b.dataset.genre;document.getElementById('genre-display').textContent=currentGenre.charAt(0).toUpperCase()+currentGenre.slice(1);if(running)playChord();
});
['bpm','rain','binaural','reverb'].forEach(function(id){document.getElementById(id).addEventListener('input',function(){
  var v=parseInt(this.value);document.getElementById(id==='binaural'?'bin-val':id==='reverb'?'rev-val':id+'-val').textContent=v;
  if(id==='bpm'){bpm=v;document.getElementById('bpm-display').textContent=v+' BPM'}
  if(id==='rain'&&sources.rain&&audioCtx)sources.rain.gain.gain.setTargetAtTime(v/100*0.3,audioCtx.currentTime,0.1);
  if(id==='binaural'&&sources.binaural&&audioCtx)sources.binaural.gain.gain.setTargetAtTime(v/100*0.15,audioCtx.currentTime,0.1);
})});
document.querySelectorAll('.g-btn[data-min]').forEach(function(b){b.addEventListener('click',function(){
  document.querySelectorAll('.g-btn[data-min]').forEach(function(x){x.classList.remove('active')});b.classList.add('active');
  timerMin=parseInt(b.dataset.min);timerSec=timerMin*60;document.getElementById('timer').textContent=fmtTime(timerSec);
})});
document.getElementById('volume').addEventListener('input',function(){if(masterGain)masterGain.gain.setTargetAtTime(this.value/100*0.5,audioCtx.currentTime,0.1)});
function fmtTime(s){var m=Math.floor(s/60),sec=s%60;return(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec}
var timerInt=null;
function start(){initAudio();running=true;sessionStart=Date.now();timerSec=timerMin*60;document.getElementById('play-btn').innerHTML='&#10074;&#10074;';document.getElementById('state').textContent='FOCUSING';playChord();
  timerInt=setInterval(function(){timerSec--;document.getElementById('timer').textContent=fmtTime(timerSec);var e=Math.floor((Date.now()-sessionStart)/1000);document.getElementById('session-info').textContent='Session: '+fmtTime(e);if(timerSec<=0)complete()},1000)}
function stop(){running=false;clearInterval(timerInt);document.getElementById('play-btn').innerHTML='&#9654;';document.getElementById('state').textContent='PAUSED';if(sessionStart){saveSession(Math.floor((Date.now()-sessionStart)/60000));sessionStart=null}}
function complete(){stop();document.getElementById('state').textContent='COMPLETE';if(audioCtx){var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=528;o.type='sine';g.gain.value=0.1;o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+2);o.stop(audioCtx.currentTime+2)}}
document.getElementById('play-btn').addEventListener('click',function(){running?stop():start()});
function saveSession(min){if(min<1)return;var ss=JSON.parse(localStorage.getItem('focusdj-sessions')||'[]');ss.push({date:new Date().toISOString(),minutes:min,genre:currentGenre,mode:currentMode,bpm:bpm});if(ss.length>100)ss=ss.slice(-100);localStorage.setItem('focusdj-sessions',JSON.stringify(ss));renderHistory();analyzePatterns(ss)}
function renderHistory(){var ss=JSON.parse(localStorage.getItem('focusdj-sessions')||'[]'),html='';ss.slice(-5).reverse().forEach(function(s){var d=new Date(s.date);html+='<div class="session-item"><span>'+d.toLocaleDateString()+' '+s.genre+' '+s.bpm+'bpm</span><span class="dur">'+s.minutes+'m</span></div>'});document.getElementById('history').innerHTML=html||'<div style="font-size:10px;color:var(--dim)">No sessions yet</div>'}
function analyzePatterns(ss){if(ss.length<3)return;var gt={},ba={};ss.forEach(function(s){gt[s.genre]=(gt[s.genre]||0)+s.minutes;if(!ba[s.genre])ba[s.genre]={total:0,count:0,maxMin:0,bestBpm:0};ba[s.genre].total+=s.bpm;ba[s.genre].count++;if(s.minutes>ba[s.genre].maxMin){ba[s.genre].maxMin=s.minutes;ba[s.genre].bestBpm=s.bpm}});
  var best=Object.keys(gt).sort(function(a,b){return gt[b]-gt[a]})[0];
  var html='<div class="insight">Most productive: <span class="highlight">'+best+'</span> ('+gt[best]+' min total)</div>';
  if(ba[best])html+='<div class="insight">Best BPM: <span class="highlight">'+ba[best].bestBpm+'</span> (longest: '+ba[best].maxMin+'m)</div>';
  html+='<div class="insight">Total sessions: <span class="highlight">'+ss.length+'</span></div>';
  document.getElementById('insights').innerHTML=html}
var cvs=document.getElementById('viz'),ctx=cvs.getContext('2d');
function resize(){cvs.width=cvs.offsetWidth;cvs.height=cvs.offsetHeight}resize();window.addEventListener('resize',resize);
var vizPhase=0;
function drawViz(){ctx.clearRect(0,0,cvs.width,cvs.height);var cx=cvs.width/2,cy=cvs.height/2;if(running)vizPhase+=0.005;
  for(var r=0;r<5;r++){var rad=60+r*40+Math.sin(vizPhase+r*0.5)*10;ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.strokeStyle='rgba(0,180,216,'+(0.08-r*0.015)+')';ctx.lineWidth=1;ctx.stroke()}
  if(running){for(var i=0;i<32;i++){var a=(i/32)*Math.PI*2,h=20+Math.sin(vizPhase*2+i*0.3)*15+Math.random()*5;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*100,cy+Math.sin(a)*100);ctx.lineTo(cx+Math.cos(a)*(100+h),cy+Math.sin(a)*(100+h));ctx.strokeStyle='rgba(0,180,216,0.3)';ctx.lineWidth=2;ctx.stroke()}}
  requestAnimationFrame(drawViz)}drawViz();renderHistory();
var ex=JSON.parse(localStorage.getItem('focusdj-sessions')||'[]');if(ex.length>0)analyzePatterns(ex);
})();
</script>
</body>
</html>
