<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - Behike</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a,#1a0a2e,#0a0a0a);font-family:'Inter',sans-serif;color:#fff;overflow:hidden}
.confetti{position:fixed;top:-10px;width:10px;height:10px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:0}
@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
.card{position:relative;z-index:1;background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3rem 2.5rem;max-width:500px;width:90%;text-align:center}
.check{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#d4af37,#b8942e);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2rem;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
h1{font-family:'Orbitron',sans-serif;font-size:1.5rem;margin-bottom:.5rem;color:#d4af37}
.msg{color:rgba(255,255,255,.65);font-size:.9rem;margin-bottom:2rem;line-height:1.6}
.ref-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:1.2rem;margin-bottom:1.5rem}
.ref-box p{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:.6rem}
.ref-box .deal{font-size:.95rem;color:#d4af37;font-weight:600;margin-bottom:.8rem}
.ref-link{display:flex;gap:.5rem}
.ref-link input{flex:1;padding:.6rem .8rem;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.05);color:#fff;font-size:.8rem;outline:none}
.ref-link button{padding:.6rem 1rem;border:none;border-radius:8px;background:linear-gradient(135deg,#d4af37,#b8942e);color:#0a0a0a;font-weight:700;font-size:.8rem;cursor:pointer}
.share{display:flex;justify-content:center;gap:.8rem;margin-bottom:1.5rem}
.share a{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.08);color:#fff;text-decoration:none;font-size:.8rem;font-weight:700;transition:background .2s}
.share a:hover{background:rgba(212,175,55,.25)}
.back{color:#d4af37;text-decoration:none;font-size:.85rem;font-weight:600}
.back:hover{text-decoration:underline}
@media(max-width:500px){.card{padding:2rem 1.2rem}h1{font-size:1.2rem}}
</style>
</head>
<body>
<div class="card">
  <div class="check">&#10003;</div>
  <h1>Thank You!</h1>
  <p class="msg">Your purchase is confirmed. Your download link is on the way to your inbox. Check spam if you don't see it within a few minutes.</p>
  <div class="ref-box">
    <div class="deal">Share with a friend. You both get 10% off.</div>
    <p>Your referral link:</p>
    <div class="ref-link">
      <input type="text" id="refUrl" readonly>
      <button onclick="copyRef()">Copy</button>
    </div>
  </div>
  <div class="share">
    <a href="#" id="tw" target="_blank" title="Twitter">X</a>
    <a href="#" id="fb" target="_blank" title="Facebook">f</a>
    <a href="#" id="wa" target="_blank" title="WhatsApp">W</a>
  </div>
  <a href="https://behike.co" class="back">Back to Shop</a>
</div>
<script>
const code = 'BHK' + Math.random().toString(36).substring(2, 8).toUpperCase();
const refUrl = 'https://behike.co?ref=' + code;
const shareText = 'I just got something great from Behike. Use my link and we both save 10%: ';
document.getElementById('refUrl').value = refUrl;
const enc = t => encodeURIComponent(t);
document.getElementById('tw').href = `https://twitter.com/intent/tweet?text=${enc(shareText + refUrl)}`;
document.getElementById('fb').href = `https://www.facebook.com/sharer/sharer.php?u=${enc(refUrl)}`;
document.getElementById('wa').href = `https://wa.me/?text=${enc(shareText + refUrl)}`;
function copyRef() {
  navigator.clipboard.writeText(refUrl).then(() => {
    const btn = document.querySelector('.ref-link button');
    btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}
// Confetti
const colors = ['#d4af37','#fff','#b8942e','#6c5ce7','#e74c3c','#2ecc71'];
for (let i = 0; i < 50; i++) {
  const c = document.createElement('div');
  c.className = 'confetti';
  c.style.left = Math.random() * 100 + 'vw';
  c.style.background = colors[Math.floor(Math.random() * colors.length)];
  c.style.animationDuration = (2 + Math.random() * 3) + 's';
  c.style.animationDelay = Math.random() * 2 + 's';
  c.style.width = (6 + Math.random() * 8) + 'px';
  c.style.height = (6 + Math.random() * 8) + 'px';
  document.body.appendChild(c);
}
</script>
</body>
</html>
