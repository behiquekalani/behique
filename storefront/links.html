<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BEHIKE -- Links</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Orbitron',sans-serif;min-height:100vh;display:flex;justify-content:center;overflow-x:hidden;background:#050510;color:#fff}
/* animated mesh gradient */
body::before{content:'';position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0a0a2e,#1a0525,#051520,#0a0a2e);background-size:400% 400%;animation:mesh 12s ease infinite;opacity:.9}
@keyframes mesh{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
body::after{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,#C9A84C15,transparent 50%),radial-gradient(ellipse at 70% 80%,#7B2FBE15,transparent 50%)}
.wrap{max-width:440px;width:100%;padding:48px 20px 32px;position:relative;z-index:1}
/* avatar */
.avatar{width:96px;height:96px;border-radius:50%;margin:0 auto 18px;background:#111;display:block;border:3px solid transparent;background-clip:padding-box;box-shadow:0 0 0 3px #C9A84C,0 0 20px #C9A84C33}
.name{text-align:center;font-size:28px;font-weight:900;letter-spacing:8px;background:linear-gradient(135deg,#C9A84C,#f0d78c,#C9A84C);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;font-size:10px;color:#888;letter-spacing:3px;margin:8px 0 36px;text-transform:uppercase;font-weight:500}
/* links */
.links{display:flex;flex-direction:column;gap:14px}
.link{display:block;padding:16px 20px;border-radius:14px;background:rgba(255,255,255,.04);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(201,168,76,.15);color:#fff;text-decoration:none;text-align:center;font-size:12px;font-weight:500;letter-spacing:1.5px;transition:all .3s ease;opacity:0;transform:translateY(14px);animation:rise .5s ease forwards}
.link:hover{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.5);box-shadow:0 0 30px rgba(201,168,76,.12),inset 0 0 30px rgba(201,168,76,.03)}
.link:active{transform:scale(.97)}
.link:nth-child(1){animation-delay:.1s}.link:nth-child(2){animation-delay:.16s}
.link:nth-child(3){animation-delay:.22s}.link:nth-child(4){animation-delay:.28s}
.link:nth-child(5){animation-delay:.34s}.link:nth-child(6){animation-delay:.4s}
.link:nth-child(7){animation-delay:.46s}
.link .price{font-size:9px;opacity:.5;margin-left:6px}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
/* featured card */
.featured{border-color:rgba(201,168,76,.35);background:linear-gradient(135deg,rgba(201,168,76,.06),rgba(201,168,76,.02))}
footer{text-align:center;margin-top:44px;font-size:8px;color:#444;letter-spacing:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="avatar"></div>
  <div class="name">BEHIKE</div>
  <p class="sub">Systems for builders</p>
  <div class="links">
    <a class="link featured" href="https://behike.gumroad.com/l/starter" data-l="blueprint">FREE BLUEPRINT</a>
    <a class="link" href="https://behike.store" data-l="store">SHOP ALL PRODUCTS</a>
    <a class="link" href="https://behike.gumroad.com/l/behike-os" data-l="os">BEHIKE OPERATING SYSTEM<span class="price">$97</span></a>
    <a class="link" href="#" data-l="newsletter">NEWSLETTER</a>
    <a class="link" href="#" data-l="youtube">YOUTUBE</a>
    <a class="link" href="#" data-l="tiktok">TIKTOK</a>
    <a class="link" href="https://behike.co" data-l="website">WEBSITE</a>
  </div>
  <footer>behike.co &nbsp;|&nbsp; Built in Puerto Rico</footer>
</div>
<script>
document.querySelectorAll('.link').forEach(a=>a.addEventListener('click',()=>{
  const k='behike_clicks',d=JSON.parse(localStorage.getItem(k)||'{}'),n=a.dataset.l;
  d[n]=(d[n]||0)+1;d._last=Date.now();localStorage.setItem(k,JSON.stringify(d));
}));
</script>
</body>
</html>
