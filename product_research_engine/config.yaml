database:
  path: ./cache/research.db

logging:
  level: INFO

scraper:
  delay_min_seconds: 2
  delay_max_seconds: 5
  retries: 4
  backoff_factor: 2
  timeout: 30

proxy:
  enabled: true
  path: ~/Downloads/Webshare 10 proxies.txt
  rotate_per_request: true

rate_limit:
  per_domain_per_minute: 30

amazon:
  best_sellers_url: "https://www.amazon.com/Best-Sellers/zgbs"
  playwright_headless: true
  max_products: 100
  categories:
    - electronics
    - home-garden
    - toys-and-games
    - tools
    - sports-outdoors
    - kitchen
    - beauty
    - pet-supplies

google_shopping:
  enabled_fallback: true
  max_products: 50

trends:
  scraper_path: ../tools/trends_scraper.py
  cache_db: ../cache/trends_cache.db

scoring_weights:
  demand: 0.35
  margin: 0.20
  competition: 0.20
  recency: 0.15
  quality: 0.10

demand:
  velocity_weekly_denominator: 50
  trend_weights:
    velocity: 0.3
    class: 0.2
    sales: 0.5

trend_class_scores:
  emerging: 1.0
  spiking: 0.9
  spike: 0.9
  stable: 0.6
  seasonal: 0.5
  declining: 0.2

margin_thresholds:
  high: 0.40
  medium_high: 0.30
  medium: 0.20
  low: 0.10

competition:
  saturation_denominator: 10

recency_days:
  day1: 1
  day3: 3
  day7: 7
  day14: 14

quality:
  price_ranges:
    ideal_low: 15
    ideal_high: 40
    mid_high: 60
    upper_limit: 100

normalizer:
  fuzzy_threshold: 85

  filler_words:
    - with
    - for
    - and
    - the
    - a
    - an
    - of
    - to
    - in
    - on
    - by
    - from
    - kit
    - pack
    - set
    - bundle
    - edition
    - new
    - latest
    - best
    - top
    - premium
    - upgraded
    - original
    - genuine

  brand_stoplist:
