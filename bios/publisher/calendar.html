<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Calendar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; }
  .wrap { display: flex; height: 100vh; }
  .main { flex: 1; padding: 20px; display: flex; flex-direction: column; }
  .sidebar { width: 280px; background: #111; border-left: 1px solid #222; padding: 20px; overflow-y: auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
  .nav { display: flex; gap: 8px; align-items: center; }
  .nav button { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 6px 14px; cursor: pointer; font-family: inherit; font-size: 13px; border-radius: 4px; }
  .nav button:hover { background: #252525; }
  .nav .month-label { font-size: 16px; min-width: 180px; text-align: center; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; gap: 1px; background: #1a1a1a; border: 1px solid #222; border-radius: 6px; overflow: hidden; }
  .day-header { background: #151515; padding: 8px; text-align: center; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .day { background: #0e0e0e; padding: 6px; min-height: 80px; cursor: pointer; position: relative; transition: background 0.15s; }
  .day:hover { background: #161616; }
  .day.other { opacity: 0.3; }
  .day.today { background: #1a1a0a; border: 1px solid #444400; }
  .day.selected { background: #1a1a2a; border: 1px solid #334; }
  .day-num { font-size: 12px; color: #555; margin-bottom: 4px; }
  .day.today .day-num { color: #ffcc00; font-weight: bold; }
  .dots { display: flex; flex-wrap: wrap; gap: 3px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.published { opacity: 1; }
  .dot.queued { opacity: 0.5; border: 1px dashed rgba(255,255,255,0.3); }
  .dot.draft { opacity: 0.3; }
  .platform-instagram { background: #a855f7; }
  .platform-tiktok { background: #ec4899; }
  .platform-twitter { background: #22d3ee; }
  .platform-linkedin { background: #3b82f6; }
  .platform-youtube { background: #ef4444; }
  .platform-newsletter { background: #eab308; }
  .sidebar h2 { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .sidebar section { margin-bottom: 24px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
  .stat-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
  .stat-label { display: flex; align-items: center; }
  .stat-val { color: #888; }
  .streak { font-size: 28px; font-weight: bold; color: #ffcc00; }
  .streak-label { font-size: 11px; color: #555; }
  .next-post { background: #151515; border-radius: 6px; padding: 10px; font-size: 12px; }
  .next-post .time { color: #22d3ee; font-size: 13px; }
  .next-post .plat { color: #888; margin-top: 4px; }
  .detail-panel { margin-top: 16px; }
  .detail-card { background: #151515; border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 12px; border-left: 3px solid #333; }
  .detail-card .dc-platform { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .detail-card .dc-time { color: #888; font-size: 11px; }
  .detail-card .dc-status { font-size: 10px; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-top: 4px; }
  .dc-status.published { background: #1a3a1a; color: #4ade80; }
  .dc-status.queued { background: #3a3a1a; color: #facc15; }
  .dc-status.draft { background: #2a2a2a; color: #888; }
  .detail-card .dc-file { color: #555; font-size: 10px; margin-top: 4px; word-break: break-all; }
  .drag-hint { font-size: 10px; color: #333; text-align: center; margin-top: 12px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; font-size: 11px; }
  .legend-item { display: flex; align-items: center; gap: 4px; color: #666; }
</style>
</head>
<body>
<div class="wrap">
  <div class="main">
    <div class="header">
      <h1>CONTENT CALENDAR</h1>
      <div class="nav">
        <button id="prev">&larr;</button>
        <span class="month-label" id="monthLabel"></span>
        <button id="next">&rarr;</button>
        <button id="todayBtn">Today</button>
      </div>
    </div>
    <div class="legend" id="legend"></div>
    <div class="grid" id="grid"></div>
    <div class="drag-hint">Drag to reschedule (coming soon)</div>
  </div>
  <div class="sidebar">
    <section>
      <h2>This Month</h2>
      <div id="monthStats"></div>
    </section>
    <section>
      <h2>Posting Streak</h2>
      <div class="streak" id="streak">0</div>
      <div class="streak-label">consecutive days</div>
    </section>
    <section>
      <h2>Next Scheduled</h2>
      <div class="next-post" id="nextPost">None</div>
    </section>
    <section class="detail-panel">
      <h2 id="detailTitle">Select a Day</h2>
      <div id="detailCards"></div>
    </section>
  </div>
</div>
<script>
const PLATFORMS = {
  instagram:   { color: '#a855f7', label: 'Instagram' },
  tiktok:      { color: '#ec4899', label: 'TikTok' },
  twitter:     { color: '#22d3ee', label: 'Twitter' },
  linkedin:    { color: '#3b82f6', label: 'LinkedIn' },
  youtube:     { color: '#ef4444', label: 'YouTube' },
  newsletter:  { color: '#eab308', label: 'Newsletter' }
};

let allPosts = [];
let currentDate = new Date();
let selectedDay = null;

async function loadJSON(url) {
  try { const r = await fetch(url); return r.ok ? await r.json() : []; }
  catch { return []; }
}

async function init() {
  const [schedule, posted] = await Promise.all([
    loadJSON('schedule.json'),
    loadJSON('data/posted.json')
  ]);
  allPosts = [...schedule];
  posted.forEach(p => {
    if (!allPosts.find(s => s.id === p.id)) allPosts.push(p);
  });
  buildLegend();
  render();
}

function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = Object.entries(PLATFORMS).map(([k, v]) =>
    `<div class="legend-item"><span class="stat-dot" style="background:${v.color}"></span>${v.label}</div>`
  ).join('');
}

function dayKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function postsForDay(dateStr) {
  return allPosts.filter(p => {
    const d = new Date(p.scheduled_time || p.published_at);
    return dayKey(d) === dateStr;
  });
}

function render() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('monthLabel').textContent =
    new Date(year, month).toLocaleString('en', { month: 'long', year: 'numeric' }).toUpperCase();

  const grid = document.getElementById('grid');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = days.map(d => `<div class="day-header">${d}</div>`).join('');

  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startDay = first.getDay();
  const today = dayKey(new Date());

  // Fill prev month
  for (let i = startDay - 1; i >= 0; i--) {
    const d = new Date(year, month, -i);
    html += dayCell(d, true, today);
  }
  // This month
  for (let i = 1; i <= last.getDate(); i++) {
    const d = new Date(year, month, i);
    html += dayCell(d, false, today);
  }
  // Fill next month
  const totalCells = startDay + last.getDate();
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    const d = new Date(year, month + 1, i);
    html += dayCell(d, true, today);
  }

  grid.innerHTML = html;
  grid.querySelectorAll('.day').forEach(el => {
    el.addEventListener('click', () => selectDay(el.dataset.date));
    el.setAttribute('draggable', 'false');
    el.addEventListener('dragover', e => { e.preventDefault(); el.style.background = '#1a2a1a'; });
    el.addEventListener('dragleave', () => { el.style.background = ''; });
    el.addEventListener('drop', e => { e.preventDefault(); el.style.background = ''; });
  });

  renderSidebar(year, month);
}

function dayCell(date, other, today) {
  const key = dayKey(date);
  const posts = postsForDay(key);
  const isToday = key === today;
  const isSel = key === selectedDay;
  const cls = ['day', other ? 'other' : '', isToday ? 'today' : '', isSel ? 'selected' : ''].filter(Boolean).join(' ');
  const dots = posts.map(p => {
    const st = p.status || 'draft';
    return `<div class="dot platform-${p.platform} ${st}" title="${PLATFORMS[p.platform]?.label || p.platform} (${st})"></div>`;
  }).join('');
  return `<div class="${cls}" data-date="${key}"><div class="day-num">${date.getDate()}</div><div class="dots">${dots}</div></div>`;
}

function selectDay(dateStr) {
  selectedDay = dateStr;
  render();
  const posts = postsForDay(dateStr);
  const parts = dateStr.split('-');
  const d = new Date(parts[0], parts[1]-1, parts[2]);
  document.getElementById('detailTitle').textContent =
    d.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
  const cards = document.getElementById('detailCards');
  if (!posts.length) { cards.innerHTML = '<div style="color:#444;font-size:12px">No posts</div>'; return; }
  cards.innerHTML = posts.map(p => {
    const plat = PLATFORMS[p.platform] || { color: '#666', label: p.platform };
    const time = new Date(p.scheduled_time).toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
    const file = (p.file || '').split('/').pop();
    const st = p.status || 'draft';
    return `<div class="detail-card" style="border-left-color:${plat.color}">
      <div class="dc-platform" style="color:${plat.color}">${plat.label}</div>
      <div class="dc-time">${time}</div>
      <span class="dc-status ${st}">${st}</span>
      <div class="dc-file">${file}</div>
    </div>`;
  }).join('');
}

function renderSidebar(year, month) {
  const monthPosts = allPosts.filter(p => {
    const d = new Date(p.scheduled_time || p.published_at);
    return d.getFullYear() === year && d.getMonth() === month;
  });
  const counts = {};
  monthPosts.forEach(p => { counts[p.platform] = (counts[p.platform] || 0) + 1; });
  const statsEl = document.getElementById('monthStats');
  statsEl.innerHTML = Object.entries(PLATFORMS).map(([k, v]) => {
    const c = counts[k] || 0;
    if (!c) return '';
    return `<div class="stat-row"><span class="stat-label"><span class="stat-dot" style="background:${v.color}"></span>${v.label}</span><span class="stat-val">${c}</span></div>`;
  }).join('') || '<div style="color:#444;font-size:12px">No posts this month</div>';

  // Streak
  const published = allPosts.filter(p => p.status === 'published' && p.published_at);
  const pubDays = new Set(published.map(p => dayKey(new Date(p.published_at))));
  let streak = 0;
  const d = new Date();
  // check today or yesterday as start
  if (!pubDays.has(dayKey(d))) d.setDate(d.getDate() - 1);
  while (pubDays.has(dayKey(d))) { streak++; d.setDate(d.getDate() - 1); }
  document.getElementById('streak').textContent = streak;

  // Next scheduled
  const now = new Date();
  const upcoming = allPosts
    .filter(p => p.status === 'queued' && new Date(p.scheduled_time) > now)
    .sort((a, b) => new Date(a.scheduled_time) - new Date(b.scheduled_time));
  const np = document.getElementById('nextPost');
  if (upcoming.length) {
    const u = upcoming[0];
    const plat = PLATFORMS[u.platform] || { color: '#666', label: u.platform };
    const dt = new Date(u.scheduled_time);
    np.innerHTML = `<div class="time">${dt.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' })} ${dt.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' })}</div><div class="plat" style="color:${plat.color}">${plat.label}</div>`;
  } else { np.innerHTML = '<div style="color:#444">None scheduled</div>'; }
}

document.getElementById('prev').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); selectedDay = null; render(); });
document.getElementById('next').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); selectedDay = null; render(); });
document.getElementById('todayBtn').addEventListener('click', () => { currentDate = new Date(); selectedDay = dayKey(new Date()); render(); selectDay(selectedDay); });

init();
</script>
</body>
</html>
