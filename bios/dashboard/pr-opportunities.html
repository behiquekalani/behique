<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR Opportunities | BIOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #D4A843;
            --gold-dim: #B8922E;
            --gold-bright: #F0C75E;
            --bg: #0A0A0A;
            --bg-card: #141414;
            --bg-card-hover: #1A1A1A;
            --border: #2A2A2A;
            --text: #E0E0E0;
            --text-dim: #888;
            --red: #E74C3C;
            --orange: #F39C12;
            --green: #2ECC71;
            --blue: #3498DB;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 2rem 2rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: -0.02em;
        }

        .header h1 span {
            color: var(--text-dim);
            font-weight: 400;
            font-size: 0.9rem;
            margin-left: 0.75rem;
        }

        .header .subtitle {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .stats-row {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .stat {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .stat strong {
            color: var(--gold);
            font-size: 1.1rem;
        }

        /* Filters */
        .filters {
            padding: 1rem 2rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
        }

        .filter-btn {
            padding: 0.4rem 1rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--gold-dim);
            color: var(--text);
        }

        .filter-btn.active {
            background: var(--gold);
            color: var(--bg);
            border-color: var(--gold);
            font-weight: 600;
        }

        .filter-btn .count {
            margin-left: 0.3rem;
            opacity: 0.7;
        }

        /* Search */
        .search-bar {
            padding: 0.75rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .search-bar input {
            width: 100%;
            max-width: 400px;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
        }

        .search-bar input:focus {
            border-color: var(--gold-dim);
        }

        /* Grid */
        .grid {
            padding: 1.5rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1rem;
            flex: 1;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: var(--gold-dim);
            transform: translateY(-1px);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .card-category {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .cat-grant { background: rgba(46, 204, 113, 0.15); color: var(--green); }
        .cat-program { background: rgba(52, 152, 219, 0.15); color: var(--blue); }
        .cat-event { background: rgba(243, 156, 18, 0.15); color: var(--orange); }
        .cat-incentive { background: rgba(212, 168, 67, 0.15); color: var(--gold); }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.3;
            flex: 1;
        }

        .card-title a {
            color: var(--text);
            text-decoration: none;
        }

        .card-title a:hover {
            color: var(--gold);
        }

        .card-desc {
            font-size: 0.8rem;
            color: var(--text-dim);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }

        .card-source {
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .card-deadline {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
        }

        .deadline-urgent {
            background: rgba(231, 76, 60, 0.2);
            color: var(--red);
        }

        .deadline-soon {
            background: rgba(243, 156, 18, 0.2);
            color: var(--orange);
        }

        .deadline-ok {
            background: rgba(46, 204, 113, 0.15);
            color: var(--green);
        }

        .deadline-none {
            color: var(--text-dim);
            font-weight: 400;
            font-size: 0.7rem;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty-state h2 {
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        .footer .flag {
            color: var(--gold);
            font-weight: 600;
        }

        .footer .refresh-time {
            margin-top: 0.25rem;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header, .filters, .search-bar, .grid {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>PR Opportunities <span>BIOS Intelligence</span></h1>
        <div class="subtitle">Grants, programs, incentives, and events for Puerto Rico entrepreneurs</div>
        <div class="stats-row" id="stats-row"></div>
    </div>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="grant">Grant</button>
        <button class="filter-btn" data-filter="program">Program</button>
        <button class="filter-btn" data-filter="event">Event</button>
        <button class="filter-btn" data-filter="incentive">Incentive</button>
    </div>

    <div class="search-bar">
        <input type="text" id="search" placeholder="Search opportunities...">
    </div>

    <div class="grid" id="grid"></div>

    <div class="footer">
        <div class="flag">Hecho en Puerto Rico</div>
        <div class="refresh-time" id="refresh-time"></div>
    </div>

    <script>
        let allOpportunities = [];
        let activeFilter = 'all';
        let searchQuery = '';

        const DATA_URL = '../storage/pr_opportunities.json';

        async function loadData() {
            try {
                const resp = await fetch(DATA_URL);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                allOpportunities = Array.isArray(data) ? data : (data.opportunities || []);
                render();
            } catch (err) {
                console.error('Failed to load data:', err);
                document.getElementById('grid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h2>No data yet</h2>
                        <p>Run the scraper first:<br><code>python3 bios/ingestion/pr_opportunities.py --run</code></p>
                    </div>`;
            }
        }

        function getDaysUntil(deadlineStr) {
            if (!deadlineStr) return null;
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const dl = new Date(deadlineStr + 'T00:00:00');
            const diff = Math.ceil((dl - now) / (1000 * 60 * 60 * 24));
            return diff;
        }

        function getDeadlineClass(days) {
            if (days === null) return 'deadline-none';
            if (days < 0) return 'deadline-urgent';
            if (days <= 7) return 'deadline-urgent';
            if (days <= 14) return 'deadline-soon';
            return 'deadline-ok';
        }

        function getDeadlineText(days, deadlineStr) {
            if (days === null) return 'No deadline';
            if (days < 0) return `Expired (${deadlineStr})`;
            if (days === 0) return 'Today!';
            if (days === 1) return 'Tomorrow!';
            return `${days} days left`;
        }

        function renderCard(opp) {
            const days = getDaysUntil(opp.deadline);
            const dlClass = getDeadlineClass(days);
            const dlText = getDeadlineText(days, opp.deadline);
            const catClass = `cat-${opp.category || 'program'}`;

            return `
                <div class="card" data-category="${opp.category || 'program'}">
                    <div class="card-top">
                        <div class="card-title">
                            <a href="${opp.url}" target="_blank" rel="noopener">${escapeHtml(opp.title)}</a>
                        </div>
                        <span class="card-category ${catClass}">${opp.category || 'program'}</span>
                    </div>
                    ${opp.description ? `<div class="card-desc">${escapeHtml(opp.description)}</div>` : ''}
                    <div class="card-footer">
                        <span class="card-source">${escapeHtml(opp.source || 'Unknown')}</span>
                        <span class="card-deadline ${dlClass}">${dlText}</span>
                    </div>
                </div>`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function render() {
            const filtered = allOpportunities.filter(opp => {
                if (activeFilter !== 'all' && opp.category !== activeFilter) return false;
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    const text = `${opp.title} ${opp.description} ${opp.source}`.toLowerCase();
                    if (!text.includes(q)) return false;
                }
                return true;
            });

            // Sort: items with deadlines first (soonest first), then rest by scraped_at
            filtered.sort((a, b) => {
                const daysA = getDaysUntil(a.deadline);
                const daysB = getDaysUntil(b.deadline);
                if (daysA !== null && daysB !== null) return daysA - daysB;
                if (daysA !== null) return -1;
                if (daysB !== null) return 1;
                return (b.scraped_at || '').localeCompare(a.scraped_at || '');
            });

            const grid = document.getElementById('grid');
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h2>No opportunities found</h2>
                        <p>Try adjusting filters or run the scraper.</p>
                    </div>`;
            } else {
                grid.innerHTML = filtered.map(renderCard).join('');
            }

            // Update stats
            const cats = {};
            let urgentCount = 0;
            allOpportunities.forEach(o => {
                cats[o.category || 'unknown'] = (cats[o.category || 'unknown'] || 0) + 1;
                const d = getDaysUntil(o.deadline);
                if (d !== null && d >= 0 && d <= 30) urgentCount++;
            });

            document.getElementById('stats-row').innerHTML = `
                <div class="stat"><strong>${allOpportunities.length}</strong> Total</div>
                <div class="stat"><strong>${urgentCount}</strong> Urgent (30d)</div>
                <div class="stat"><strong>${filtered.length}</strong> Showing</div>
            `;

            // Update filter counts
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const f = btn.dataset.filter;
                if (f === 'all') {
                    btn.innerHTML = `All <span class="count">${allOpportunities.length}</span>`;
                } else {
                    const count = cats[f] || 0;
                    btn.innerHTML = `${f.charAt(0).toUpperCase() + f.slice(1)} <span class="count">${count}</span>`;
                }
            });

            // Update refresh time
            const latest = allOpportunities.reduce((latest, o) => {
                return o.scraped_at && o.scraped_at > latest ? o.scraped_at : latest;
            }, '');
            if (latest) {
                const d = new Date(latest);
                document.getElementById('refresh-time').textContent = `Last updated: ${d.toLocaleString()}`;
            }
        }

        // Filter buttons
        document.getElementById('filters').addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.filter;
            render();
        });

        // Search
        document.getElementById('search').addEventListener('input', (e) => {
            searchQuery = e.target.value.trim();
            render();
        });

        // Load
        loadData();
        // Auto-refresh every 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
