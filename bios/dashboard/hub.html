<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIOS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
h1 { font-size: 2.4rem; letter-spacing: 0.3em; color: #C9A84C; margin-bottom: 8px; }
.subtitle { font-size: 0.85rem; color: #666; margin-bottom: 40px; letter-spacing: 0.1em; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 640px; width: 100%; }
.card { border: 1px solid #C9A84C; padding: 28px 24px; text-decoration: none; color: #fff; transition: background 0.2s, box-shadow 0.2s; }
.card:hover { background: rgba(201,168,76,0.08); box-shadow: 0 0 20px rgba(201,168,76,0.15); }
.card h2 { font-size: 1.1rem; color: #C9A84C; margin-bottom: 8px; letter-spacing: 0.05em; }
.card p { font-size: 0.8rem; color: #888; line-height: 1.4; }
footer { margin-top: auto; padding-top: 40px; text-align: center; font-size: 0.75rem; color: #444; letter-spacing: 0.05em; }
footer span { color: #C9A84C; }
@media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>BIOS</h1>
<p class="subtitle">BEHAVIORAL INTELLIGENCE OPERATING SYSTEM</p>
<div class="grid">
  <a class="card" href="index.html">
    <h2>Intelligence</h2>
    <p>Signals, convictions, market feed</p>
  </a>
  <a class="card" href="polymarket.html">
    <h2>Trading</h2>
    <p>Trade ideas, Fear & Greed, crypto movers</p>
  </a>
  <a class="card" href="puerto-rico.html">
    <h2>Puerto Rico</h2>
    <p>Local news, government, economy</p>
  </a>
  <a class="card" href="warroom.html">
    <h2>War Room</h2>
    <p>3D VR command center</p>
  </a>
</div>
<footer>
  <span id="clock"></span> &middot; <span>8 pipelines active</span>
</footer>
<script>
function tick() {
  var d = new Date();
  document.getElementById('clock').textContent =
    d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}
tick(); setInterval(tick, 1000);
</script>
</body>
</html>
