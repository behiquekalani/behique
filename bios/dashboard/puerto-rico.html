<!--
# Serve: cd ~/behique/bios && python3 -m http.server 8093 --bind 0.0.0.0
# Open:  http://localhost:8093/dashboard/puerto-rico.html
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIOS - Puerto Rico Intelligence</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #000; --fg: #e0e0e0; --dim: #666; --gold: #C9A84C; --panel: #0a0a0a; --border: #1a1a1a; }
body { background: var(--bg); color: var(--fg); font-family: Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
a { color: var(--gold); text-decoration: none; }
a:hover { text-decoration: underline; }

.topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border); }
.topbar h1 { font-size: 20px; font-weight: 700; letter-spacing: 3px; color: var(--gold); }
.topbar .back { font-size: 12px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; }
.topbar .back:hover { color: var(--gold); }
.timestamp { font-size: 11px; color: var(--dim); }

.filters { display: flex; gap: 8px; padding: 12px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filters button { background: var(--panel); color: var(--dim); border: 1px solid var(--border); padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: inherit; letter-spacing: 0.5px; transition: all 0.2s; }
.filters button:hover, .filters button.active { background: var(--gold); color: #000; border-color: var(--gold); }

.feed { flex: 1; overflow-y: auto; padding: 16px 24px; }
.item { padding: 14px 0; border-bottom: 1px solid var(--border); }
.item-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 4px; font-size: 11px; }
.item-source { color: var(--gold); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.item-cat { color: var(--dim); padding: 2px 8px; border: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.item-time { color: var(--dim); margin-left: auto; }
.item-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.item-title a { color: #fff; }
.item-title a:hover { color: var(--gold); }
.item-desc { font-size: 13px; color: var(--dim); line-height: 1.5; }
.item-sentiment { font-size: 10px; font-weight: 600; letter-spacing: 1px; }
.item-sentiment.positive { color: #00c853; }
.item-sentiment.negative { color: #ff1744; }
.item-sentiment.neutral { color: var(--dim); }

.empty { text-align: center; padding: 60px 24px; color: var(--dim); }
.empty h2 { color: var(--gold); margin-bottom: 8px; font-size: 16px; }

.footer { padding: 16px 24px; border-top: 1px solid var(--border); text-align: center; font-size: 11px; color: var(--dim); letter-spacing: 2px; }
.footer span { color: var(--gold); }

.status { display: flex; gap: 16px; align-items: center; }
.pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="topbar">
  <h1>PR INTELLIGENCE</h1>
  <div class="status">
    <div class="pulse"></div>
    <span class="timestamp" id="ts">Loading...</span>
    <a href="index.html" class="back">Main Dashboard</a>
  </div>
</div>

<div class="filters" id="filters">
  <button class="active" data-cat="all">All</button>
  <button data-cat="Government">Government</button>
  <button data-cat="Economy">Economy</button>
  <button data-cat="Weather">Weather</button>
  <button data-cat="Infrastructure">Infrastructure</button>
  <button data-cat="Business">Business</button>
</div>

<div class="feed" id="feed"></div>

<div class="footer">Hecho en <span>Puerto Rico</span> &mdash; BIOS Intelligence System</div>

<script>
const FEED_URL = '../storage/pr_signals.json';
const MAX_DISPLAY = 20;
let allItems = [];
let activeFilter = 'all';

function timeAgo(ts) {
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function renderItems() {
  const feed = document.getElementById('feed');
  let items = allItems;
  if (activeFilter !== 'all') {
    items = items.filter(i => (i.category || 'General') === activeFilter);
  }
  items = items.slice(0, MAX_DISPLAY);

  if (items.length === 0) {
    feed.innerHTML = '<div class="empty"><h2>No signals yet</h2><p>Run: python3 bios/ingestion/pr_scraper.py --run</p></div>';
    return;
  }

  feed.innerHTML = items.map(item => `
    <div class="item">
      <div class="item-meta">
        <span class="item-source">${item.source}</span>
        <span class="item-cat">${item.category || 'General'}</span>
        <span class="item-sentiment ${item.sentiment_hint}">${item.sentiment_hint}</span>
        <span class="item-time">${timeAgo(item.timestamp)}</span>
      </div>
      <div class="item-title"><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></div>
      ${item.description ? `<div class="item-desc">${item.description.substring(0, 200)}</div>` : ''}
    </div>
  `).join('');
}

async function fetchSignals() {
  try {
    const resp = await fetch(FEED_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('No data');
    const data = await resp.json();
    allItems = data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    document.getElementById('ts').textContent = new Date().toLocaleTimeString();
    renderItems();
  } catch (e) {
    document.getElementById('feed').innerHTML =
      '<div class="empty"><h2>No signals yet</h2><p>Run: python3 bios/ingestion/pr_scraper.py --run</p></div>';
  }
}

document.getElementById('filters').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.cat;
  renderItems();
});

fetchSignals();
setInterval(fetchSignals, 60000);
</script>
</body>
</html>
