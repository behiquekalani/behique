<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEHIQUE // Command Center</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #060a10;
    --bg-card: #0a0f1a;
    --bg-card2: #0d1322;
    --border: #1a2744;
    --border-dim: #111d33;
    --text: #c8d6e5;
    --text-dim: #3a4a60;
    --text-muted: #253045;
    --cyan: #00f0ff;
    --purple: #b44dff;
    --green: #00ff88;
    --orange: #ff6b2b;
    --red: #ff3366;
    --gold: #ffd700;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
    height: 100vh;
    overflow-y: auto;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d1220 0%, var(--bg) 100%);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .header-title {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
  }

  .header-stats {
    display: flex;
    gap: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .header-stats .val { color: var(--cyan); font-weight: 500; }

  .header-clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 3px;
  }

  /* ── AGENTS GRID ── */
  .agents-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  @media (max-width: 1200px) {
    .agents-row { grid-template-columns: repeat(2, 1fr); }
  }

  .agent-card {
    border-right: 1px solid var(--border-dim);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .agent-card:last-child { border-right: none; }

  /* Face container */
  .face-container {
    position: relative;
    height: 220px;
    cursor: crosshair;
    overflow: hidden;
  }

  .face-container canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .agent-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 2px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .agent-identity {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
  }

  .agent-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 4px;
    font-weight: 700;
  }

  .agent-role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 2px;
    margin-top: 2px;
    opacity: 0.5;
  }

  /* ── INFO PANEL (below face) ── */
  .agent-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-card);
    border-top: 1px solid var(--border-dim);
    min-height: 280px;
  }

  /* Metrics bar */
  .metrics-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
  }

  .metric {
    flex: 1;
    padding: 8px 10px;
    text-align: center;
    border-right: 1px solid var(--border-dim);
  }

  .metric:last-child { border-right: none; }

  .metric-val {
    font-size: 0.85rem;
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
  }

  .metric-label {
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 2px;
    text-transform: uppercase;
  }

  /* Task list */
  .task-section {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .section-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 2px;
    padding: 8px 12px 4px;
    text-transform: uppercase;
    position: sticky;
    top: 0;
    background: var(--bg-card);
    z-index: 2;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border-dim);
    font-size: 0.75rem;
    transition: background 0.2s;
  }

  .task-item:hover { background: var(--bg-card2); }

  .task-status {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .task-content {
    flex: 1;
    min-width: 0;
  }

  .task-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem;
    color: var(--text-dim);
    margin-top: 1px;
  }

  /* Activity feed */
  .activity-item {
    padding: 5px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem;
    color: var(--text-dim);
    border-bottom: 1px solid #0d1525;
    display: flex;
    gap: 8px;
  }

  .activity-time {
    color: var(--text-muted);
    flex-shrink: 0;
    width: 42px;
  }

  .activity-msg {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg-card);
    position: sticky;
    bottom: 0;
  }

  .cmd-prompt {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--cyan);
    flex-shrink: 0;
  }

  .cmd-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.5px;
  }

  .cmd-input::placeholder { color: var(--text-muted); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>

// ── FACE GEOMETRY ──
function generateFace(cx, cy, radius, agent) {
  const pts = [];
  const r = radius;
  const m = agent.particleMult;

  for (let a = 0; a < Math.PI * 2; a += 0.09) {
    pts.push({ x: cx + Math.cos(a) * r * 0.6, y: cy + Math.sin(a) * r * 0.82 - r * 0.05, type: 'outline', size: Math.random() * 1.3 + 0.4 });
  }

  [[-1, cx - r * 0.2], [1, cx + r * 0.2]].forEach(([, ex]) => {
    const ey = cy - r * 0.14;
    for (let a = 0; a < Math.PI * 2; a += 0.14) {
      pts.push({ x: ex + Math.cos(a) * r * 0.12, y: ey + Math.sin(a) * r * 0.1, type: 'eye', size: Math.random() * 1.8 + 0.8 });
    }
    for (let i = 0; i < Math.floor(10 * m); i++) {
      const a2 = Math.random() * Math.PI * 2, d = Math.random() * r * 0.06;
      pts.push({ x: ex + Math.cos(a2) * d, y: ey + Math.sin(a2) * d, type: 'eye-fill', size: Math.random() * 1.3 + 0.4 });
    }
  });

  for (let i = 0; i < 6; i++) pts.push({ x: cx - r * 0.03 + (i / 5) * r * 0.06, y: cy + r * 0.18, type: 'nose', size: Math.random() + 0.5 });
  for (let i = 0; i < 3; i++) pts.push({ x: cx, y: cy + (i / 2) * r * 0.16, type: 'nose', size: Math.random() + 0.3 });

  for (let a = -0.7; a <= 0.7; a += 0.08) {
    pts.push({ x: cx + Math.sin(a) * r * 0.16, y: cy + r * 0.34 + Math.cos(a * 2) * r * 0.008, type: 'mouth', size: Math.random() * 1.2 + 0.4 });
  }

  for (let i = 0; i < Math.floor(14 * m); i++) {
    const side = i < 7 ? -1 : 1;
    pts.push({ x: cx + side * (r * 0.35 + Math.random() * r * 0.12), y: cy + r * 0.04 + Math.random() * r * 0.16, type: 'cheek', size: Math.random() + 0.3 });
  }

  for (let a = 0.3; a < Math.PI - 0.3; a += 0.12)
    pts.push({ x: cx + Math.cos(a - Math.PI / 2) * r * 0.48, y: cy + r * 0.3 + Math.sin(a) * r * 0.2, type: 'jaw', size: Math.random() + 0.3 });

  for (let i = 0; i < Math.floor(14 * m); i++)
    pts.push({ x: cx + (Math.random() - 0.5) * r * 0.85, y: cy - r * 0.35 - Math.random() * r * 0.28, type: 'forehead', size: Math.random() + 0.2 });

  for (let i = 0; i < Math.floor(60 * m); i++) {
    const a = Math.random() * Math.PI * 2, d = r * 0.25 + Math.random() * r * 0.65;
    pts.push({ x: cx + Math.cos(a) * d, y: cy + Math.sin(a) * d, type: 'ambient', size: Math.random() * 0.9 + 0.2 });
  }

  return pts;
}

// ── AGENT FACE RENDERER ──
class AgentFace {
  constructor(canvas, config) {
    this.config = config;
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.particles = [];
    this.mouse = { x: -9999, y: -9999 };
    this.breathPhase = Math.random() * Math.PI * 2;
    this.glitchTimer = 0;
    this.nextGlitch = Math.random() * 500 + 200;

    const p = config.personality;
    this.breathSpeed = p === 'calm' ? 0.006 : p === 'steady' ? 0.004 : p === 'warm' ? 0.007 : 0.002;
    this.breathAmp = p === 'calm' ? 0.008 : p === 'steady' ? 0.005 : p === 'warm' ? 0.01 : 0.003;
    this.springForce = p === 'steady' ? 0.02 : p === 'dormant' ? 0.01 : 0.03;
    this.damping = p === 'steady' ? 0.85 : 0.88;
    this.baseAlpha = p === 'dormant' ? 0.2 : 1.0;
    this.glitchIntensity = p === 'calm' ? 12 : p === 'steady' ? 18 : p === 'warm' ? 8 : 5;

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      this.mouse.x = e.clientX - rect.left;
      this.mouse.y = e.clientY - rect.top;
    });
    canvas.addEventListener('mouseleave', () => { this.mouse.x = -9999; this.mouse.y = -9999; });
    canvas.addEventListener('click', () => { this.glitchTimer = this.nextGlitch; });
  }

  resize(w, h) {
    this.canvas.width = w;
    this.canvas.height = h;
    this.w = w; this.h = h;
    this.cx = w / 2;
    this.cy = h / 2 - 8;
    this.radius = Math.min(w, h) * 0.3;
    this.initParticles();
  }

  initParticles() {
    const facePoints = generateFace(this.cx, this.cy, this.radius, this.config);
    this.particles = facePoints.map(fp => ({
      tx: fp.x, ty: fp.y,
      x: this.cx + (Math.random() - 0.5) * this.w * 1.5,
      y: this.cy + (Math.random() - 0.5) * this.h * 1.5,
      vx: 0, vy: 0,
      type: fp.type, baseSize: fp.size, size: fp.size,
      alpha: 0,
      targetAlpha: (fp.type === 'ambient' ? 0.12 + Math.random() * 0.2 : 0.45 + Math.random() * 0.4) * this.baseAlpha,
      driftAngle: Math.random() * Math.PI * 2,
      driftSpeed: 0.002 + Math.random() * 0.004,
      driftRadius: 0.6 + Math.random() * 2,
      flickerPhase: Math.random() * Math.PI * 2,
      flickerSpeed: 0.015 + Math.random() * 0.03,
    }));
  }

  update() {
    this.breathPhase += this.breathSpeed;
    this.glitchTimer++;
    const bScale = 1 + Math.sin(this.breathPhase) * this.breathAmp;
    const glitch = this.glitchTimer > this.nextGlitch && this.glitchTimer < this.nextGlitch + 6;
    if (this.glitchTimer > this.nextGlitch + 6) { this.glitchTimer = 0; this.nextGlitch = Math.random() * 500 + 200; }

    for (const p of this.particles) {
      const tx = this.cx + (p.tx - this.cx) * bScale;
      const ty = this.cy + (p.ty - this.cy) * bScale;
      p.driftAngle += p.driftSpeed;
      const dx = Math.cos(p.driftAngle) * p.driftRadius;
      const dy = Math.sin(p.driftAngle * 0.7) * p.driftRadius;

      const mdx = p.x - this.mouse.x, mdy = p.y - this.mouse.y;
      const md = Math.sqrt(mdx * mdx + mdy * mdy);
      let rx = 0, ry = 0;
      if (md < 70) { const f = (70 - md) / 70 * 5; rx = (mdx / md) * f; ry = (mdy / md) * f; }

      p.vx += (tx + dx - p.x) * this.springForce + rx;
      p.vy += (ty + dy - p.y) * this.springForce + ry;
      p.vx *= this.damping; p.vy *= this.damping;

      if (glitch && Math.random() < 0.18) { p.vx += (Math.random() - 0.5) * this.glitchIntensity; p.vy += (Math.random() - 0.5) * this.glitchIntensity; }

      p.x += p.vx; p.y += p.vy;
      p.alpha += (p.targetAlpha - p.alpha) * 0.015;
      p.flickerPhase += p.flickerSpeed;
      p.size = p.baseSize * (0.7 + Math.sin(p.flickerPhase) * 0.3);
    }
  }

  draw() {
    const ctx = this.ctx;
    ctx.fillStyle = 'rgba(6, 10, 16, 0.2)';
    ctx.fillRect(0, 0, this.w, this.h);
    const [cr, cg, cb] = this.config.color;

    for (const p of this.particles) {
      const fl = 0.7 + Math.sin(p.flickerPhase) * 0.3;
      const a = p.alpha * fl;
      if (p.type === 'eye' || p.type === 'eye-fill') {
        ctx.fillStyle = `rgba(${cr},${cg},${cb},${a})`;
        if (p.type === 'eye' && a > 0.3) { ctx.shadowColor = this.config.glowColor; ctx.shadowBlur = 4; }
      } else if (p.type === 'mouth') {
        ctx.fillStyle = `rgba(${cr},${cg},${cb},${a * 0.45})`; ctx.shadowBlur = 0;
      } else if (p.type === 'ambient') {
        ctx.fillStyle = `rgba(255,255,255,${a * 0.3})`; ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = `rgba(255,255,255,${a * 0.7})`; ctx.shadowBlur = 0;
      }
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0;
    if (Math.random() < 0.02) {
      ctx.fillStyle = `rgba(${cr},${cg},${cb},0.015)`;
      ctx.fillRect(0, Math.random() * this.h, this.w, 1);
    }
  }
}

        ${agent.tasks.map(t => `
          <div class="task-item">
            <div class="task-status" style="background: ${statusColor(t.status)}; box-shadow: 0 0 4px ${statusColor(t.status)}33"></div>
            <div class="task-content">
              <div class="task-title">${t.title}</div>
              <div class="task-meta">${t.status.toUpperCase()} // ${t.meta}</div>
            </div>
          </div>
        `).join('')}
        <div class="section-header" style="margin-top: 4px">ACTIVITY</div>
        ${agent.activity.map(a => `
          <div class="activity-item">
            <span class="activity-time">${a.time}</span>
            <span class="activity-msg">${a.msg}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  row.appendChild(card);

  const canvas = card.querySelector('canvas');
  const face = new AgentFace(canvas, agent);
  faces.push({ card, face, canvas });
});

// ── RESIZE ──
function resize() {
  faces.forEach(({ card, face, canvas }) => {
    const container = card.querySelector('.face-container');
    const rect = container.getBoundingClientRect();
    face.resize(rect.width, rect.height);
  });
}

// ── LOOP ──
function loop() {
  faces.forEach(({ face }) => { face.update(); face.draw(); });
  requestAnimationFrame(loop);
}

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const t = now.toLocaleTimeString('en-US', { hour12: false });
  const d = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  document.getElementById('clock').textContent = `${d} // ${t}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── TASK COUNT ──
const totalTasks = AGENTS.reduce((s, a) => s + a.tasks.length, 0);
document.getElementById('total-tasks').textContent = totalTasks;

// ── CMD INPUT (placeholder for future) ──
document.getElementById('cmd').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val) {
      console.log('[CEIBA CMD]', val);
      e.target.value = '';
    }
  }
});

window.addEventListener('resize', resize);
setTimeout(resize, 50);
loop();
</script>
</body>
</html>
