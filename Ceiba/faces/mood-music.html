<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noai, noimageai">
<meta name="description" content="Behike Mood Music. Tell us how you feel, we generate a custom soundtrack.">
<title>Behike Mood Music</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#fff}

/* SCREENS */
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s,transform .6s;opacity:0;pointer-events:none;transform:scale(.97)}
.screen.active{opacity:1;pointer-events:all;transform:scale(1)}

/* MOOD SELECT */
#mood-screen{gap:40px}
#mood-screen h1{font-size:28px;font-weight:300;letter-spacing:2px;opacity:.8}
#mood-screen p{font-size:14px;opacity:.4;margin-top:-20px}
.mood-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:28px;max-width:600px;padding:0 20px}
.mood-btn{width:110px;height:110px;border-radius:50%;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .3s;position:relative;overflow:hidden}
.mood-btn::before{content:'';position:absolute;inset:0;border-radius:50%;opacity:0;transition:opacity .3s}
.mood-btn:hover{transform:scale(1.1);border-color:rgba(255,255,255,.3)}
.mood-btn:hover::before{opacity:.15}
.mood-btn .emoji{font-size:32px;line-height:1}
.mood-btn .label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;opacity:.7}

.mood-btn[data-mood="focused"]{--accent:#4a9eff}
.mood-btn[data-mood="focused"]::before{background:#4a9eff}
.mood-btn[data-mood="focused"]:hover{border-color:#4a9eff;box-shadow:0 0 30px rgba(74,158,255,.3)}

.mood-btn[data-mood="energized"]{--accent:#ff8c42}
.mood-btn[data-mood="energized"]::before{background:#ff8c42}
.mood-btn[data-mood="energized"]:hover{border-color:#ff8c42;box-shadow:0 0 30px rgba(255,140,66,.3)}

.mood-btn[data-mood="calm"]{--accent:#4ecdc4}
.mood-btn[data-mood="calm"]::before{background:#4ecdc4}
.mood-btn[data-mood="calm"]:hover{border-color:#4ecdc4;box-shadow:0 0 30px rgba(78,205,196,.3)}

.mood-btn[data-mood="sad"]{--accent:#a855f7}
.mood-btn[data-mood="sad"]::before{background:#a855f7}
.mood-btn[data-mood="sad"]:hover{border-color:#a855f7;box-shadow:0 0 30px rgba(168,85,247,.3)}

.mood-btn[data-mood="stressed"]{--accent:#2dd4bf}
.mood-btn[data-mood="stressed"]::before{background:#2dd4bf}
.mood-btn[data-mood="stressed"]:hover{border-color:#2dd4bf;box-shadow:0 0 30px rgba(45,212,191,.3)}

/* PLAYER */
#player-screen{gap:30px}
#player-canvas-wrap{position:relative;width:320px;height:320px}
#viz-canvas{width:320px;height:320px}
.player-mood{font-size:13px;letter-spacing:3px;text-transform:uppercase;opacity:.6}
.player-controls{display:flex;flex-direction:column;align-items:center;gap:18px}
.player-row{display:flex;align-items:center;gap:20px}
.ctrl-btn{background:none;border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .2s}
.ctrl-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.4)}
.ctrl-btn.active{background:rgba(255,255,255,.15)}
.volume-wrap{display:flex;align-items:center;gap:10px;font-size:11px;opacity:.6}
.volume-wrap input[type=range]{-webkit-appearance:none;width:120px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;outline:none}
.volume-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer}
.timer{font-size:40px;font-weight:200;letter-spacing:4px;font-variant-numeric:tabular-nums}
.timer-label{font-size:10px;letter-spacing:2px;opacity:.3;margin-top:-12px;text-transform:uppercase}

/* HISTORY */
#history-section{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:.5;transition:opacity .3s;cursor:pointer;z-index:10}
#history-section:hover{opacity:.9}
.history-toggle{font-size:10px;letter-spacing:2px;text-transform:uppercase;background:none;border:none;color:#fff;cursor:pointer;opacity:.5}
#history-panel{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.95);border-top:1px solid rgba(255,255,255,.1);padding:24px;transform:translateY(100%);transition:transform .4s;z-index:20;max-height:40vh;overflow-y:auto}
#history-panel.open{transform:translateY(0)}
.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.history-header h3{font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:400;opacity:.6}
.history-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:.5}
.history-stats{font-size:12px;opacity:.4;margin-bottom:16px}
#history-chart{width:100%;height:80px}
.history-entries{display:flex;flex-direction:column;gap:6px;max-height:120px;overflow-y:auto}
.history-entry{display:flex;align-items:center;gap:12px;font-size:11px;opacity:.5;padding:4px 0}
.history-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* FOOTER */
.footer{position:fixed;bottom:8px;right:16px;font-size:9px;opacity:.2;letter-spacing:1px;z-index:5}
</style>
</head>
<body>

<!-- MOOD SELECT SCREEN -->
<div id="mood-screen" class="screen active">
  <h1>How are you feeling?</h1>
  <p>Select a mood. We'll build your soundtrack.</p>
  <div class="mood-grid">
    <button class="mood-btn" data-mood="focused" onclick="selectMood('focused')">
      <span class="emoji">🎯</span>
      <span class="label">Focused</span>
    </button>
    <button class="mood-btn" data-mood="energized" onclick="selectMood('energized')">
      <span class="emoji">⚡</span>
      <span class="label">Energized</span>
    </button>
    <button class="mood-btn" data-mood="calm" onclick="selectMood('calm')">
      <span class="emoji">🌊</span>
      <span class="label">Calm</span>
    </button>
    <button class="mood-btn" data-mood="sad" onclick="selectMood('sad')">
      <span class="emoji">🌧️</span>
      <span class="label">Sad</span>
    </button>
    <button class="mood-btn" data-mood="stressed" onclick="selectMood('stressed')">
      <span class="emoji">🧘</span>
      <span class="label">Stressed</span>
    </button>
  </div>
</div>

<!-- PLAYER SCREEN -->
<div id="player-screen" class="screen">
  <div class="timer" id="timer">00:00</div>
  <div class="timer-label">Listening</div>
  <div id="player-canvas-wrap">
    <canvas id="viz-canvas" width="640" height="640"></canvas>
  </div>
  <div class="player-mood" id="current-mood-label">Focused</div>
  <div class="player-controls">
    <div class="player-row">
      <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">Pause</button>
      <button class="ctrl-btn" onclick="changeMood()">Change Mood</button>
      <button class="ctrl-btn" id="export-btn" onclick="exportWav()">Export WAV</button>
    </div>
    <div class="volume-wrap">
      <span>Vol</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.6" oninput="setVolume(this.value)">
    </div>
  </div>
</div>

<!-- HISTORY PANEL -->
<div id="history-section" onclick="toggleHistory()">
  <button class="history-toggle">Mood History</button>
</div>
<div id="history-panel">
  <div class="history-header">
    <h3>Your Mood This Week</h3>
    <button class="history-close" onclick="toggleHistory()">&times;</button>
  </div>
  <div class="history-stats" id="history-stats"></div>
  <canvas id="history-chart" width="800" height="160"></canvas>
  <div class="history-entries" id="history-entries"></div>
</div>

<div class="footer">&copy; 2026 Behike</div>

<script>
// ─── STATE ───
let audioCtx, masterGain, analyser, analyserData;
let currentMood = null;
let isPaused = false;
let startTime = 0;
let timerInterval = null;
let activeNodes = [];
let animFrame = null;

const MOODS = {
  focused: { accent: '#4a9eff', emoji: '🎯', label: 'Focused' },
  energized: { accent: '#ff8c42', emoji: '⚡', label: 'Energized' },
  calm: { accent: '#4ecdc4', emoji: '🌊', label: 'Calm' },
  sad: { accent: '#a855f7', emoji: '🌧️', label: 'Sad' },
  stressed: { accent: '#2dd4bf', emoji: '🧘', label: 'Stressed' }
};

// ─── SCREEN TRANSITIONS ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectMood(mood) {
  currentMood = mood;
  document.getElementById('current-mood-label').textContent = MOODS[mood].label;
  document.getElementById('current-mood-label').style.color = MOODS[mood].accent;
  showScreen('player-screen');
  startAudio(mood);
  startTimer();
  logMood(mood);
}

function changeMood() {
  stopAudio();
  stopTimer();
  isPaused = false;
  document.getElementById('pause-btn').textContent = 'Pause';
  showScreen('mood-screen');
}

function togglePause() {
  if (!audioCtx) return;
  if (isPaused) {
    audioCtx.resume();
    isPaused = false;
    document.getElementById('pause-btn').textContent = 'Pause';
    startTime = Date.now() - (pausedElapsed || 0);
  } else {
    pausedElapsed = Date.now() - startTime;
    audioCtx.suspend();
    isPaused = true;
    document.getElementById('pause-btn').textContent = 'Resume';
  }
}
let pausedElapsed = 0;

function setVolume(v) {
  if (masterGain) masterGain.gain.setValueAtTime(parseFloat(v), audioCtx.currentTime);
}

// ─── TIMER ───
function startTimer() {
  startTime = Date.now();
  pausedElapsed = 0;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (isPaused) return;
    const elapsed = Date.now() - startTime;
    const mins = Math.floor(elapsed / 60000);
    const secs = Math.floor((elapsed % 60000) / 1000);
    document.getElementById('timer').textContent =
      String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
  }, 250);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timer').textContent = '00:00';
}

// ─── AUDIO ENGINE ───
function stopAudio() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  activeNodes.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} });
  activeNodes = [];
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

function createNoise(ctx, type) {
  const len = ctx.sampleRate * 4;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  if (type === 'white') {
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  } else if (type === 'brown') {
    let last = 0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      data[i] = (last + 0.02 * w) / 1.02;
      last = data[i];
    }
  } else if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      b0 = 0.99886*b0 + w*0.0555179;
      b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520;
      b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522;
      b5 = -0.7616*b5 - w*0.0168980;
      data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
      b6 = w*0.115926;
    }
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  return src;
}

function createBinaural(ctx, baseFreq, beatFreq) {
  const merger = ctx.createChannelMerger(2);
  const oscL = ctx.createOscillator();
  const oscR = ctx.createOscillator();
  oscL.frequency.value = baseFreq;
  oscR.frequency.value = baseFreq + beatFreq;
  oscL.type = 'sine';
  oscR.type = 'sine';
  const gL = ctx.createGain(); gL.gain.value = 0.3;
  const gR = ctx.createGain(); gR.gain.value = 0.3;
  oscL.connect(gL).connect(merger, 0, 0);
  oscR.connect(gR).connect(merger, 0, 1);
  oscL.start(); oscR.start();
  activeNodes.push(oscL, oscR);
  return merger;
}

function createDrumPattern(ctx, bpm, style) {
  const interval = 60 / bpm;
  const g = ctx.createGain();
  g.gain.value = 0.25;

  function scheduleKick(time) {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(30, time + 0.1);
    env.gain.setValueAtTime(style === 'trap' ? 0.8 : 0.4, time);
    env.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
    osc.connect(env).connect(g);
    osc.start(time);
    osc.stop(time + 0.15);
  }

  function scheduleHihat(time) {
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.01));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const hg = ctx.createGain();
    hg.gain.setValueAtTime(style === 'trap' ? 0.15 : 0.08, time);
    hg.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 8000;
    src.connect(hp).connect(hg).connect(g);
    src.start(time);
  }

  function scheduleSnare(time) {
    const noise = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
    const d = noise.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.03));
    const src = ctx.createBufferSource();
    src.buffer = noise;
    const sg = ctx.createGain();
    sg.gain.setValueAtTime(0.3, time);
    sg.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 3000;
    src.connect(bp).connect(sg).connect(g);
    src.start(time);
  }

  let t = ctx.currentTime + 0.1;
  const bars = 64;
  for (let bar = 0; bar < bars; bar++) {
    for (let beat = 0; beat < 4; beat++) {
      const bt = t + (bar * 4 + beat) * interval;
      if (beat === 0 || beat === 2) scheduleKick(bt);
      if (beat === 1 || beat === 3) scheduleSnare(bt);
      if (style === 'trap') {
        scheduleHihat(bt);
        scheduleHihat(bt + interval * 0.25);
        scheduleHihat(bt + interval * 0.5);
        scheduleHihat(bt + interval * 0.75);
      } else {
        scheduleHihat(bt);
        scheduleHihat(bt + interval * 0.5);
      }
    }
  }
  return g;
}

function createMelody(ctx, notes, bpm, type, vol) {
  const interval = 60 / bpm;
  const g = ctx.createGain();
  g.gain.value = vol || 0.15;
  let t = ctx.currentTime + 0.1;
  const totalBeats = 256;
  for (let i = 0; i < totalBeats; i++) {
    const note = notes[i % notes.length];
    if (note === 0) continue;
    const osc = ctx.createOscillator();
    osc.type = type || 'triangle';
    osc.frequency.value = note;
    const env = ctx.createGain();
    const dur = interval * 0.8;
    env.gain.setValueAtTime(0.001, t + i * interval);
    env.gain.linearRampToValueAtTime(0.5, t + i * interval + 0.05);
    env.gain.exponentialRampToValueAtTime(0.001, t + i * interval + dur);
    osc.connect(env).connect(g);
    osc.start(t + i * interval);
    osc.stop(t + i * interval + dur + 0.01);
  }
  return g;
}

function createPad(ctx, freqs, vol) {
  const g = ctx.createGain();
  g.gain.value = vol || 0.12;
  freqs.forEach(f => {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = f;
    const og = ctx.createGain();
    og.gain.value = 1 / freqs.length;
    // Slow LFO for movement
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.1 + Math.random() * 0.2;
    const lfoG = ctx.createGain();
    lfoG.gain.value = f * 0.01;
    lfo.connect(lfoG).connect(osc.frequency);
    lfo.start();
    osc.connect(og).connect(g);
    osc.start();
    activeNodes.push(osc, lfo);
  });
  return g;
}

function startAudio(mood) {
  stopAudio();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = parseFloat(document.getElementById('volume').value);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  analyserData = new Uint8Array(analyser.frequencyBinCount);
  masterGain.connect(analyser).connect(audioCtx.destination);

  const ctx = audioCtx;
  const rev = ctx.createConvolver();
  const revLen = ctx.sampleRate * 2;
  const revBuf = ctx.createBuffer(2, revLen, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = revBuf.getChannelData(ch);
    for (let i = 0; i < revLen; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.8));
  }
  rev.buffer = revBuf;
  const revGain = ctx.createGain();
  revGain.gain.value = 0.3;
  const dryGain = ctx.createGain();
  dryGain.gain.value = 0.7;
  const mixBus = ctx.createGain();

  if (mood === 'focused') {
    // 40Hz binaural + lo-fi drums + minor key melody at 70 BPM
    const bin = createBinaural(ctx, 200, 40);
    bin.connect(mixBus);

    const drums = createDrumPattern(ctx, 70, 'lofi');
    drums.connect(mixBus);

    // D minor melody
    const notes = [293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66, 0,
                   261.63, 293.66, 329.63, 293.66, 261.63, 0, 0, 0];
    const mel = createMelody(ctx, notes, 70, 'triangle', 0.12);
    mel.connect(mixBus);
  }
  else if (mood === 'energized') {
    // Trap drums 140 BPM + major synth + distortion
    const drums = createDrumPattern(ctx, 140, 'trap');
    drums.connect(mixBus);

    // C major energetic
    const notes = [523.25, 659.25, 783.99, 659.25, 523.25, 783.99, 659.25, 523.25,
                   587.33, 698.46, 880.00, 698.46, 587.33, 523.25, 0, 0];
    const mel = createMelody(ctx, notes, 140, 'sawtooth', 0.08);
    // Distortion
    const dist = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) {
      const x = (i * 2) / 256 - 1;
      curve[i] = (Math.PI + 3) * x / (Math.PI + 3 * Math.abs(x));
    }
    dist.curve = curve;
    mel.connect(dist).connect(mixBus);

    // Sub bass
    const sub = ctx.createOscillator();
    sub.type = 'sine';
    sub.frequency.value = 55;
    const sg = ctx.createGain();
    sg.gain.value = 0.2;
    sub.connect(sg).connect(mixBus);
    sub.start();
    activeNodes.push(sub);
  }
  else if (mood === 'calm') {
    // Ambient pad + ocean noise + 528Hz + 60 BPM
    const pad = createPad(ctx, [264, 330, 396, 528], 0.15);
    pad.connect(mixBus);

    // Ocean noise (filtered brown noise)
    const ocean = createNoise(ctx, 'brown');
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 600;
    // Wave-like modulation
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.08;
    const lfoG = ctx.createGain();
    lfoG.gain.value = 300;
    lfo.connect(lfoG).connect(lp.frequency);
    lfo.start();
    const og = ctx.createGain();
    og.gain.value = 0.2;
    ocean.connect(lp).connect(og).connect(mixBus);
    ocean.start();
    activeNodes.push(ocean, lfo);

    // 528Hz healing tone
    const heal = ctx.createOscillator();
    heal.type = 'sine';
    heal.frequency.value = 528;
    const hg = ctx.createGain();
    hg.gain.value = 0.06;
    heal.connect(hg).connect(mixBus);
    heal.start();
    activeNodes.push(heal);

    revGain.gain.value = 0.5;
  }
  else if (mood === 'sad') {
    // Lo-fi piano + rain + minor 7th chords + 65 BPM
    // Piano-like notes (minor 7th: Dm7)
    const notes = [293.66, 349.23, 440.00, 523.25, 0, 0, 349.23, 293.66,
                   261.63, 329.63, 392.00, 0, 293.66, 261.63, 0, 0];
    const mel = createMelody(ctx, notes, 65, 'sine', 0.15);
    // Lo-fi filter
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 2000;
    mel.connect(lp).connect(mixBus);

    // Rain noise
    const rain = createNoise(ctx, 'pink');
    const rlp = ctx.createBiquadFilter();
    rlp.type = 'lowpass';
    rlp.frequency.value = 4000;
    const rg = ctx.createGain();
    rg.gain.value = 0.12;
    rain.connect(rlp).connect(rg).connect(mixBus);
    rain.start();
    activeNodes.push(rain);

    // Chord pad (Dm7: D F A C)
    const pad = createPad(ctx, [146.83, 174.61, 220.00, 261.63], 0.08);
    pad.connect(mixBus);

    revGain.gain.value = 0.5;
  }
  else if (mood === 'stressed') {
    // 10Hz alpha binaural + nature sounds + no drums + 50 BPM
    const bin = createBinaural(ctx, 200, 10);
    bin.connect(mixBus);

    // Nature: layered brown + pink noise, filtered
    const nature1 = createNoise(ctx, 'brown');
    const nlp = ctx.createBiquadFilter();
    nlp.type = 'lowpass';
    nlp.frequency.value = 800;
    const ng = ctx.createGain();
    ng.gain.value = 0.15;
    nature1.connect(nlp).connect(ng).connect(mixBus);
    nature1.start();
    activeNodes.push(nature1);

    // Birds-like: high filtered noise with tremolo
    const birds = createNoise(ctx, 'white');
    const bhp = ctx.createBiquadFilter();
    bhp.type = 'bandpass';
    bhp.frequency.value = 3000;
    bhp.Q.value = 5;
    const blfo = ctx.createOscillator();
    blfo.frequency.value = 3;
    const blfoG = ctx.createGain();
    blfoG.gain.value = 0.02;
    const bg = ctx.createGain();
    bg.gain.value = 0.03;
    blfo.connect(blfoG).connect(bg.gain);
    blfo.start();
    birds.connect(bhp).connect(bg).connect(mixBus);
    birds.start();
    activeNodes.push(birds, blfo);

    // Slow gentle pad
    const pad = createPad(ctx, [174.61, 220.00, 261.63, 329.63], 0.08);
    pad.connect(mixBus);

    revGain.gain.value = 0.6;
  }

  // Route mix bus through reverb
  mixBus.connect(dryGain).connect(masterGain);
  mixBus.connect(rev).connect(revGain).connect(masterGain);

  startVisualization();
}

// ─── VISUALIZATION ───
function startVisualization() {
  const canvas = document.getElementById('viz-canvas');
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const accent = MOODS[currentMood].accent;
  const r = parseInt(accent.slice(1,3),16);
  const g = parseInt(accent.slice(3,5),16);
  const b = parseInt(accent.slice(5,7),16);

  function draw() {
    animFrame = requestAnimationFrame(draw);
    if (!analyser) return;
    analyser.getByteFrequencyData(analyserData);

    c.fillStyle = 'rgba(0,0,0,0.15)';
    c.fillRect(0, 0, w, h);

    const bins = analyserData.length;
    const sliceAngle = (Math.PI * 2) / bins;
    const baseR = 80;
    const time = Date.now() * 0.001;

    // Outer glow
    const avg = analyserData.reduce((a,v)=>a+v,0) / bins;
    const glowR = baseR + 60 + avg * 0.3;
    const grad = c.createRadialGradient(cx, cy, baseR, cx, cy, glowR);
    grad.addColorStop(0, `rgba(${r},${g},${b},0.05)`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = grad;
    c.beginPath();
    c.arc(cx, cy, glowR, 0, Math.PI * 2);
    c.fill();

    // Circular waveform
    c.strokeStyle = `rgba(${r},${g},${b},0.8)`;
    c.lineWidth = 2;
    c.beginPath();
    for (let i = 0; i < bins; i++) {
      const amp = analyserData[i] / 255;
      const radius = baseR + amp * 80;
      const angle = i * sliceAngle - Math.PI / 2;
      const x = cx + Math.cos(angle) * radius;
      const y = cy + Math.sin(angle) * radius;
      if (i === 0) c.moveTo(x, y);
      else c.lineTo(x, y);
    }
    c.closePath();
    c.stroke();

    // Inner ring
    c.strokeStyle = `rgba(${r},${g},${b},0.2)`;
    c.lineWidth = 1;
    c.beginPath();
    c.arc(cx, cy, baseR, 0, Math.PI * 2);
    c.stroke();

    // Floating particles
    for (let i = 0; i < 30; i++) {
      const angle = (i / 30) * Math.PI * 2 + time * 0.2;
      const dist = baseR + 100 + Math.sin(time * 0.5 + i) * 30;
      const px = cx + Math.cos(angle) * dist;
      const py = cy + Math.sin(angle) * dist;
      const size = 1 + analyserData[i % bins] / 255 * 3;
      c.fillStyle = `rgba(${r},${g},${b},${0.1 + analyserData[i % bins] / 255 * 0.5})`;
      c.beginPath();
      c.arc(px, py, size, 0, Math.PI * 2);
      c.fill();
    }

    // Center breathing circle
    const breathR = 20 + Math.sin(time * 0.5) * 8 + avg * 0.05;
    c.fillStyle = `rgba(${r},${g},${b},0.15)`;
    c.beginPath();
    c.arc(cx, cy, breathR, 0, Math.PI * 2);
    c.fill();
  }
  draw();
}

// ─── EXPORT WAV ───
function exportWav() {
  const btn = document.getElementById('export-btn');
  btn.textContent = 'Rendering...';
  btn.disabled = true;

  const duration = 30;
  const offCtx = new OfflineAudioContext(2, 44100 * duration, 44100);
  const offMaster = offCtx.createGain();
  offMaster.gain.value = 0.6;
  offMaster.connect(offCtx.destination);

  // Rebuild current mood audio into offline context
  const mood = currentMood;
  const mixBus = offCtx.createGain();
  const rev = offCtx.createConvolver();
  const revLen = offCtx.sampleRate * 2;
  const revBuf = offCtx.createBuffer(2, revLen, offCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = revBuf.getChannelData(ch);
    for (let i = 0; i < revLen; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (offCtx.sampleRate * 0.8));
  }
  rev.buffer = revBuf;
  const revGain = offCtx.createGain();
  revGain.gain.value = 0.3;
  const dryGain = offCtx.createGain();
  dryGain.gain.value = 0.7;

  // Simplified render per mood
  if (mood === 'focused' || mood === 'calm' || mood === 'sad' || mood === 'stressed') {
    const pad = offCtx.createOscillator();
    pad.type = 'sine';
    pad.frequency.value = mood === 'calm' ? 528 : mood === 'stressed' ? 200 : 293.66;
    const pg = offCtx.createGain();
    pg.gain.value = 0.15;
    pad.connect(pg).connect(mixBus);
    pad.start();
    pad.stop(duration);

    const noise = createNoiseOff(offCtx);
    const lp = offCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = mood === 'calm' ? 600 : mood === 'sad' ? 2000 : 800;
    const ng = offCtx.createGain();
    ng.gain.value = 0.12;
    noise.connect(lp).connect(ng).connect(mixBus);
    noise.start();
    noise.stop(duration);
  } else {
    // energized
    const osc = offCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = 55;
    const og = offCtx.createGain();
    og.gain.value = 0.2;
    osc.connect(og).connect(mixBus);
    osc.start();
    osc.stop(duration);
  }

  mixBus.connect(dryGain).connect(offMaster);
  mixBus.connect(rev).connect(revGain).connect(offMaster);

  offCtx.startRendering().then(buffer => {
    const wav = encodeWav(buffer);
    const blob = new Blob([wav], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `behike-mood-${mood}-${Date.now()}.wav`;
    a.click();
    URL.revokeObjectURL(url);
    btn.textContent = 'Export WAV';
    btn.disabled = false;
  });
}

function createNoiseOff(ctx) {
  const len = ctx.sampleRate * 4;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < len; i++) {
    const w = Math.random() * 2 - 1;
    d[i] = (last + 0.02 * w) / 1.02;
    last = d[i];
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  return src;
}

function encodeWav(buffer) {
  const numCh = buffer.numberOfChannels;
  const sr = buffer.sampleRate;
  const len = buffer.length;
  const bps = 16;
  const byteRate = sr * numCh * bps / 8;
  const blockAlign = numCh * bps / 8;
  const dataSize = len * numCh * bps / 8;
  const headerSize = 44;
  const ab = new ArrayBuffer(headerSize + dataSize);
  const view = new DataView(ab);

  function writeStr(off, str) { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); }
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numCh, true);
  view.setUint32(24, sr, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bps, true);
  writeStr(36, 'data');
  view.setUint32(40, dataSize, true);

  const channels = [];
  for (let ch = 0; ch < numCh; ch++) channels.push(buffer.getChannelData(ch));

  let offset = 44;
  for (let i = 0; i < len; i++) {
    for (let ch = 0; ch < numCh; ch++) {
      let sample = Math.max(-1, Math.min(1, channels[ch][i]));
      sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
      view.setInt16(offset, sample, true);
      offset += 2;
    }
  }
  return ab;
}

// ─── MOOD HISTORY ───
function logMood(mood) {
  const history = JSON.parse(localStorage.getItem('behike_mood_history') || '[]');
  history.push({ mood, timestamp: Date.now() });
  // Keep last 100 entries
  if (history.length > 100) history.splice(0, history.length - 100);
  localStorage.setItem('behike_mood_history', JSON.stringify(history));
  updateHistoryUI();
}

function toggleHistory() {
  const panel = document.getElementById('history-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) updateHistoryUI();
}

function updateHistoryUI() {
  const history = JSON.parse(localStorage.getItem('behike_mood_history') || '[]');
  const now = Date.now();
  const week = 7 * 24 * 60 * 60 * 1000;
  const weekEntries = history.filter(h => now - h.timestamp < week);

  // Stats
  const totalMins = weekEntries.length * 5; // estimate 5 min per session
  document.getElementById('history-stats').textContent =
    `${weekEntries.length} sessions this week. Estimated ${totalMins} minutes of listening.`;

  // Entries list
  const container = document.getElementById('history-entries');
  container.innerHTML = '';
  const recent = history.slice(-10).reverse();
  recent.forEach(entry => {
    const m = MOODS[entry.mood];
    const date = new Date(entry.timestamp);
    const timeStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const div = document.createElement('div');
    div.className = 'history-entry';
    div.innerHTML = `<span class="history-dot" style="background:${m.accent}"></span>
      <span>${m.emoji} ${m.label}</span><span style="margin-left:auto">${timeStr}</span>`;
    container.appendChild(div);
  });

  // Chart
  drawHistoryChart(weekEntries);
}

function drawHistoryChart(entries) {
  const canvas = document.getElementById('history-chart');
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  c.clearRect(0, 0, w, h);

  if (entries.length === 0) {
    c.fillStyle = 'rgba(255,255,255,0.2)';
    c.font = '12px sans-serif';
    c.textAlign = 'center';
    c.fillText('No data yet. Select a mood to start tracking.', w/2, h/2);
    return;
  }

  const moodOrder = ['focused','energized','calm','sad','stressed'];
  const days = [];
  const now = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    days.push(d.toLocaleDateString());
  }

  const barW = (w - 60) / 7;
  days.forEach((day, i) => {
    const dayEntries = entries.filter(e => new Date(e.timestamp).toLocaleDateString() === day);
    const x = 30 + i * barW;

    // Day label
    const shortDay = new Date(now.getTime() - (6-i)*86400000).toLocaleDateString([], {weekday:'short'});
    c.fillStyle = 'rgba(255,255,255,0.3)';
    c.font = '10px sans-serif';
    c.textAlign = 'center';
    c.fillText(shortDay, x + barW/2, h - 4);

    // Stacked dots
    dayEntries.forEach((entry, j) => {
      const m = MOODS[entry.mood];
      c.fillStyle = m.accent;
      c.globalAlpha = 0.7;
      c.beginPath();
      c.arc(x + barW/2, h - 24 - j * 14, 5, 0, Math.PI * 2);
      c.fill();
    });
    c.globalAlpha = 1;
  });
}

// Init history on load
updateHistoryUI();
