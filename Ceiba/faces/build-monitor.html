<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behike Build Monitor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;padding:24px;min-height:100vh}
h1{font-size:28px;font-weight:600;margin-bottom:8px}
.subtitle{color:#6e6e73;font-size:14px;margin-bottom:32px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:32px}
.card{background:#1c1c1e;border-radius:12px;padding:20px;border:1px solid #2c2c2e}
.card.done{border-color:#34C759}
.card.running{border-color:#0A84FF;animation:pulse 2s infinite}
.card.waiting{border-color:#2c2c2e;opacity:0.5}
.card.error{border-color:#FF453A}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(10,132,255,0)}50%{box-shadow:0 0 12px 2px rgba(10,132,255,0.3)}}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:15px;font-weight:600}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:0.5px}
.badge.done{background:#34C75920;color:#34C759}
.badge.running{background:#0A84FF20;color:#0A84FF}
.badge.waiting{background:#6e6e7320;color:#6e6e73}
.badge.error{background:#FF453A20;color:#FF453A}
.card-desc{font-size:13px;color:#8e8e93;line-height:1.5;margin-bottom:12px}
.progress-bar{height:4px;background:#2c2c2e;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width 0.5s ease}
.progress-fill.done{background:#34C759;width:100%}
.progress-fill.running{background:#0A84FF;animation:loading 1.5s infinite}
@keyframes loading{0%{width:20%}50%{width:80%}100%{width:20%}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.stat{background:#1c1c1e;border-radius:12px;padding:16px;text-align:center;border:1px solid #2c2c2e}
.stat-number{font-size:32px;font-weight:700;color:#0A84FF}
.stat-number.gold{color:#D4A843}
.stat-number.green{color:#34C759}
.stat-number.red{color:#FF453A}
.stat-label{font-size:12px;color:#6e6e73;margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.section-title{font-size:18px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.green{background:#34C759}
.dot.blue{background:#0A84FF}
.dot.gray{background:#6e6e73}
.log{background:#1c1c1e;border-radius:12px;padding:20px;border:1px solid #2c2c2e;max-height:300px;overflow-y:auto;font-family:'SF Mono',monospace;font-size:12px;line-height:1.8;color:#8e8e93}
.log-entry{border-bottom:1px solid #2c2c2e20;padding:4px 0}
.log-time{color:#6e6e73}
.log-done{color:#34C759}
.log-run{color:#0A84FF}
.timer{font-size:48px;font-weight:700;text-align:center;margin:16px 0;font-variant-numeric:tabular-nums}
.timer-label{text-align:center;color:#6e6e73;font-size:13px}
</style>
</head>
<body>

<p class="subtitle">Da Vinci Session -- 12 Hour Execution Plan</p>

<div class="stats">
<div class="stat"><div class="stat-number green" id="done-count">0</div><div class="stat-label">Completed</div></div>
<div class="stat"><div class="stat-number" id="running-count">0</div><div class="stat-label">Running</div></div>
<div class="stat"><div class="stat-number gold" id="total-agents">0</div><div class="stat-label">Total Agents</div></div>
<div class="stat"><div class="stat-number red" id="revenue">$0</div><div class="stat-label">Revenue</div></div>
</div>

<div class="timer" id="elapsed">00:00:00</div>
<div class="timer-label">Session elapsed</div>

<div class="section-title" style="margin-top:32px"><span class="dot blue"></span> Current Wave (Hours 1-10)</div>
<div class="grid" id="agents-grid"></div>

<div class="section-title"><span class="dot green"></span> Completed This Session</div>
<div class="grid" id="completed-grid"></div>

<div class="section-title" style="margin-top:24px"><span class="dot gray"></span> Activity Log</div>
<div class="log" id="log"></div>

function render() {
  const running = agents.filter(a => a.status === 'running');
  const done = agents.filter(a => a.status === 'done');
  const waiting = agents.filter(a => a.status === 'waiting');

  document.getElementById('done-count').textContent = done.length;
  document.getElementById('running-count').textContent = running.length;
  document.getElementById('total-agents').textContent = agents.length;

  // Running + waiting grid
  const activeGrid = document.getElementById('agents-grid');
  activeGrid.innerHTML = [...running, ...waiting].map(a => `
    <div class="card ${a.status}">
      <div class="card-header">
        <span class="card-title">${a.name}</span>
        <span class="badge ${a.status}">${a.status === 'running' ? 'BUILDING' : a.status === 'waiting' ? 'QUEUED' : a.status.toUpperCase()}</span>
      </div>
      <div class="card-desc">${a.desc}</div>
      <div style="font-size:11px;color:#6e6e73;margin-bottom:8px">Hours ${a.hour}</div>
      <div class="progress-bar"><div class="progress-fill ${a.status}"></div></div>
    </div>
  `).join('');

  // Completed grid (show last 8)
  const completedGrid = document.getElementById('completed-grid');
  completedGrid.innerHTML = done.slice(-8).reverse().map(a => `
    <div class="card done">
      <div class="card-header">
        <span class="card-title">${a.name}</span>
        <span class="badge done">DONE</span>
      </div>
      <div class="card-desc">${a.desc}</div>
      <div class="progress-bar"><div class="progress-fill done"></div></div>
    </div>
  `).join('');
}

function updateTimer() {
  const now = new Date();
  const diff = Math.floor((now - SESSION_START) / 1000);
  const h = Math.floor(diff / 3600).toString().padStart(2, '0');
  const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
  const s = (diff % 60).toString().padStart(2, '0');
  document.getElementById('elapsed').textContent = `${h}:${m}:${s}`;
}

function addLog(msg, type='run') {
  const log = document.getElementById('log');
  const now = new Date().toLocaleTimeString();
  log.innerHTML = `<div class="log-entry"><span class="log-time">${now}</span> <span class="log-${type}">${msg}</span></div>` + log.innerHTML;
}

// Initial logs
const completedNames = agents.filter(a => a.status === 'done').map(a => a.name);
completedNames.slice(-10).forEach(n => addLog(`${n} completed`, 'done'));
agents.filter(a => a.status === 'running').forEach(a => addLog(`${a.name} building...`, 'run'));

render();
setInterval(updateTimer, 1000);
updateTimer();

// Auto-refresh page every 30 seconds to pick up manual status changes
// To update: edit the agents array status from 'running' to 'done'
setInterval(() => { render(); }, 30000);
</script>
</body>
</html>
