<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behique Command Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
/* ============ N64 RETRO BASE ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --card: #0f3460;
  --border: #e94560;
  --border2: #533483;
  --text: #eee;
  --text-dim: #8899aa;
  --gold: #ffd700;
  --green: #00ff88;
  --red: #ff3366;
  --cyan: #00d4ff;
  --purple: #b388ff;
  --orange: #ff9f43;
  --pixel: 'Press Start 2P', monospace;
  --chunk: 4px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--pixel);
  font-size: 10px;
  line-height: 1.6;
  min-height: 100vh;
  image-rendering: pixelated;
}

/* Scanline overlay */
body::after {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(transparent 0 2px, rgba(0,0,0,0.08) 2px 4px);
}

/* ============ LAYOUT ============ */
.hub { max-width: 1200px; margin: 0 auto; padding: 16px; }

.header {
  text-align: center;
  padding: 20px 0;
  border: var(--chunk) solid var(--border);
  background: var(--bg2);
  margin-bottom: 0;
  position: relative;
}
.header::before, .header::after {
  content: "\2605";
  position: absolute;
  top: 8px;
  color: var(--gold);
  font-size: 14px;
  animation: spin 3s linear infinite;
}
.header::before { left: 12px; }
.header::after { right: 12px; animation-direction: reverse; }
@keyframes spin { 100% { transform: rotate(360deg); } }

.header h1 {
  font-size: 16px;
  color: var(--gold);
  text-shadow: 2px 2px 0 #000, 0 0 10px rgba(255,215,0,0.5);
  letter-spacing: 2px;
}
.header .subtitle { font-size: 8px; color: var(--text-dim); margin-top: 6px; }
.header .timestamp { font-size: 7px; color: var(--cyan); margin-top: 4px; }

/* ============ TABS ============ */
.tab-bar {
  display: flex;
  border-left: var(--chunk) solid var(--border);
  border-right: var(--chunk) solid var(--border);
  background: var(--card);
}
.tab {
  flex: 1;
  padding: 10px 8px;
  text-align: center;
  font-family: var(--pixel);
  font-size: 8px;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  background: transparent;
  border-top: none;
  border-left: none;
  border-right: 1px solid var(--border2);
}
.tab:last-child { border-right: none; }
.tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
  background: var(--bg2);
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 16px;
  margin-top: 16px;
}

/* ============ PANELS ============ */
.panel {
  border: var(--chunk) solid var(--border2);
  background: var(--bg2);
  overflow: hidden;
  transition: border-color 0.2s;
}
.panel:hover { border-color: var(--border); }

.panel-header {
  background: var(--card);
  padding: 10px 12px;
  border-bottom: 3px solid var(--border2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-header .icon { font-size: 14px; }
.panel-header h2 {
  font-size: 9px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.panel-body { padding: 12px; }

/* ============ STAT ROWS ============ */
.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px dashed rgba(255,255,255,0.08);
}
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--text-dim); font-size: 8px; }
.stat-value { color: var(--text); font-size: 9px; font-weight: bold; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.gold { color: var(--gold); }
.stat-value.cyan { color: var(--cyan); }
.stat-value.orange { color: var(--orange); }

/* ============ HEALTH BAR ============ */
.health-bar {
  height: 14px;
  background: #1a1a1a;
  border: 2px solid var(--border2);
  margin: 6px 0;
  position: relative;
  overflow: hidden;
}
.health-fill { height: 100%; transition: width 0.5s; position: relative; }
.health-fill.high { background: var(--green); }
.health-fill.mid { background: var(--orange); }
.health-fill.low { background: var(--red); }
.health-fill::after {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 50%;
  background: rgba(255,255,255,0.2);
}
.health-label {
  position: absolute;
  top: 0; right: 6px;
  font-size: 7px;
  line-height: 14px;
  color: #000;
  font-weight: bold;
  z-index: 1;
}

/* ============ COMMIT LOG ============ */
.commit-list { list-style: none; padding: 0; }
.commit-item {
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 7px;
  display: flex;
  gap: 6px;
}
.commit-hash { color: var(--cyan); flex-shrink: 0; }
.commit-msg { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ============ TASK LIST ============ */
.task-item {
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 8px;
  display: flex;
  gap: 6px;
  align-items: flex-start;
}
.task-icon { flex-shrink: 0; font-size: 10px; }
.task-name { color: var(--text); }
.task-item.completed .task-name { color: var(--text-dim); text-decoration: line-through; }

/* ============ BACKLOG BARS ============ */
.backlog-bar-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.backlog-label { width: 60px; font-size: 7px; color: var(--text-dim); text-align: right; }
.backlog-bar { flex: 1; height: 12px; background: #1a1a1a; border: 2px solid var(--border2); overflow: hidden; }
.backlog-bar-fill { height: 100%; position: relative; }
.backlog-bar-fill::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 50%; background: rgba(255,255,255,0.15); }
.backlog-count { width: 30px; font-size: 8px; color: var(--text); font-weight: bold; }

/* ============ CLUSTER STATUS ============ */
.cluster-node { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px dashed rgba(255,255,255,0.08); }
.cluster-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; animation: pulse 2s infinite; }
.cluster-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
.cluster-dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red); animation: none; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.cluster-name { font-size: 9px; font-weight: bold; }
.cluster-detail { font-size: 7px; color: var(--text-dim); }

/* ============ REVENUE BANNER ============ */
.revenue-banner {
  border: var(--chunk) solid var(--gold);
  background: rgba(255,215,0,0.05);
  padding: 12px;
  margin-top: 16px;
  text-align: center;
}
.revenue-amount { font-size: 24px; color: var(--gold); text-shadow: 2px 2px 0 #000; }
.revenue-label { font-size: 7px; color: var(--text-dim); margin-top: 4px; }
.revenue-note { font-size: 7px; color: var(--orange); margin-top: 6px; }

/* ============ QUEST STYLES ============ */
.quest-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 12px;
  background: var(--card);
  border: var(--chunk) solid var(--border2);
  margin-top: 16px;
}
.filter-btn {
  font-family: var(--pixel);
  font-size: 7px;
  padding: 6px 10px;
  background: var(--bg);
  color: var(--text-dim);
  border: 2px solid var(--border2);
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--border); color: var(--text); }
.filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.08); }
.filter-group { display: flex; align-items: center; gap: 4px; }
.filter-label { font-size: 6px; color: var(--text-dim); margin-right: 4px; text-transform: uppercase; }

.quest-list { margin-top: 12px; }

.quest-card {
  border: var(--chunk) solid var(--border2);
  background: var(--bg2);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.quest-card:hover { border-color: var(--border); }
.quest-card.locked { opacity: 0.4; filter: grayscale(0.3); }

.quest-card-head {
  background: var(--card);
  padding: 10px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 3px solid var(--border2);
  cursor: pointer;
}
.quest-card-head h3 { font-size: 9px; color: var(--gold); }
.quest-type-badge {
  font-size: 6px;
  padding: 3px 6px;
  border: 1px solid;
  text-transform: uppercase;
}
.quest-type-badge.MAIN { color: var(--red); border-color: var(--red); }
.quest-type-badge.SIDE { color: var(--cyan); border-color: var(--cyan); }
.quest-type-badge.FUTURE { color: var(--purple); border-color: var(--purple); }

.quest-progress {
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.quest-progress .health-bar { flex: 1; margin: 0; }
.quest-pct { font-size: 8px; font-weight: bold; width: 40px; text-align: right; }

.quest-objectives {
  padding: 0 12px 12px;
  display: none;
}
.quest-card.expanded .quest-objectives { display: block; }

.obj-item {
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 7px;
  display: flex;
  gap: 6px;
  align-items: flex-start;
}
.obj-item.done { opacity: 0.5; }
.obj-item.done .obj-text { text-decoration: line-through; }
.obj-text { flex: 1; }
.obj-diff {
  font-size: 6px;
  padding: 2px 5px;
  border: 1px solid;
  flex-shrink: 0;
}
.obj-diff.very_easy { color: var(--green); border-color: var(--green); }
.obj-diff.easy { color: #66ffaa; border-color: #66ffaa; }
.obj-diff.medium { color: var(--cyan); border-color: var(--cyan); }
.obj-diff.hard { color: var(--orange); border-color: var(--orange); }
.obj-diff.very_hard { color: var(--red); border-color: var(--red); }
.obj-time { font-size: 6px; color: var(--text-dim); flex-shrink: 0; }

/* ============ BROWSE TAB STYLES ============ */
.browse-search {
  display: flex;
  gap: 8px;
  padding: 12px;
  background: var(--card);
  border: var(--chunk) solid var(--border2);
  margin-top: 16px;
  align-items: center;
}
.browse-search input {
  flex: 1;
  font-family: var(--pixel);
  font-size: 8px;
  padding: 8px 12px;
  background: var(--bg);
  color: var(--cyan);
  border: 2px solid var(--border2);
  outline: none;
  transition: border-color 0.2s;
}
.browse-search input:focus { border-color: var(--cyan); }
.browse-search input::placeholder { color: var(--text-dim); }

.browse-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 12px;
  background: var(--card);
  border-left: var(--chunk) solid var(--border2);
  border-right: var(--chunk) solid var(--border2);
  border-bottom: var(--chunk) solid var(--border2);
}

.browse-stats {
  display: flex;
  gap: 16px;
  padding: 10px 12px;
  background: rgba(0,212,255,0.03);
  border: var(--chunk) solid var(--border2);
  margin-top: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.browse-stat { text-align: center; }
.browse-stat-num { font-size: 12px; font-weight: bold; }
.browse-stat-label { font-size: 6px; color: var(--text-dim); margin-top: 2px; }

.obj-quest-tag {
  font-size: 5px;
  padding: 2px 4px;
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--text-dim);
  flex-shrink: 0;
  max-width: 100px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.obj-reward { font-size: 6px; color: var(--gold); flex-shrink: 0; }

.toggle-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.toggle-label { font-size: 6px; color: var(--text-dim); }
.toggle-switch {
  width: 28px; height: 14px;
  background: var(--bg);
  border: 2px solid var(--border2);
  cursor: pointer;
  position: relative;
  display: inline-block;
}
.toggle-switch.on { border-color: var(--green); }
.toggle-switch.on::after { left: 14px; background: var(--green); }
.toggle-switch::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  top: 1px; left: 2px;
  background: var(--text-dim);
  transition: all 0.2s;
}

/* Completed quest */
.completed-card {
  border: var(--chunk) solid rgba(255,215,0,0.3);
  background: rgba(255,215,0,0.03);
  padding: 10px 12px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.completed-card h3 { font-size: 8px; color: var(--gold); }
.completed-card .reward { font-size: 7px; color: var(--text-dim); }
.completed-card .date { font-size: 6px; color: var(--cyan); }

/* Sort indicator */
.sort-label { font-size: 6px; color: var(--gold); margin-left: auto; }

/* ============ REFRESH & FOOTER ============ */
.refresh-bar { text-align: center; padding: 12px; font-size: 7px; color: var(--text-dim); }
.refresh-bar button {
  font-family: var(--pixel);
  font-size: 8px;
  background: var(--card);
  color: var(--cyan);
  border: 2px solid var(--border2);
  padding: 6px 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.refresh-bar button:hover { border-color: var(--border); color: var(--gold); }
.focus-box { background: rgba(0,212,255,0.05); border: 2px solid var(--cyan); padding: 8px; font-size: 8px; color: var(--cyan); line-height: 1.8; word-break: break-word; }
.loading { text-align: center; padding: 40px; font-size: 10px; color: var(--cyan); animation: blink 1s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.footer { text-align: center; padding: 16px; font-size: 6px; color: var(--text-dim); border-top: 2px solid var(--border2); margin-top: 16px; }

/* ============ MAP TAB ============ */
#quest-graph {
  width: 100%;
  height: 520px;
  border: var(--chunk) solid var(--border2);
  background: var(--bg2);
  margin-top: 16px;
}
.map-legend {
  display: flex;
  gap: 16px;
  padding: 10px 12px;
  background: var(--card);
  border: var(--chunk) solid var(--border2);
  margin-top: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.map-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 6px;
  color: var(--text-dim);
}
.map-legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.map-info {
  padding: 12px;
  background: var(--card);
  border: var(--chunk) solid var(--border2);
  margin-top: 8px;
  display: none;
}
.map-info.visible { display: block; }
.map-info h3 { font-size: 10px; color: var(--gold); margin-bottom: 8px; }
.map-info .map-info-meta { font-size: 7px; color: var(--text-dim); margin-bottom: 8px; }

/* ============ THEME TOGGLE ============ */
.theme-toggle {
  position: absolute;
  top: 8px;
  right: 40px;
  display: flex;
  gap: 4px;
  z-index: 10;
}
.theme-btn {
  font-family: var(--pixel);
  font-size: 6px;
  padding: 3px 6px;
  border: 2px solid var(--border2);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--gold); color: var(--text); }
.theme-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.1); }

/* ============ MONO THEME (low-dopamine) ============ */
[data-theme="mono"] {
  --bg: #111;
  --bg2: #1a1a1a;
  --card: #222;
  --border: #555;
  --border2: #444;
  --text: #ccc;
  --text-dim: #777;
  --gold: #aaa;
  --green: #999;
  --red: #888;
  --cyan: #aaa;
  --purple: #888;
  --orange: #999;
}
[data-theme="mono"] body::after { display: none; }
[data-theme="mono"] .header { border-color: #555; }
[data-theme="mono"] .header h1 { text-shadow: none; }
[data-theme="mono"] .header::before,
[data-theme="mono"] .header::after { display: none; }
[data-theme="mono"] .quest-card { border-left-color: #666; }
[data-theme="mono"] .health-fill { background: #888 !important; }

/* ============ PASTEL THEME ============ */
[data-theme="pastel"] {
  --bg: #f4f0ec;
  --bg2: #ebe5df;
  --card: #fff;
  --border: #d4a5a5;
  --border2: #c9b8d4;
  --text: #3d3d3d;
  --text-dim: #8a8a8a;
  --gold: #c9955d;
  --green: #7db88f;
  --red: #d4a5a5;
  --cyan: #7baac9;
  --purple: #b8a5d4;
  --orange: #d4b88f;
}
[data-theme="pastel"] body::after { display: none; }
[data-theme="pastel"] .header { border-color: #c9b8d4; }
[data-theme="pastel"] .header h1 { color: #7d6b5d; text-shadow: none; }
[data-theme="pastel"] .header::before,
[data-theme="pastel"] .header::after { display: none; }
[data-theme="pastel"] .tab.active { border-color: #c9955d; color: #7d6b5d; }
[data-theme="pastel"] .quest-type-badge.MAIN { background: #d4a5a5; color: #fff; }
[data-theme="pastel"] .quest-type-badge.SIDE { background: #7baac9; color: #fff; }
[data-theme="pastel"] .quest-type-badge.FUTURE { background: #b8a5d4; color: #fff; }
</style>
</head>

function parseTimeToMinutes(t) {
  if (!t) return 999;
  const s = t.toLowerCase().trim();
  const val = parseFloat(s);
  const unit = s.replace(/[\d.\-\s]/g, '');
  if (unit.startsWith('m')) return val;
  if (unit.startsWith('h')) return val * 60;
  if (unit.startsWith('d')) return val * 60 * 24;
  if (unit.startsWith('w')) return val * 60 * 24 * 7;
  return val * 60;
}

async function loadQuestData() {
  try {
    const resp = await fetch('./quests.json?t=' + Date.now());
    if (!resp.ok) throw new Error('not found');
    const data = await resp.json();
    if (data.missions) {
      QUEST_DATA.missions = data.missions;
      QUEST_DATA.completed_missions = data.completed_missions || QUEST_DATA.completed_missions;
    }
    if (data.dependencies) {
      QUEST_DEPS = data.dependencies;
    }
    return true;
  } catch(e) { return false; }
}

/* ============ QUESTS TAB (original quest card system) ============ */
function renderQuestsTab() {
  const missions = QUEST_DATA.missions;

  // Global stats
  let allObjs = [];
  missions.forEach(m => { m.objectives.forEach(o => allObjs.push(o)); });
  const totalObj = allObjs.length;
  const doneObj = allObjs.filter(o => o.done).length;
  const globalPct = Math.round(doneObj / totalObj * 100);

  // Filter
  let filtered = [...missions];
  if (questTypeFilter !== 'all') filtered = filtered.filter(m => m.type === questTypeFilter);
  if (questStatusFilter !== 'all') filtered = filtered.filter(m => m.status === questStatusFilter);

  // Sort quests
  if (questSort === 'easy_first') {
    filtered.sort((a,b) => {
      const aMin = Math.min(...a.objectives.filter(o=>!o.done).map(o=>DIFF_ORDER[o.difficulty]||3));
      const bMin = Math.min(...b.objectives.filter(o=>!o.done).map(o=>DIFF_ORDER[o.difficulty]||3));
      return aMin - bMin;
    });
  } else if (questSort === 'hard_first') {
    filtered.sort((a,b) => {
      const aMax = Math.max(...a.objectives.filter(o=>!o.done).map(o=>DIFF_ORDER[o.difficulty]||3));
      const bMax = Math.max(...b.objectives.filter(o=>!o.done).map(o=>DIFF_ORDER[o.difficulty]||3));
      return bMax - aMax;
    });
  } else if (questSort === 'progress') {
    filtered.sort((a,b) => {
      const aPct = a.objectives.filter(o=>o.done).length / a.objectives.length;
      const bPct = b.objectives.filter(o=>o.done).length / b.objectives.length;
      return bPct - aPct;
    });
  }

  document.getElementById('tab-quests').innerHTML = `
    <div style="padding:12px 0;text-align:center">
      <div style="font-size:9px;color:var(--gold);margin-bottom:6px">GLOBAL PROGRESS</div>
      <div class="health-bar" style="max-width:500px;margin:0 auto">
        <div class="health-fill ${healthClass(globalPct)}" style="width:${globalPct}%"></div>
        <span class="health-label">${doneObj}/${totalObj}</span>
      </div>
      <div style="font-size:7px;color:var(--text-dim);margin-top:4px">${globalPct}% complete across all quests</div>
    </div>
    <div class="quest-filters">
      <div class="filter-group">
        <span class="filter-label">Sort:</span>
        <button class="filter-btn ${questSort==='easy_first'?'active':''}" onclick="setQuestSort('easy_first')">EASY\u2192HARD</button>
        <button class="filter-btn ${questSort==='hard_first'?'active':''}" onclick="setQuestSort('hard_first')">HARD\u2192EASY</button>
        <button class="filter-btn ${questSort==='progress'?'active':''}" onclick="setQuestSort('progress')">BY PROGRESS</button>
      </div>
      <div class="filter-group">
        <span class="filter-label">Type:</span>
        <button class="filter-btn ${questTypeFilter==='all'?'active':''}" onclick="setTypeFilter('all')">ALL</button>
        <button class="filter-btn ${questTypeFilter==='MAIN'?'active':''}" onclick="setTypeFilter('MAIN')">MAIN</button>
        <button class="filter-btn ${questTypeFilter==='SIDE'?'active':''}" onclick="setTypeFilter('SIDE')">SIDE</button>
        <button class="filter-btn ${questTypeFilter==='FUTURE'?'active':''}" onclick="setTypeFilter('FUTURE')">FUTURE</button>
      </div>
      <div class="filter-group">
        <span class="filter-label">Status:</span>

/* ============ BROWSE TAB (flat objectives search/sort) ============ */
function renderBrowseTab() {
  // Flatten all objectives
  let allObjs = [];
  QUEST_DATA.missions.forEach(m => {
    m.objectives.forEach(o => {
      allObjs.push({ ...o, questName: m.name, questType: m.type, questStatus: m.status, questId: m.id });
    });
  });

  // Filter by search
  let objs = [...allObjs];
  if (browseSearch) {
    const q = browseSearch.toLowerCase();
    objs = objs.filter(o => o.text.toLowerCase().includes(q) || o.questName.toLowerCase().includes(q));
  }
  if (browseHideDone) objs = objs.filter(o => !o.done);

  // Sort
  switch(browseSort) {
    case 'easy_first': objs.sort((a,b) => (DIFF_ORDER[a.difficulty]||3)-(DIFF_ORDER[b.difficulty]||3)); break;
    case 'hard_first': objs.sort((a,b) => (DIFF_ORDER[b.difficulty]||3)-(DIFF_ORDER[a.difficulty]||3)); break;
    case 'reward': objs.sort((a,b) => (b.reward_tier||0)-(a.reward_tier||0)); break;
    case 'time_fast': objs.sort((a,b) => parseTimeToMinutes(a.time_est)-parseTimeToMinutes(b.time_est)); break;
    case 'time_slow': objs.sort((a,b) => parseTimeToMinutes(b.time_est)-parseTimeToMinutes(a.time_est)); break;
    case 'name': objs.sort((a,b) => a.text.localeCompare(b.text)); break;
  }

  // Stats
  const remaining = objs.filter(o => !o.done).length;
  const quickWins = objs.filter(o => !o.done && parseTimeToMinutes(o.time_est) <= 60).length;
  const highReward = objs.filter(o => !o.done && (o.reward_tier||0) >= 4).length;

  document.getElementById('tab-browse').innerHTML = `
    <div class="browse-search">
      <input id="browse-search-input" type="text" placeholder="SEARCH OBJECTIVES..." value="${browseSearch}" oninput="onBrowseSearch(this.value)">
      <div class="toggle-row">
        <div class="toggle-switch ${browseHideDone?'on':''}" onclick="toggleBrowseHideDone()"></div>
        <span class="toggle-label">HIDE DONE</span>
      </div>
    </div>
    <div class="browse-filters">
      <div class="filter-group">
        <span class="filter-label">Sort:</span>
        <button class="filter-btn ${browseSort==='easy_first'?'active':''}" onclick="setBrowseSort('easy_first')">EASY\u2192HARD</button>
        <button class="filter-btn ${browseSort==='hard_first'?'active':''}" onclick="setBrowseSort('hard_first')">HARD\u2192EASY</button>
        <button class="filter-btn ${browseSort==='reward'?'active':''}" onclick="setBrowseSort('reward')">\u2B50 REWARD</button>
        <button class="filter-btn ${browseSort==='time_fast'?'active':''}" onclick="setBrowseSort('time_fast')">\u23F1 QUICK WINS</button>
        <button class="filter-btn ${browseSort==='time_slow'?'active':''}" onclick="setBrowseSort('time_slow')">\uD83D\uDC22 BIG</button>
        <button class="filter-btn ${browseSort==='name'?'active':''}" onclick="setBrowseSort('name')">A\u2192Z</button>
      </div>
    </div>
    <div class="browse-stats">
      <div class="browse-stat"><div class="browse-stat-num" style="color:var(--cyan)">${objs.length}</div><div class="browse-stat-label">SHOWING</div></div>
      <div class="browse-stat"><div class="browse-stat-num" style="color:var(--orange)">${remaining}</div><div class="browse-stat-label">REMAINING</div></div>
      <div class="browse-stat"><div class="browse-stat-num" style="color:var(--green)">${quickWins}</div><div class="browse-stat-label">QUICK WINS (&lt;1h)</div></div>
      <div class="browse-stat"><div class="browse-stat-num" style="color:var(--gold)">${highReward}</div><div class="browse-stat-label">HIGH REWARD (4-5\u2B50)</div></div>
    </div>
    <div style="margin-top:8px">
      ${objs.map(o => `
        <div class="obj-item ${o.done?'done':''}">
          <span style="font-size:9px">${o.done?'\u2705':'\u2B1C'}</span>
          <span class="obj-text">${o.text}</span>
          <span class="obj-quest-tag">${o.questName}</span>
          <span class="obj-reward">${'\u2B50'.repeat(o.reward_tier||0)}</span>
          <span class="obj-diff ${o.difficulty}">${DIFF_LABELS[o.difficulty]||o.difficulty}</span>
          <span class="obj-time">${o.time_est||''}</span>
        </div>
      `).join('')}
      ${objs.length === 0 ? '<div style="text-align:center;padding:30px;color:var(--text-dim);font-size:8px">No objectives match your search</div>' : ''}
    </div>
  `;
}

/* ============ MAP TAB (vis.js quest graph) ============ */
function renderMapTab() {
  const missions = QUEST_DATA.missions;

  document.getElementById('tab-map').innerHTML = `
    <div class="map-legend">
      <div class="map-legend-item"><div class="map-legend-dot" style="background:#ff3366"></div>MAIN QUEST</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:#00d4ff"></div>SIDE QUEST</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:#b388ff"></div>FUTURE</div>
      <div class="map-legend-item" style="font-size:5px;color:var(--text-dim)">NODE SIZE = PROGRESS | HOVER = PATHS | CLICK = INSPECT</div>
    </div>
    <div id="quest-graph"></div>
    <div class="map-info" id="map-info"></div>
  `;

  // Build vis.js nodes
  const typeColors = { MAIN: '#ff3366', SIDE: '#00d4ff', FUTURE: '#b388ff' };
  const typeColorBorder = { MAIN: '#cc2952', SIDE: '#009ec2', FUTURE: '#8a5fcc' };

  const nodes = missions.map(m => {
    const done = m.objectives.filter(o => o.done).length;
    const total = m.objectives.length;
    const pct = done / total;
    const baseSize = 25;
    const size = baseSize + pct * 30; // 25-55 based on progress
    const color = typeColors[m.type] || '#888';
    const borderColor = typeColorBorder[m.type] || '#666';
    const opacity = m.status === 'locked' ? 0.3 : 1;

    return {
      id: m.id,
      label: m.name.replace(/ /g, '\n'),
      size: size,
      color: {
        background: color + (m.status === 'locked' ? '44' : 'cc'),
        border: borderColor,
        highlight: { background: '#ffd700', border: '#ffd700' },
        hover: { background: color, border: '#ffd700' }
      },
      font: {
        color: m.status === 'locked' ? '#555' : '#eee',
        face: "'Press Start 2P', monospace",
        size: 8,
        strokeWidth: 2,
        strokeColor: '#000'
      },
      borderWidth: 3,
      shadow: { enabled: true, color: color + '44', size: 15, x: 0, y: 0 },
      title: `${m.name} — ${Math.round(pct*100)}% (${done}/${total})`,
      _quest: m
    };
  });

  // Build vis.js edges
  const edges = QUEST_DEPS.map((dep, i) => ({
    id: 'e' + i,
    from: dep[0],
    to: dep[1],
    label: dep[2],
    arrows: { to: { enabled: true, scaleFactor: 0.6 } },
    color: { color: '#533483', highlight: '#ffd700', hover: '#e94560' },
    font: { color: '#556', size: 6, face: "'Press Start 2P', monospace", strokeWidth: 1, strokeColor: '#000' },
    width: 1.5,
    smooth: { type: 'curvedCW', roundness: 0.15 },
    hoverWidth: 0.5
  }));

  // Create network
  const container = document.getElementById('quest-graph');
  if (!container) return;

  const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
  const options = {
    physics: {
      solver: 'forceAtlas2Based',
      forceAtlas2Based: {
        gravitationalConstant: -80,
        centralGravity: 0.01,
        springLength: 180,
        springConstant: 0.04,
        damping: 0.4
      },
      stabilization: { iterations: 150, fit: true }
    },
    interaction: {
      hover: true,
      tooltipDelay: 200,
      zoomView: true,
      dragView: true
    },
    layout: { randomSeed: 42 }
  };

  questNetwork = new vis.Network(container, data, options);

  // Hover handler — highlight connected paths
  questNetwork.on('hoverNode', function(params) {
    const hoveredId = params.node;
    // Find all connected node IDs (direct dependencies)
    const connectedNodes = new Set([hoveredId]);
    const connectedEdges = new Set();

    QUEST_DEPS.forEach((dep, i) => {
      if (dep[0] === hoveredId || dep[1] === hoveredId) {
        connectedNodes.add(dep[0]);
        connectedNodes.add(dep[1]);
        connectedEdges.add('e' + i);
      }
    });

    // Walk 2nd-degree connections for full path visibility
    const firstDegree = new Set(connectedNodes);
    QUEST_DEPS.forEach((dep, i) => {
      if (firstDegree.has(dep[0]) || firstDegree.has(dep[1])) {
        connectedNodes.add(dep[0]);
        connectedNodes.add(dep[1]);
        connectedEdges.add('e' + i);
      }
    });

    // Dim non-connected nodes
    const updatedNodes = nodes.map(n => {
      if (connectedNodes.has(n.id)) {
        const isHovered = n.id === hoveredId;
        return {
          id: n.id,
          opacity: 1,
          borderWidth: isHovered ? 5 : 3,
          shadow: { enabled: true, color: isHovered ? '#ffd70088' : (n.color.background || '#333') + '44', size: isHovered ? 25 : 15, x: 0, y: 0 },
          font: { ...n.font, color: '#eee' }
        };
      } else {
        return {
          id: n.id,
          opacity: 0.15,
          borderWidth: 1,
          shadow: { enabled: false },
          font: { ...n.font, color: '#333' }
        };
      }
    });
    data.nodes.update(updatedNodes);

    // Highlight connected edges, dim others
    const updatedEdges = edges.map(e => {
      if (connectedEdges.has(e.id)) {
        return { id: e.id, color: { color: '#e94560', highlight: '#ffd700' }, width: 3, font: { ...e.font, color: '#e94560' } };
      } else {
        return { id: e.id, color: { color: '#53348322' }, width: 0.5, font: { ...e.font, color: 'transparent' } };
      }
    });
    data.edges.update(updatedEdges);
  });

  // Blur handler — restore all nodes
  questNetwork.on('blurNode', function(params) {
    const restoredNodes = nodes.map(n => ({
      id: n.id,
      opacity: 1,
      borderWidth: 3,
      shadow: n.shadow,
      font: n.font
    }));
    data.nodes.update(restoredNodes);

    const restoredEdges = edges.map(e => ({
      id: e.id,
      color: e.color,
      width: e.width,
      font: e.font
    }));
    data.edges.update(restoredEdges);
  });

  // Click handler — show quest details
  questNetwork.on('click', function(params) {
    const infoEl = document.getElementById('map-info');
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      const node = nodes.find(n => n.id === nodeId);
      if (!node || !node._quest) return;

      const m = node._quest;
      const done = m.objectives.filter(o => o.done).length;
      const total = m.objectives.length;
      const pct = Math.round(done / total * 100);

      // Find connected quests
      const connections = QUEST_DEPS
        .filter(d => d[0] === m.id || d[1] === m.id)
        .map(d => {
          const otherId = d[0] === m.id ? d[1] : d[0];
          const other = missions.find(mm => mm.id === otherId);
          const dir = d[0] === m.id ? '\u2192' : '\u2190';
          return `<span style="color:var(--cyan)">${dir} ${other ? other.name : otherId}</span> <span style="color:var(--text-dim);font-size:5px">(${d[2]})</span>`;
        });

      infoEl.innerHTML = `
        <h3>${m.name} <span class="quest-type-badge ${m.type}" style="font-size:6px;vertical-align:middle">${m.type}</span></h3>
        <div class="map-info-meta">${pct}% complete \u2022 ${done}/${total} objectives \u2022 ${'★'.repeat(m.reward_tier)} \u2022 ${m.reward}</div>
        <div class="health-bar" style="max-width:400px"><div class="health-fill ${healthClass(pct)}" style="width:${pct}%"></div></div>
        <div style="margin-top:8px">
          ${m.objectives.map(o => `
            <div class="obj-item ${o.done?'done':''}" style="padding:3px 0">
              <span style="font-size:8px">${o.done?'\u2705':'\u2B1C'}</span>
              <span class="obj-text">${o.text}</span>
              <span class="obj-diff ${o.difficulty}">${DIFF_LABELS[o.difficulty]}</span>
              <span class="obj-time">${o.time_est||''}</span>
            </div>
          `).join('')}
        </div>
        ${connections.length > 0 ? `
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border2)">
            <div style="font-size:7px;color:var(--gold);margin-bottom:4px">CONNECTIONS</div>
            ${connections.map(c => `<div style="font-size:7px;padding:2px 0">${c}</div>`).join('')}
          </div>
        ` : ''}
      `;
      infoEl.classList.add('visible');
    } else {
      infoEl.classList.remove('visible');
    }
  });
}

  { id: 'ebay', name: 'Post eBay Listing', icon: '\uD83D\uDCE6', category: 'revenue' },
  { id: 'code', name: 'Code 25min', icon: '\uD83D\uDCBB', category: 'build' },

  { id: 'pray', name: 'Prayer / Reflection', icon: '\uD83D\uDE4F', category: 'faith' },
  { id: 'family', name: 'Family Time', icon: '\u2764\uFE0F', category: 'relationships' },
  { id: 'capture', name: 'Capture Ideas', icon: '\uD83D\uDCA1', category: 'build' },
];

const CATEGORY_COLORS = {
  revenue: 'var(--gold)', build: 'var(--cyan)', health: 'var(--green)',
  growth: 'var(--purple)', faith: 'var(--orange)', relationships: 'var(--red)',
};

function getHabitStorage() {
  try {
    return JSON.parse(localStorage.getItem('behique_habits') || '{}');
  } catch(e) { return {}; }
}

function saveHabitStorage(data) {
  localStorage.setItem('behique_habits', JSON.stringify(data));
}

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function getStreak(habitId) {
  const data = getHabitStorage();
  let streak = 0;
  const d = new Date();
  // Check if today is done — if so, start streak from today
  const todayDone = data[todayKey()]?.[habitId];
  if (!todayDone) {
    // Check yesterday as the start point
    d.setDate(d.getDate() - 1);
  }
  for (let i = 0; i < 365; i++) {
    const key = d.toISOString().slice(0, 10);
    if (data[key]?.[habitId]) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

function getLast7Days(habitId) {
  const data = getHabitStorage();
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    days.push({
      day: d.toLocaleDateString('en', { weekday: 'short' }).slice(0,2).toUpperCase(),
      done: !!data[key]?.[habitId],
      date: key,
    });
  }
  return days;
}

function toggleHabit(habitId) {
  const data = getHabitStorage();
  const today = todayKey();
  if (!data[today]) data[today] = {};
  data[today][habitId] = !data[today][habitId];
  saveHabitStorage(data);
  renderHabitsTab();
}

function renderHabitsTab() {
  const el = document.getElementById('tab-habits');
  if (!el) return;

  const today = todayKey();
  const data = getHabitStorage();
  const todayData = data[today] || {};
  const doneCount = DEFAULT_HABITS.filter(h => todayData[h.id]).length;
  const totalCount = DEFAULT_HABITS.length;
  const pct = Math.round((doneCount / totalCount) * 100);

  // Weekly stats
  let weekTotal = 0, weekPossible = 0;
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    const dayData = data[key] || {};
    weekPossible += totalCount;
    weekTotal += DEFAULT_HABITS.filter(h => dayData[h.id]).length;
  }
  const weekPct = weekPossible > 0 ? Math.round((weekTotal / weekPossible) * 100) : 0;

  // Best streak across all habits
  const bestStreak = Math.max(...DEFAULT_HABITS.map(h => getStreak(h.id)), 0);

  el.innerHTML = `
    <div style="padding:16px">
      <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap">
        <div class="browse-stat"><div class="browse-stat-num" style="color:${pct>=80?'var(--green)':pct>=50?'var(--gold)':'var(--red)'}">${pct}%</div><div class="browse-stat-label">TODAY</div></div>
        <div class="browse-stat"><div class="browse-stat-num" style="color:var(--cyan)">${doneCount}/${totalCount}</div><div class="browse-stat-label">DONE</div></div>
        <div class="browse-stat"><div class="browse-stat-num" style="color:var(--purple)">${weekPct}%</div><div class="browse-stat-label">THIS WEEK</div></div>
        <div class="browse-stat"><div class="browse-stat-num" style="color:var(--gold)">${bestStreak}</div><div class="browse-stat-label">BEST STREAK</div></div>
      </div>

      <!-- Progress bar -->
      <div style="background:var(--bg);border:2px solid var(--border2);height:20px;margin-bottom:24px;position:relative">
        <div style="background:${pct>=80?'var(--green)':pct>=50?'var(--gold)':'var(--red)'};height:100%;width:${pct}%;transition:width 0.3s"></div>
        <div style="position:absolute;top:2px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--text)">${doneCount}/${totalCount} HABITS</div>
      </div>

      <!-- Habit cards -->
      ${DEFAULT_HABITS.map(h => {
        const done = !!todayData[h.id];
        const streak = getStreak(h.id);
        const last7 = getLast7Days(h.id);
        const catColor = CATEGORY_COLORS[h.category] || 'var(--text-dim)';
        return `
          <div onclick="toggleHabit('${h.id}')" style="
            background:${done ? 'rgba(0,255,136,0.1)' : 'var(--card)'};
            border:3px solid ${done ? 'var(--green)' : 'var(--border2)'};
            padding:12px 16px;
            margin-bottom:8px;
            cursor:pointer;
            display:flex;
            align-items:center;
            gap:12px;
            transition:all 0.15s;
            ${done ? 'box-shadow:0 0 12px rgba(0,255,136,0.2);' : ''}
          ">
            <div style="font-size:20px;width:32px;text-align:center">${done ? '\u2705' : '\u2B1C'}</div>
            <div style="font-size:16px">${h.icon}</div>
            <div style="flex:1">
              <div style="font-size:9px;${done?'text-decoration:line-through;opacity:0.7;':''}">${h.name}</div>
              <div style="font-size:7px;color:${catColor};margin-top:2px">${h.category.toUpperCase()}</div>
            </div>
            <div style="display:flex;gap:3px;align-items:center">
              ${last7.map(d => `<div title="${d.date}" style="
                width:10px;height:10px;
                background:${d.done ? 'var(--green)' : 'var(--bg)'};
                border:1px solid ${d.done ? 'var(--green)' : 'var(--border2)'};
              "></div>`).join('')}
            </div>
            ${streak > 0 ? `<div style="font-size:8px;color:var(--gold);min-width:40px;text-align:right">\uD83D\uDD25 ${streak}d</div>` : '<div style="min-width:40px"></div>'}
          </div>
        `;
      }).join('')}

      <div style="margin-top:20px;font-size:7px;color:var(--text-dim);text-align:center">
        Click a habit to toggle \u2022 Streaks reset if you miss a day \u2022 Data saved in browser
      </div>
    </div>
  `;
}

/* ============ INIT ============ */
async function doRefresh() {
  await Promise.all([
    loadHubData().then(d => { hubData = d; }),
    loadQuestData()
  ]);
  renderApp();
}

doRefresh();
setInterval(async () => {
  await Promise.all([
    loadHubData().then(d => { hubData = d; }),
    loadQuestData()
  ]);
  renderHubTab();
}, 30000);
</script>
</body>
</html>
