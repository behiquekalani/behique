<!DOCTYPE html>
<html lang="en" data-theme="neon">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behique — Quest Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ THEME: NEON (default) ============ */
[data-theme="neon"] {
  --primary: #00e88f;
  --primary-light: #39ffb0;
  --primary-dark: #00c878;
  --primary-bg: rgba(0,232,143,0.08);
  --header-bg: #00d4a0;
  --bg: #0c0e14;
  --bg-gradient1: rgba(0,232,143,0.04);
  --bg-gradient2: rgba(0,229,255,0.03);
  --card: #141820;
  --border: #1e2430;
  --text: #e0e4ec;
  --text-light: #7a8299;
  --done: #4a5068;
  --gold: #ffc857;
  --ring-track: #1e2430;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --accent: #00e5ff;
  --ring-high: #00e88f;
  --ring-mid: #00e5ff;
  --ring-low: #2a3040;
  --tab-active-text: #0c0e14;
  --tab-glow: rgba(0,232,143,0.25);
  --hover-glow: rgba(0,232,143,0.12);
  --hover-border: rgba(0,232,143,0.3);
  --locked-header: #2a2e38;
  --completed-bg: rgba(255,200,87,0.05);
  --completed-border: rgba(255,200,87,0.2);
  --check-text: white;
  --title-glow: 0 0 30px rgba(0,232,143,0.3);
}

/* ============ THEME: MONO (low dopamine) ============ */
[data-theme="mono"] {
  --primary: #ffffff;
  --primary-light: #cccccc;
  --primary-dark: #dddddd;
  --primary-bg: rgba(255,255,255,0.04);
  --header-bg: #222222;
  --bg: #0a0a0a;
  --bg-gradient1: rgba(255,255,255,0.01);
  --bg-gradient2: rgba(255,255,255,0.01);
  --card: #111111;
  --border: #222222;
  --text: #d0d0d0;
  --text-light: #666666;
  --done: #444444;
  --gold: #999999;
  --ring-track: #1a1a1a;
  --shadow: 0 2px 8px rgba(0,0,0,0.5);
  --accent: #aaaaaa;
  --ring-high: #ffffff;
  --ring-mid: #888888;
  --ring-low: #222222;
  --tab-active-text: #000000;
  --tab-glow: rgba(255,255,255,0.1);
  --hover-glow: rgba(255,255,255,0.05);
  --hover-border: rgba(255,255,255,0.2);
  --locked-header: #1a1a1a;
  --completed-bg: rgba(255,255,255,0.03);
  --completed-border: rgba(255,255,255,0.1);
  --check-text: black;
  --title-glow: none;
}

/* ============ THEME: PASTEL NEON ============ */
[data-theme="pastel"] {
  --primary: #7dffcd;
  --primary-light: #a8ffe0;
  --primary-dark: #5ce8b0;
  --primary-bg: rgba(125,255,205,0.06);
  --header-bg: #2a2040;
  --bg: #0e0a18;
  --bg-gradient1: rgba(125,255,205,0.03);
  --bg-gradient2: rgba(180,140,255,0.03);
  --card: #140f22;
  --border: #231d35;
  --text: #e8e0f8;
  --text-light: #8878a8;
  --done: #4a4060;
  --gold: #ffd876;
  --ring-track: #1e1830;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --accent: #b48cff;
  --ring-high: #7dffcd;
  --ring-mid: #ff8cc8;
  --ring-low: #2a2040;
  --tab-active-text: #0e0a18;
  --tab-glow: rgba(125,255,205,0.2);
  --hover-glow: rgba(180,140,255,0.12);
  --hover-border: rgba(180,140,255,0.3);
  --locked-header: #1e1830;
  --completed-bg: rgba(255,216,118,0.05);
  --completed-border: rgba(255,216,118,0.15);
  --check-text: #0e0a18;
  --title-glow: 0 0 30px rgba(125,255,205,0.2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  background-image: radial-gradient(circle at 20% 50%, var(--bg-gradient1) 0%, transparent 50%),
                     radial-gradient(circle at 80% 20%, var(--bg-gradient2) 0%, transparent 50%);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  padding: 24px;
  max-width: 1400px;
  margin: 0 auto;
  transition: background 0.4s, color 0.3s;
}

/* TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.top-bar-left h1 {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  text-shadow: var(--title-glow);
}
.top-bar-left .subtitle {
  color: var(--accent);
  font-size: 13px;
}
.top-bar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.top-bar-right .date {
  color: var(--text-light);
  font-size: 13px;
}

/* THEME SWITCHER */
.theme-switcher {
  display: flex;
  gap: 4px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px;
}
.theme-btn {
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  border-radius: 16px;
  background: transparent;
  color: var(--text-light);
  transition: all 0.2s;
  font-family: inherit;
}
.theme-btn.active {
  background: var(--primary);
  color: var(--tab-active-text);
}
.theme-btn:hover:not(.active) {
  color: var(--text);
}

/* OVERALL PROGRESS SECTION */
.overview {
  display: grid;
  grid-template-columns: 200px 1fr 280px;
  gap: 20px;
  margin-bottom: 28px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  box-shadow: var(--shadow);
  transition: background 0.3s, border-color 0.3s;
}
.overview-ring {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.overview-ring .label {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 8px;
  font-weight: 500;
}

/* SVG DONUT */
.donut {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.donut svg { transform: rotate(-90deg); }
.donut .donut-text {
  position: absolute;
  font-weight: 700;
  color: var(--text);
}
.donut .donut-text.large { font-size: 28px; }
.donut .donut-text.medium { font-size: 20px; }
.donut .donut-text.small { font-size: 16px; }

/* BAR CHART */
.bar-chart { display: flex; flex-direction: column; }
.bar-chart h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--header-bg);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--primary);
  opacity: 0.7;
}
.bars {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex: 1;
  padding-bottom: 24px;
}
.bar-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  gap: 4px;
}
.bar {
  width: 100%;
  max-width: 48px;
  background: var(--primary);
  border-radius: 3px 3px 0 0;
  min-height: 4px;
  transition: height 1s ease, background 0.3s;
}
.bar-label { font-size: 11px; color: var(--text-light); font-weight: 500; }
.bar-value { font-size: 11px; color: var(--text); font-weight: 600; }

/* STATS PANEL */
.stats-panel { display: flex; flex-direction: column; gap: 10px; }
.stats-panel h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  opacity: 0.7;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.stat-row .stat-label { color: var(--text-light); font-size: 13px; }
.stat-row .stat-value { font-weight: 600; font-size: 13px; }

/* TABS */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.tab {
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 6px 6px 0 0;
  background: var(--card);
  color: var(--text-light);
  transition: all 0.2s;
}
.tab.active {
  background: var(--primary);
  color: var(--tab-active-text);
  border-color: var(--primary);
  box-shadow: 0 0 15px var(--tab-glow);
}
.tab:hover:not(.active) {
  background: var(--border);
  border-color: var(--accent);
  color: var(--accent);
}
.tab .count {
  background: rgba(0,0,0,0.1);
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 11px;
  margin-left: 4px;
}
.tab.active .count { background: rgba(255,255,255,0.25); }

/* QUEST GRID */
.quest-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

/* QUEST CARD */
.quest-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: all 0.2s;
}
.quest-card:hover {
  box-shadow: 0 4px 20px var(--hover-glow);
  border-color: var(--hover-border);
}
.quest-card-header {
  background: var(--header-bg);
  color: white;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.3s;
}
.quest-card-header h3 { font-size: 15px; font-weight: 600; }
.quest-card-header .quest-type {
  font-size: 11px;
  opacity: 0.8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.quest-card-body { padding: 16px; }
.quest-progress-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 14px;
}
.quest-progress-row .completion-text {
  font-size: 12px;
  color: var(--text-light);
  white-space: nowrap;
}
.quest-reward {
  font-size: 12px;
  color: var(--gold);
  font-weight: 500;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* OBJECTIVES */
.objectives { display: flex; flex-direction: column; gap: 6px; }
.objective {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 13px;
  padding: 4px 0;
}
.objective .checkbox {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-radius: 3px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: all 0.2s;
}
.objective.done .checkbox {
  background: var(--primary);
  border-color: var(--primary);
}
.objective.done .checkbox::after {
  content: '✓';
  color: var(--check-text);
  font-size: 12px;
  font-weight: 700;
}
.objective.done .obj-text {
  text-decoration: line-through;
  color: var(--done);
}

/* COMPLETED SECTION */
.completed-section {
  margin-top: 32px;
  padding-top: 20px;
  border-top: 2px solid var(--gold);
}
.completed-section h2 {
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.completed-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.completed-card {
  background: var(--completed-bg);
  border: 1px solid var(--completed-border);
  border-radius: 6px;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.3s;
}
.completed-card .name { font-weight: 600; font-size: 13px; }
.completed-card .reward { font-size: 12px; color: var(--gold); font-style: italic; }

/* HABIT TRACKER */
.habit-section {
  margin-top: 28px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  box-shadow: var(--shadow);
  transition: all 0.3s;
}
.habit-section h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  opacity: 0.7;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
}
.habit-grid {
  display: grid;
  grid-template-columns: 180px repeat(7, 1fr);
  gap: 4px;
  font-size: 12px;
}
.habit-grid .day-header {
  text-align: center;
  font-weight: 600;
  color: var(--text-light);
  padding: 4px;
}
.habit-grid .habit-name {
  font-weight: 500;
  padding: 6px 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.habit-grid .habit-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
}
.habit-check {
  width: 22px;
  height: 22px;
  border: 2px solid var(--border);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
}
.habit-check.checked {
  background: var(--primary);
  border-color: var(--primary);
}
.habit-check.checked::after {
  content: '✓';
  color: var(--check-text);
  font-size: 12px;
  font-weight: 700;
}

/* FOOTER */
.footer {
  margin-top: 32px;
  text-align: center;
  color: var(--text-light);
  font-size: 12px;
  padding: 16px 0;
  border-top: 1px solid var(--border);
}

/* LOCKED QUEST */
.quest-card.locked { opacity: 0.55; }
.quest-card.locked .quest-card-header { background: var(--locked-header); }

/* REWARD TIERS */
.tier-common { color: #666666; }
.tier-uncommon { color: #00e88f; }
.tier-rare { color: #00e5ff; }
.tier-epic { color: #b48cff; text-shadow: 0 0 8px rgba(180,140,255,0.5); }
.tier-legendary { color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.6); animation: legendaryPulse 2s ease-in-out infinite; }

@keyframes legendaryPulse {
  0%, 100% { text-shadow: 0 0 8px rgba(255,215,0,0.4); }
  50% { text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.3); }
}

/* MISSION REWARD BADGE */
.mission-tier-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.mission-tier-badge.tier-1 { background: rgba(102,102,102,0.2); color: #888; }
.mission-tier-badge.tier-2 { background: rgba(0,232,143,0.15); color: #00e88f; }
.mission-tier-badge.tier-3 { background: rgba(0,229,255,0.15); color: #00e5ff; }
.mission-tier-badge.tier-4 { background: rgba(180,140,255,0.2); color: #b48cff; border: 1px solid rgba(180,140,255,0.3); }
.mission-tier-badge.tier-5 { background: rgba(255,215,0,0.15); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); animation: legendaryPulse 2s ease-in-out infinite; }

/* DIFFICULTY BADGES */
.diff-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 8px;
  margin-right: 4px;
  flex-shrink: 0;
}
.diff-very_easy { background: rgba(0,232,143,0.15); color: #00e88f; }
.diff-easy { background: rgba(0,229,255,0.12); color: #00e5ff; }
.diff-medium { background: rgba(255,200,87,0.15); color: #ffc857; }
.diff-hard { background: rgba(255,120,80,0.15); color: #ff7850; }
.diff-very_hard { background: rgba(255,60,60,0.15); color: #ff3c3c; }

/* TIME ESTIMATE */
.time-est {
  font-size: 10px;
  color: var(--text-light);
  margin-left: auto;
  flex-shrink: 0;
  opacity: 0.7;
}

/* OBJECTIVE ROW (enhanced) */
.objective {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  padding: 5px 0;
}
.objective .obj-meta {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: auto;
  flex-shrink: 0;
}
.obj-stars {
  font-size: 10px;
  letter-spacing: -1px;
}

/* QUEST HEADER TIER */
.quest-card-header .header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

/* MOBILE */
@media (max-width: 900px) {
  body { padding: 12px; }
  .overview { grid-template-columns: 1fr; }
  .quest-grid { grid-template-columns: 1fr; }
  .habit-grid { grid-template-columns: 120px repeat(7, 1fr); font-size: 11px; }
  .top-bar { flex-direction: column; gap: 12px; align-items: flex-start; }
  .top-bar-right { flex-direction: column; align-items: flex-start; gap: 8px; }
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left">
    <h1>Behique — Quest Dashboard</h1>
    <div class="subtitle">Kalani · Navigator · Level 3</div>
  </div>
  <div class="top-bar-right">
    <div class="theme-switcher">
      <button class="theme-btn active" data-theme="neon">⚡ Neon</button>
      <button class="theme-btn" data-theme="mono">◐ Mono</button>
      <button class="theme-btn" data-theme="pastel">✦ Pastel</button>
    </div>
    <div class="date" id="dateDisplay"></div>
  </div>
</div>

<div class="overview">
  <div class="overview-ring">
    <div id="overallDonut"></div>
    <div class="label" id="overallLabel"></div>
  </div>
  <div class="bar-chart">
    <h3>Quest Progress</h3>
    <div class="bars" id="barChart"></div>
  </div>
  <div class="stats-panel" id="statsPanel">
    <h3>Stats</h3>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div class="quest-grid" id="questGrid"></div>

<div class="habit-section">
  <h3>Habit Tracker — This Week</h3>
  <div class="habit-grid" id="habitGrid"></div>
</div>

<div class="completed-section">
  <h2>✦ Completed Quests</h2>
  <div class="completed-grid" id="completedGrid"></div>
</div>

<div class="footer">
  Behique Systems — Ceiba Navigator v2<br>
  <span id="lastUpdated"></span>
</div>

<script>
/* ============ DATA — loads from quests.json, falls back to inline ============ */
let data = null;

// Transform quests.json format → dashboard format
function transformData(json) {
  return {
    player: json.player,
    quests: json.missions.map(m => ({
      name: m.name,
      type: m.type,
      status: m.status,
      description: m.description || '',
      objectives: m.objectives,
      reward: m.reward,
      reward_tier: m.reward_tier || 1
    })),
    completedQuests: (json.completed_missions || []).map(m => ({
      name: m.name,
      reward: m.reward,
      completed: m.completed || '',
      reward_tier: m.reward_tier || 1
    })),
    stats: json.stats || {},
    habits: json.habits || [],
    last_updated: json.last_updated || ''
  };
}

// Inline fallback (auto-generated from quests.json)
const FALLBACK_DATA = transformData({
  "player": { "name": "Kalani", "title": "Behique", "level": 3, "xp": 420, "xp_next": 500 },
  "missions": [
    { "id": "ebay-empire", "name": "eBay Empire", "type": "MAIN", "status": "active", "description": "From $0 to revenue. List products, make sales, automate.", "reward": "First revenue stream online", "objectives": [
      { "text": "Build listing agent V1", "done": true }, { "text": "Get eBay API keys (Prod + Sandbox)", "done": true }, { "text": "Build V2 auto-publisher", "done": true }, { "text": "Build quick_list.py", "done": true }, { "text": "Generate Funko Pop listing", "done": true },
      { "text": "Post Funko Pops on eBay", "done": false }, { "text": "Run OAuth consent flow", "done": false }, { "text": "First eBay sale", "done": false }, { "text": "Build Telegram bot /ebay newlisting", "done": false }, { "text": "Activate V2 API auto-publish", "done": false }, { "text": "10 listings live", "done": false }, { "text": "List Hello Kitty cups", "done": false }, { "text": "eBay cross-reference engine", "done": false }, { "text": "Multi-model A/B testing", "done": false }, { "text": "AI title generator", "done": false }, { "text": "Dropship auto-lister", "done": false }
    ]},

// Try to load quests.json, fall back to inline data
async function loadData() {
  try {
    const resp = await fetch('quests.json');
    if (resp.ok) {
      const json = await resp.json();
      data = transformData(json);
      console.log('Loaded from quests.json');
    } else {
      data = FALLBACK_DATA;
      console.log('Using inline fallback data');
    }
  } catch (e) {
    data = FALLBACK_DATA;
    console.log('Using inline fallback data (fetch failed)');
  }
  initDashboard();
}

/* ============ THEME SYSTEM ============ */
const themeColors = {
  neon:   { high: '#00e88f', mid: '#00e5ff',  low: '#2a3040', track: '#1e2430' },
  mono:   { high: '#ffffff', mid: '#888888',  low: '#222222', track: '#1a1a1a' },
  pastel: { high: '#7dffcd', mid: '#ff8cc8',  low: '#2a2040', track: '#1e1830' }
};

let currentTheme = localStorage.getItem('behique-theme') || 'neon';
let activeType = 'MAIN';

function setTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('behique-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === theme);
  });
  renderAll();
}

document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => setTheme(btn.dataset.theme));
});

document.documentElement.setAttribute('data-theme', currentTheme);
document.querySelectorAll('.theme-btn').forEach(b => {
  b.classList.toggle('active', b.dataset.theme === currentTheme);
});

/* ============ HELPERS ============ */
function calcProgress(objectives) {
  if (!objectives.length) return 0;
  return Math.round(objectives.filter(o => o.done).length / objectives.length * 100);
}

function createDonut(size, pct, textClass) {
  const r = (size - 10) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  const tc = themeColors[currentTheme];
  const color = pct >= 60 ? tc.high : pct >= 30 ? tc.mid : tc.low;

  const container = document.createElement('div');
  container.className = 'donut';
  container.innerHTML = `
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${tc.track}" stroke-width="8"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="8"
        stroke-dasharray="${circ}" stroke-dashoffset="${circ}" stroke-linecap="round"
        style="transition: stroke-dashoffset 1.2s ease;">
      </circle>
    </svg>
    <span class="donut-text ${textClass}">${pct}%</span>
  `;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      container.querySelector('circle:nth-child(2)').style.strokeDashoffset = offset;
    });
  });
  return container;
}

/* ============ INIT & RENDER ============ */
function initDashboard() {
  // Player info
  if (data.player) {
    document.querySelector('.top-bar-left .subtitle').textContent =
      `${data.player.name} · ${data.player.title} · Level ${data.player.level} · ${data.player.xp}/${data.player.xp_next} XP`;
  }

  // Build tabs
  const types = ['MAIN', 'SIDE', 'FUTURE'];
  const typeLabels = { MAIN: 'Main Quests', SIDE: 'Side Quests', FUTURE: 'Future' };
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';

  types.forEach(type => {
    const count = data.quests.filter(q => q.type === type).length;
    const tab = document.createElement('div');
    tab.className = 'tab' + (type === activeType ? ' active' : '');
    tab.innerHTML = `${typeLabels[type]}<span class="count">${count}</span>`;
    tab.onclick = () => {
      activeType = type;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderQuests();
    };
    tabsEl.appendChild(tab);
  });

  renderAll();
}

function renderAll() {
  document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  document.getElementById('lastUpdated').textContent = 'Last updated: ' + (data.last_updated || new Date().toISOString().slice(0,10));

  // Overall progress (active missions only)
  const activeQuests = data.quests.filter(q => q.status === 'active');
  const allObj = activeQuests.flatMap(q => q.objectives);
  const totalDone = allObj.filter(o => o.done).length;
  const totalAll = allObj.length;
  const overallPct = Math.round((totalDone / totalAll) * 100);

  const overallEl = document.getElementById('overallDonut');
  overallEl.innerHTML = '';
  overallEl.appendChild(createDonut(140, overallPct, 'large'));
  document.getElementById('overallLabel').textContent = `${totalDone} / ${totalAll} Objectives`;

  // Bar chart — all active missions
  const barChart = document.getElementById('barChart');
  barChart.innerHTML = '';
  const maxObj = Math.max(...activeQuests.map(q => q.objectives.length));
  activeQuests.forEach(q => {
    const done = q.objectives.filter(o => o.done).length;
    const total = q.objectives.length;
    const height = total > 0 ? (done / maxObj) * 120 : 0;
    const col = document.createElement('div');
    col.className = 'bar-col';
    const shortName = q.name.length > 12 ? q.name.slice(0,11) + '…' : q.name;
    col.innerHTML = `
      <div class="bar-value">${done}/${total}</div>
      <div class="bar" style="height:${height}px"></div>
      <div class="bar-label">${shortName}</div>
    `;
    barChart.appendChild(col);
  });

  // Stats
  const statsPanel = document.getElementById('statsPanel');
  statsPanel.innerHTML = '<h3>Stats</h3>';
  for (const [key, val] of Object.entries(data.stats)) {
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = `<span class="stat-label">${key}</span><span class="stat-value">${val}</span>`;
    statsPanel.appendChild(row);
  }

  renderQuests();

  // Completed
  const compGrid = document.getElementById('completedGrid');
  compGrid.innerHTML = '';
  data.completedQuests.forEach(q => {
    const cTier = q.reward_tier || 1;
    const card = document.createElement('div');
    card.className = 'completed-card';
    card.innerHTML = `
      <span class="name">✓ ${q.name}</span>
      <span class="reward">
        <span class="mission-tier-badge tier-${cTier}" style="font-size:9px;padding:1px 5px;">${TIER_NAMES[cTier]}</span>
        ${q.reward}${q.completed ? ' · ' + q.completed : ''}
      </span>`;
    compGrid.appendChild(card);
  });

  renderHabits();
}

const TIER_NAMES = { 1: 'Common', 2: 'Uncommon', 3: 'Rare', 4: 'Epic', 5: 'Legendary' };
const DIFF_LABELS = { very_easy: 'V.Easy', easy: 'Easy', medium: 'Med', hard: 'Hard', very_hard: 'V.Hard' };

function tierStars(tier) {
  const t = tier || 1;
  const colors = { 1: '#666', 2: '#00e88f', 3: '#00e5ff', 4: '#b48cff', 5: '#ffd700' };
  return `<span class="obj-stars" style="color:${colors[t]}">${'★'.repeat(t)}${'☆'.repeat(5-t)}</span>`;
}

function renderQuests() {
  const grid = document.getElementById('questGrid');
  grid.innerHTML = '';
  data.quests.filter(q => q.type === activeType).forEach(q => {
    const pct = calcProgress(q.objectives);
    const done = q.objectives.filter(o => o.done).length;
    const total = q.objectives.length;
    const isLocked = q.status === 'locked';
    const mTier = q.reward_tier || 1;

    const card = document.createElement('div');
    card.className = 'quest-card' + (isLocked ? ' locked' : '');
    card.innerHTML = `
      <div class="quest-card-header">
        <div>
          <h3>${q.name}</h3>
          <div class="quest-type">${q.description || q.type + ' QUEST'}</div>
        </div>
        <div class="header-right">
          <span class="mission-tier-badge tier-${mTier}">${TIER_NAMES[mTier] || 'Common'}</span>
          <div style="font-size:12px;opacity:0.9">${isLocked ? '🔒 LOCKED' : pct + '%'}</div>
        </div>
      </div>
      <div class="quest-card-body">
        <div class="quest-progress-row">
          <div class="donut-slot"></div>
          <div class="completion-text">${done} of ${total} objectives<br>completed</div>
        </div>
        <div class="quest-reward">✦ ${q.reward}</div>
        <div class="objectives">
          ${q.objectives.map(o => {
            const diff = o.difficulty || 'medium';
            const time = o.time_est || '';
            const oTier = o.reward_tier || 1;
            return `
            <div class="objective ${o.done ? 'done' : ''}">
              <div class="checkbox"></div>
              <span class="diff-badge diff-${diff}">${DIFF_LABELS[diff] || diff}</span>
              <span class="obj-text">${o.text}</span>
              <div class="obj-meta">
                ${tierStars(oTier)}
                ${time ? `<span class="time-est">${time}</span>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;
    grid.appendChild(card);
    card.querySelector('.donut-slot').appendChild(createDonut(70, pct, 'small'));
  });
}

function renderHabits() {
  const habitGrid = document.getElementById('habitGrid');
  habitGrid.innerHTML = '<div></div>';
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  dayNames.forEach(d => {
    habitGrid.innerHTML += `<div class="day-header">${d}</div>`;
  });

  data.habits.forEach((habit, hi) => {
    const nameEl = document.createElement('div');
    nameEl.className = 'habit-name';
    nameEl.textContent = habit.name;
    habitGrid.appendChild(nameEl);

    habit.days.forEach((checked, di) => {
      const cell = document.createElement('div');
      cell.className = 'habit-cell';
      const check = document.createElement('div');
      check.className = 'habit-check' + (checked ? ' checked' : '');
      check.onclick = () => {
        data.habits[hi].days[di] = !data.habits[hi].days[di];
        check.classList.toggle('checked');
      };
      cell.appendChild(check);
      habitGrid.appendChild(cell);
    });
  });
}
