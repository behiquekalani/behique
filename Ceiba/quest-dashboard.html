<!DOCTYPE html>
<html lang="en" data-theme="neon">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behique — Quest Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
/* ============ PIXEL BORDER UTIL ============ */
/* Uses box-shadow to create chunky pixel borders */

/* ============ THEME: NEON (default) ============ */
[data-theme="neon"] {
  --primary: #00e88f;
  --primary-light: #39ffb0;
  --primary-dark: #00c878;
  --primary-bg: rgba(0,232,143,0.08);
  --header-bg: #005533;
  --bg: #0a0c10;
  --bg-gradient1: rgba(0,232,143,0.04);
  --bg-gradient2: rgba(0,229,255,0.03);
  --card: #111620;
  --border: #1e2a30;
  --text: #d0e8dc;
  --text-light: #5a8070;
  --done: #3a5048;
  --gold: #ffc857;
  --ring-track: #1e2a30;
  --shadow: 0 4px 0 #000, 0 6px 0 rgba(0,232,143,0.15);
  --accent: #00e5ff;
  --ring-high: #00e88f;
  --ring-mid: #00e5ff;
  --ring-low: #1a2820;
  --tab-active-text: #000;
  --tab-glow: rgba(0,232,143,0.4);
  --hover-glow: rgba(0,232,143,0.15);
  --hover-border: #00e88f;
  --locked-header: #1a1e28;
  --completed-bg: rgba(255,200,87,0.06);
  --completed-border: rgba(255,200,87,0.3);
  --check-text: #000;
  --title-glow: 0 0 20px rgba(0,232,143,0.5);
  --pixel-border: #00e88f;
  --pixel-shadow: #005533;
  --btn-shadow: #005533;
  --xp-bar: #00e88f;
  --xp-track: #0a2018;
  --scanline: rgba(0,232,143,0.03);
}

/* ============ THEME: MONO (low dopamine) ============ */
[data-theme="mono"] {
  --primary: #cccccc;
  --primary-light: #ffffff;
  --primary-dark: #aaaaaa;
  --primary-bg: rgba(255,255,255,0.03);
  --header-bg: #1a1a1a;
  --bg: #080808;
  --bg-gradient1: rgba(255,255,255,0.01);
  --bg-gradient2: rgba(255,255,255,0.01);
  --card: #0e0e0e;
  --border: #222222;
  --text: #b0b0b0;
  --text-light: #555555;
  --done: #333333;
  --gold: #888888;
  --ring-track: #181818;
  --shadow: 0 4px 0 #000;
  --accent: #999999;
  --ring-high: #cccccc;
  --ring-mid: #777777;
  --ring-low: #222222;
  --tab-active-text: #000;
  --tab-glow: rgba(255,255,255,0.1);
  --hover-glow: rgba(255,255,255,0.05);
  --hover-border: #666;
  --locked-header: #111111;
  --completed-bg: rgba(255,255,255,0.02);
  --completed-border: rgba(255,255,255,0.1);
  --check-text: #000;
  --title-glow: none;
  --pixel-border: #555;
  --pixel-shadow: #222;
  --btn-shadow: #333;
  --xp-bar: #aaa;
  --xp-track: #111;
  --scanline: rgba(255,255,255,0.015);
}

/* ============ THEME: NEON VIVID (cyan / magenta / yellow) ============ */
[data-theme="pastel"] {
  --primary: #00e5ff;
  --primary-light: #40f0ff;
  --primary-dark: #00b8d4;
  --primary-bg: rgba(0,229,255,0.08);
  --header-bg: #1a0030;
  --bg: #0a0014;
  --bg-gradient1: rgba(0,229,255,0.04);
  --bg-gradient2: rgba(255,0,128,0.03);
  --card: #12001e;
  --border: #2a0848;
  --text: #e8e0f8;
  --text-light: #8868b0;
  --done: #2a1848;
  --gold: #ffea00;
  --ring-track: #1a0830;
  --shadow: 0 4px 0 #000, 0 6px 0 rgba(255,0,128,0.2);
  --accent: #ff0080;
  --ring-high: #00e5ff;
  --ring-mid: #ff0080;
  --ring-low: #180828;
  --tab-active-text: #0a0014;
  --tab-glow: rgba(0,229,255,0.4);
  --hover-glow: rgba(255,0,128,0.15);
  --hover-border: #ff0080;
  --locked-header: #140020;
  --completed-bg: rgba(255,234,0,0.06);
  --completed-border: rgba(255,234,0,0.3);
  --check-text: #0a0014;
  --title-glow: 0 0 25px rgba(0,229,255,0.5);
  --pixel-border: #ff0080;
  --pixel-shadow: #4a0040;
  --btn-shadow: #4a0040;
  --xp-bar: #00e5ff;
  --xp-track: #0a0820;
  --scanline: rgba(255,0,128,0.03);
}

/* ============ BASE RESET ============ */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  font-size: 16px;
  line-height: 1.6;
  padding: 24px;
  max-width: 1400px;
  margin: 0 auto;
  transition: background 0.3s, color 0.3s;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    var(--scanline) 2px,
    var(--scanline) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ============ PIXEL BOX MIXIN ============ */
.pixel-box {
  background: var(--card);
  border: 3px solid var(--pixel-border);
  box-shadow:
    inset -3px -3px 0 var(--pixel-shadow),
    inset 3px 3px 0 rgba(255,255,255,0.05),
    6px 6px 0 #000;
  image-rendering: pixelated;
}

.pixel-box-sm {
  background: var(--card);
  border: 2px solid var(--pixel-border);
  box-shadow:
    inset -2px -2px 0 var(--pixel-shadow),
    inset 2px 2px 0 rgba(255,255,255,0.05),
    4px 4px 0 #000;
}

/* ============ TOP BAR ============ */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 4px solid var(--pixel-border);
}

.top-bar-left h1 {
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--primary);
  text-shadow: var(--title-glow);
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}

.top-bar-left .subtitle {
  color: var(--accent);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.top-bar-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}

.top-bar-right .date {
  color: var(--text-light);
  font-size: 15px;
}

/* ============ XP BAR ============ */
.xp-section {
  margin-bottom: 16px;
}
.xp-bar-container {
  display: flex;
  align-items: center;
  gap: 10px;
}
.xp-label {
  font-size: 16px;
  color: var(--accent);
  white-space: nowrap;
  min-width: 100px;
}
.xp-bar-track {
  flex: 1;
  height: 16px;
  background: var(--xp-track);
  border: 2px solid var(--pixel-border);
  box-shadow: inset -2px -2px 0 var(--pixel-shadow), inset 2px 2px 0 rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
}
.xp-bar-fill {
  height: 100%;
  background: var(--xp-bar);
  transition: width 1s ease;
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
  image-rendering: pixelated;
}
.xp-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: rgba(255,255,255,0.15);
}
.xp-text {
  font-size: 16px;
  color: var(--gold);
  white-space: nowrap;
  min-width: 80px;
  text-align: right;
}

/* ============ FONT SIZE TOGGLE ============ */
body.font-small { font-size: 13px; }
body.font-medium { font-size: 16px; }
body.font-large { font-size: 20px; }
body.font-small * { font-size: inherit; }
body.font-large h1 { font-size: 32px; }
body.font-large h2, body.font-large h3 { font-size: 22px; }
.font-size-switcher {
  display: flex;
  gap: 3px;
  margin-right: 8px;
}
.font-btn {
  padding: 4px 8px;
  font-size: 14px;
  font-weight: 400;
  cursor: pointer;
  border: 2px solid var(--pixel-border, #333);
  background: var(--card, #111);
  color: var(--text-light, #888);
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  box-shadow: 2px 2px 0 #000;
  transition: all 0.1s;
}
.font-btn:active {
  box-shadow: 1px 1px 0 #000;
  transform: translate(1px, 1px);
}
.font-btn.active {
  background: var(--primary, #0f0);
  color: var(--tab-active-text, #000);
  border-color: var(--primary-light, #0f0);
  box-shadow: 2px 2px 0 rgba(0,0,0,0.5), 0 0 8px var(--tab-glow, rgba(0,255,0,0.3));
}

/* ============ THEME SWITCHER ============ */
.theme-switcher {
  display: flex;
  gap: 3px;
}
.theme-btn {
  padding: 6px 10px;
  font-size: 15px;
  font-weight: 400;
  cursor: pointer;
  border: 2px solid var(--pixel-border);
  background: var(--card);
  color: var(--text-light);
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  box-shadow: 3px 3px 0 #000;
  transition: all 0.1s;
  letter-spacing: 0.5px;
}
.theme-btn:active {
  box-shadow: 1px 1px 0 #000;
  transform: translate(2px, 2px);
}
.theme-btn.active {
  background: var(--primary);
  color: var(--tab-active-text);
  border-color: var(--primary-light);
  box-shadow: 3px 3px 0 var(--btn-shadow), 0 0 12px var(--tab-glow);
}
.theme-btn:hover:not(.active) {
  color: var(--text);
  border-color: var(--accent);
}

/* ============ OVERVIEW SECTION ============ */
.overview {
  display: grid;
  grid-template-columns: 180px 1fr 260px;
  gap: 16px;
  margin-bottom: 20px;
  padding: 16px;
}
.overview-ring {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.overview-ring .label {
  font-size: 15px;
  color: var(--text-light);
  margin-top: 8px;
  text-align: center;
}

/* ============ SVG DONUT (pixel style) ============ */
.donut {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.donut svg { transform: rotate(-90deg); }
.donut .donut-text {
  position: absolute;
  color: var(--text);
  font-family: 'DotGothic16', 'MS Gothic', monospace;
}
.donut .donut-text.large { font-size: 18px; }
.donut .donut-text.medium { font-size: 17px; }
.donut .donut-text.small { font-size: 14px; }

/* ============ BAR CHART ============ */
.bar-chart { display: flex; flex-direction: column; }
.bar-chart h3 {
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  font-size: 17px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 10px;
  letter-spacing: 0;
}
.bars {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  flex: 1;
  padding-bottom: 20px;
}
.bar-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  gap: 4px;
}
.bar {
  width: 100%;
  max-width: 40px;
  background: var(--primary);
  min-height: 4px;
  transition: height 1s ease;
  box-shadow: inset -2px -2px 0 rgba(0,0,0,0.3), inset 2px 2px 0 rgba(255,255,255,0.1);
  image-rendering: pixelated;
}
.bar-label { font-size: 14px; color: var(--text-light); text-align: center; }
.bar-value { font-size: 14px; color: var(--text); }

/* ============ STATS PANEL ============ */
.stats-panel { display: flex; flex-direction: column; gap: 6px; }
.stats-panel h3 {
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  font-size: 17px;
  font-weight: 600;
  color: var(--primary);
  letter-spacing: 0;
  margin-bottom: 4px;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 2px dashed var(--border);
}
.stat-row .stat-label { color: var(--text-light); font-size: 15px; }
.stat-row .stat-value { font-size: 16px; color: var(--gold); }

/* ============ TABS ============ */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab {
  padding: 8px 14px;
  font-size: 16px;
  cursor: pointer;
  border: 2px solid var(--pixel-border);
  background: var(--card);
  color: var(--text-light);
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  box-shadow: 3px 3px 0 #000;
  transition: all 0.1s;
  border-bottom: none;
  position: relative;
  top: 2px;
}
.tab:active {
  box-shadow: 1px 1px 0 #000;
  transform: translate(2px, 2px);
}
.tab.active {
  background: var(--primary);
  color: var(--tab-active-text);
  border-color: var(--primary-light);
  box-shadow: 3px 3px 0 var(--btn-shadow), 0 0 15px var(--tab-glow);
  z-index: 2;
}
.tab:hover:not(.active) {
  border-color: var(--accent);
  color: var(--accent);
}
.tab .count {
  background: rgba(0,0,0,0.2);
  padding: 2px 6px;
  font-size: 15px;
  margin-left: 4px;
}
.tab.active .count { background: rgba(0,0,0,0.15); }

/* ============ QUEST GRID ============ */
.quest-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

/* ============ QUEST CARD ============ */
.quest-card {
  transition: all 0.15s;
}
.quest-card:hover {
  transform: translate(-2px, -2px);
  box-shadow:
    inset -3px -3px 0 var(--pixel-shadow),
    inset 3px 3px 0 rgba(255,255,255,0.05),
    8px 8px 0 #000,
    0 0 20px var(--hover-glow);
  border-color: var(--hover-border);
}

.quest-card-header {
  background: var(--header-bg);
  color: white;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 3px solid rgba(0,0,0,0.3);
}
.quest-card-header h3 {
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.01em;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
}
.quest-card-header .quest-type {
  font-size: 14px;
  opacity: 0.7;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-top: 2px;
}
.quest-card-body { padding: 14px; }

.quest-progress-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.quest-progress-row .completion-text {
  font-size: 16px;
  color: var(--text-light);
  line-height: 1.5;
}

.quest-reward {
  font-size: 16px;
  color: var(--gold);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 8px;
  background: rgba(255,200,87,0.05);
  border: 1px dashed rgba(255,200,87,0.2);
}

/* ============ OBJECTIVES ============ */
.objectives { display: flex; flex-direction: column; gap: 4px; }
.objective {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 16px;
  padding: 5px 0;
}
.objective .checkbox {
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  image-rendering: pixelated;
}
.objective.done .checkbox {
  background: var(--primary);
  border-color: var(--primary);
}
.objective.done .checkbox::after {
  content: 'X';
  color: var(--check-text);
  font-size: 16px;
  font-family: 'DotGothic16', 'MS Gothic', monospace;
}
.objective.done .obj-text {
  text-decoration: line-through;
  color: var(--done);
}
.objective .obj-meta {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: auto;
  flex-shrink: 0;
}
.obj-stars {
  font-size: 17px;
  letter-spacing: 1px;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
}
.mario-star {
  display: inline-block;
  font-style: normal;
}
.mario-star.filled {
  filter: drop-shadow(0 0 3px rgba(255,215,0,0.6));
}
.mario-star.empty {
  opacity: 0.25;
}

/* ============ REWARD TIERS ============ */
.tier-common { color: #666; }
.tier-uncommon { color: #00e88f; }
.tier-rare { color: #00e5ff; }
.tier-epic { color: #b48cff; text-shadow: 0 0 8px rgba(180,140,255,0.6); }
.tier-legendary { color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.6); animation: legendaryPulse 1.5s ease-in-out infinite; }

@keyframes legendaryPulse {
  0%, 100% { text-shadow: 0 0 6px rgba(255,215,0,0.4); }
  50% { text-shadow: 0 0 16px rgba(255,215,0,0.9), 0 0 30px rgba(255,215,0,0.3); }
}

/* MISSION TIER BADGE */
.mission-tier-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 14px;
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  padding: 3px 6px;
  text-transform: none;
  letter-spacing: 0.5px;
  border: 2px solid;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
}
.mission-tier-badge.tier-1 { background: rgba(102,102,102,0.2); color: #888; border-color: #555; }
.mission-tier-badge.tier-2 { background: rgba(0,232,143,0.15); color: #00e88f; border-color: #00a060; }
.mission-tier-badge.tier-3 { background: rgba(0,229,255,0.15); color: #00e5ff; border-color: #0088aa; }
.mission-tier-badge.tier-4 { background: rgba(180,140,255,0.2); color: #b48cff; border-color: #7850cc; }
.mission-tier-badge.tier-5 { background: rgba(255,215,0,0.15); color: #ffd700; border-color: #cc9900; animation: legendaryPulse 1.5s ease-in-out infinite; }

/* ============ DIFFICULTY BADGES ============ */
.diff-badge {
  display: inline-block;
  font-size: 13px;
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  padding: 2px 4px;
  border: 1px solid;
  flex-shrink: 0;
  letter-spacing: 0.3px;
}
.diff-very_easy { background: rgba(0,232,143,0.15); color: #00e88f; border-color: #00a060; }
.diff-easy { background: rgba(0,229,255,0.12); color: #00e5ff; border-color: #0088aa; }
.diff-medium { background: rgba(255,200,87,0.15); color: #ffc857; border-color: #cc8800; }
.diff-hard { background: rgba(255,120,80,0.15); color: #ff7850; border-color: #cc4020; }
.diff-very_hard { background: rgba(255,60,60,0.15); color: #ff3c3c; border-color: #cc2020; }

/* TIME ESTIMATE */
.time-est {
  font-size: 13px;
  color: var(--text-light);
  flex-shrink: 0;
  opacity: 0.7;
}

/* QUEST HEADER RIGHT */
.quest-card-header .header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

/* ============ COMPLETED SECTION ============ */
.completed-section {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 4px solid var(--gold);
}
.completed-section h2 {
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 12px;
  letter-spacing: -0.01em;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}
.completed-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px;
}
.completed-card {
  padding: 10px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.completed-card .name { font-size: 16px; font-weight: 600; color: var(--gold); }
.completed-card .reward { font-size: 15px; color: var(--text-light); }

/* ============ HABIT TRACKER ============ */
.habit-section {
  margin-top: 20px;
  padding: 16px;
}
.habit-section h3 {
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  font-size: 17px;
  font-weight: 600;
  color: var(--primary);
  text-transform: none;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.habit-grid {
  display: grid;
  grid-template-columns: 140px repeat(7, 1fr);
  gap: 3px;
  font-size: 15px;
}
.habit-grid .day-header {
  text-align: center;
  color: var(--text-light);
  padding: 4px;
  font-size: 14px;
}
.habit-grid .habit-name {
  padding: 5px 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 14px;
}
.habit-grid .habit-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3px;
}
.habit-check {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.1s;
  background: var(--bg);
  image-rendering: pixelated;
}
.habit-check:active {
  transform: scale(0.9);
}
.habit-check.checked {
  background: var(--primary);
  border-color: var(--primary);
}
.habit-check.checked::after {
  content: 'X';
  color: var(--check-text);
  font-size: 16px;
  font-family: 'DotGothic16', 'MS Gothic', monospace;
}

/* ============ FOOTER ============ */
.footer {
  margin-top: 24px;
  text-align: center;
  color: var(--text-light);
  font-size: 14px;
  padding: 12px 0;
  border-top: 4px solid var(--pixel-border);
  letter-spacing: 1px;
  line-height: 2.5;
}

/* ============ LOCKED QUEST ============ */
.quest-card.locked { opacity: 0.45; filter: grayscale(0.3); }
.quest-card.locked .quest-card-header { background: var(--locked-header); }
.quest-card.locked:hover { transform: none; box-shadow: inset -3px -3px 0 var(--pixel-shadow), inset 3px 3px 0 rgba(255,255,255,0.05), 6px 6px 0 #000; }

/* ============ PIXELATED DECORATION ============ */
.pixel-divider {
  height: 4px;
  background: repeating-linear-gradient(
    90deg,
    var(--pixel-border) 0px,
    var(--pixel-border) 4px,
    transparent 4px,
    transparent 8px
  );
  margin: 8px 0;
}

/* ============ PLAYER HUD ============ */
.player-hud {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
  padding: 12px 16px;
}
.player-avatar {
  width: 48px;
  height: 48px;
  background: var(--header-bg);
  border: 3px solid var(--primary);
  box-shadow: 3px 3px 0 #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  image-rendering: pixelated;
}
.player-info {
  flex: 1;
}
.player-name {
  font-family: 'DotGothic16', 'MS Gothic', monospace;
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  margin-bottom: 2px;
}
.player-title {
  font-size: 15px;
  color: var(--accent);
  margin-bottom: 6px;
}
.player-level {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 16px;
  color: var(--gold);
  background: rgba(255,200,87,0.08);
  border: 2px solid rgba(255,200,87,0.3);
  padding: 3px 8px;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
}

/* ============ MOBILE ============ */
@media (max-width: 900px) {
  body { padding: 10px; font-size: 13px; }
  .overview { grid-template-columns: 1fr; }
  .quest-grid { grid-template-columns: 1fr; }
  .habit-grid { grid-template-columns: 100px repeat(7, 1fr); }
  .top-bar { flex-direction: column; gap: 10px; }
  .top-bar-right { align-items: flex-start; }
  .top-bar-left h1 { font-size: 16px; }

  .xp-label, .xp-text { min-width: auto; }
}

/* ============ BLINK CURSOR (retro feel) ============ */
@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}
.blink { animation: blink 1s steps(1) infinite; }

}

document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => setTheme(btn.dataset.theme));
});

document.documentElement.setAttribute('data-theme', currentTheme);
document.querySelectorAll('.theme-btn').forEach(b => {
  b.classList.toggle('active', b.dataset.theme === currentTheme);
});

/* ============ FONT SIZE TOGGLE ============ */
let currentFontSize = localStorage.getItem('behique-fontsize') || 'medium';

function setFontSize(size) {
  currentFontSize = size;
  document.body.classList.remove('font-small', 'font-medium', 'font-large');
  document.body.classList.add('font-' + size);
  localStorage.setItem('behique-fontsize', size);
  document.querySelectorAll('.font-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.size === size);
  });
}

document.querySelectorAll('.font-btn').forEach(btn => {
  btn.addEventListener('click', () => setFontSize(btn.dataset.size));
});

setFontSize(currentFontSize);

/* ============ HELPERS ============ */
function calcProgress(objectives) {
  if (!objectives.length) return 0;
  return Math.round(objectives.filter(o => o.done).length / objectives.length * 100);
}

function createDonut(size, pct, textClass) {
  const r = (size - 12) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  const tc = themeColors[currentTheme];
  const color = pct >= 60 ? tc.high : pct >= 30 ? tc.mid : tc.low;

  const container = document.createElement('div');
  container.className = 'donut';
  container.innerHTML = `
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${tc.track}" stroke-width="10"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
        stroke-dasharray="${circ}" stroke-dashoffset="${circ}" stroke-linecap="butt"
        style="transition: stroke-dashoffset 1.2s ease;">
      </circle>
    </svg>
    <span class="donut-text ${textClass}">${pct}%</span>
  `;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      container.querySelector('circle:nth-child(2)').style.strokeDashoffset = offset;
    });
  });
  return container;
}

/* ============ INIT & RENDER ============ */
function initDashboard() {
  if (data.player) {
    document.getElementById('playerName').textContent = data.player.name;
    document.getElementById('playerTitle').textContent = data.player.title;
    document.getElementById('playerLevel').textContent = `LVL ${data.player.level}`;
    document.getElementById('playerAvatar').textContent = data.player.name.charAt(0);

    const xpPct = Math.round((data.player.xp / data.player.xp_next) * 100);
    document.getElementById('xpBarFill').style.width = xpPct + '%';
    document.getElementById('xpText').textContent = `${data.player.xp}/${data.player.xp_next} XP`;
  }

  const types = ['MAIN', 'SIDE', 'FUTURE'];
  const typeLabels = { MAIN: 'MAIN', SIDE: 'SIDE', FUTURE: 'FUTURE' };
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';

  types.forEach(type => {
    const count = data.quests.filter(q => q.type === type).length;
    const tab = document.createElement('div');
    tab.className = 'tab' + (type === activeType ? ' active' : '');
    tab.innerHTML = `${typeLabels[type]}<span class="count">${count}</span>`;
    tab.onclick = () => {
      activeType = type;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderQuests();
    };
    tabsEl.appendChild(tab);
  });

  renderAll();
}

function renderAll() {
  document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
  });
  document.getElementById('lastUpdated').textContent = 'LAST UPDATED: ' + (data.last_updated || new Date().toISOString().slice(0,10));

  const activeQuests = data.quests.filter(q => q.status === 'active');
  const allObj = activeQuests.flatMap(q => q.objectives);
  const totalDone = allObj.filter(o => o.done).length;
  const totalAll = allObj.length;
  const overallPct = Math.round((totalDone / totalAll) * 100);

  const overallEl = document.getElementById('overallDonut');
  overallEl.innerHTML = '';
  overallEl.appendChild(createDonut(130, overallPct, 'large'));
  document.getElementById('overallLabel').textContent = `${totalDone}/${totalAll} OBJ`;

  // Bar chart
  const barChart = document.getElementById('barChart');
  barChart.innerHTML = '';
  const maxObj = Math.max(...activeQuests.map(q => q.objectives.length));
  activeQuests.forEach(q => {
    const done = q.objectives.filter(o => o.done).length;
    const total = q.objectives.length;
    const height = total > 0 ? (done / maxObj) * 100 : 0;
    const col = document.createElement('div');
    col.className = 'bar-col';
    const shortName = q.name.length > 10 ? q.name.slice(0,9) + '..' : q.name;
    col.innerHTML = `
      <div class="bar-value">${done}/${total}</div>
      <div class="bar" style="height:${height}px"></div>
      <div class="bar-label">${shortName}</div>
    `;
    barChart.appendChild(col);
  });

  // Stats
  const statsPanel = document.getElementById('statsPanel');
  statsPanel.innerHTML = '<h3>Stats</h3>';
  for (const [key, val] of Object.entries(data.stats)) {
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = `<span class="stat-label">${key}</span><span class="stat-value">${val}</span>`;
    statsPanel.appendChild(row);
  }

  renderQuests();

  // Completed
  const compGrid = document.getElementById('completedGrid');
  compGrid.innerHTML = '';
  data.completedQuests.forEach(q => {
    const cTier = q.reward_tier || 1;
    const card = document.createElement('div');
    card.className = 'completed-card pixel-box-sm';
    card.innerHTML = `
      <span class="name">+ ${q.name}</span>
      <span class="reward">
        <span class="mission-tier-badge tier-${cTier}" style="font-size:13px;padding:2px 4px;">${TIER_NAMES[cTier]}</span>
        ${q.completed || ''}
      </span>`;
    compGrid.appendChild(card);
  });

  renderHabits();
}

const TIER_NAMES = { 1: 'COMMON', 2: 'UNCOMMON', 3: 'RARE', 4: 'EPIC', 5: 'LEGEND' };
const DIFF_LABELS = { very_easy: 'EASY+', easy: 'EASY', medium: 'MED', hard: 'HARD', very_hard: 'HARD+' };

function tierStars(tier) {
  const t = tier || 1;
  const colors = { 1: '#888', 2: '#00e88f', 3: '#00e5ff', 4: '#b48cff', 5: '#ffd700' };
  let stars = '';
  for (let i = 0; i < 5; i++) {
    if (i < t) {
      stars += '<em class="mario-star filled" style="color:' + colors[t] + '">★</em>';
    } else {
      stars += '<em class="mario-star empty">★</em>';
    }
  }
  return '<span class="obj-stars">' + stars + '</span>';
}

function renderQuests() {
  const grid = document.getElementById('questGrid');
  grid.innerHTML = '';
  data.quests.filter(q => q.type === activeType).forEach(q => {
    const pct = calcProgress(q.objectives);
    const done = q.objectives.filter(o => o.done).length;
    const total = q.objectives.length;
    const isLocked = q.status === 'locked';
    const mTier = q.reward_tier || 1;

    const card = document.createElement('div');
    card.className = 'quest-card pixel-box' + (isLocked ? ' locked' : '');
    card.innerHTML = `
      <div class="quest-card-header">
        <div>
          <h3>${q.name}</h3>
          <div class="quest-type">${q.description || q.type + ' QUEST'}</div>
        </div>
        <div class="header-right">
          <span class="mission-tier-badge tier-${mTier}">${TIER_NAMES[mTier] || 'COMMON'}</span>
          <div style="font-size:16px;opacity:0.9;font-weight:600;font-family:'DotGothic16',monospace;">${isLocked ? 'LOCKED' : pct + '%'}</div>
        </div>
      </div>
      <div class="quest-card-body">
        <div class="quest-progress-row">
          <div class="donut-slot"></div>
          <div class="completion-text">${done} OF ${total}<br>OBJECTIVES</div>
        </div>
        <div class="quest-reward">+ ${q.reward}</div>
        <div class="pixel-divider"></div>
        <div class="objectives">
          ${q.objectives.map(o => {
            const diff = o.difficulty || 'medium';
            const time = o.time_est || '';
            const oTier = o.reward_tier || 1;
            return `
            <div class="objective ${o.done ? 'done' : ''}">
              <div class="checkbox"></div>
              <span class="diff-badge diff-${diff}">${DIFF_LABELS[diff] || diff}</span>
              <span class="obj-text">${o.text}</span>
              <div class="obj-meta">
                ${tierStars(oTier)}
                ${time ? `<span class="time-est">${time}</span>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;
    grid.appendChild(card);
    card.querySelector('.donut-slot').appendChild(createDonut(65, pct, 'small'));
  });
}

function renderHabits() {
  const habitGrid = document.getElementById('habitGrid');
  habitGrid.innerHTML = '<div></div>';
  const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
  dayNames.forEach(d => {
    habitGrid.innerHTML += `<div class="day-header">${d}</div>`;
  });

  data.habits.forEach((habit, hi) => {
    const nameEl = document.createElement('div');
    nameEl.className = 'habit-name';
    nameEl.textContent = habit.name;
    habitGrid.appendChild(nameEl);

    habit.days.forEach((checked, di) => {
      const cell = document.createElement('div');
      cell.className = 'habit-cell';
      const check = document.createElement('div');
      check.className = 'habit-check' + (checked ? ' checked' : '');
      check.onclick = () => {
        data.habits[hi].days[di] = !data.habits[hi].days[di];
        check.classList.toggle('checked');
      };
      cell.appendChild(check);
      habitGrid.appendChild(cell);
    });
  });
}
</script>
