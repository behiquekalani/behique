<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1800" width="2400" height="1800">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #fff; }
      .title { font-size: 28px; font-weight: bold; letter-spacing: 4px; }
      .subtitle { font-size: 14px; fill: #999; letter-spacing: 2px; }
      .section-title { font-size: 16px; font-weight: bold; letter-spacing: 1px; }
      .body { font-size: 12px; fill: #999; }
      .body-white { font-size: 12px; fill: #fff; }
      .small { font-size: 10px; fill: #999; }
      .checkbox { font-size: 11px; fill: #999; }
      .table-head { font-size: 11px; font-weight: bold; fill: #fff; }
      .table-cell { font-size: 10px; fill: #999; }
      .hub-label { font-size: 18px; font-weight: bold; letter-spacing: 2px; }
      .tier-label { font-size: 14px; font-weight: bold; }
      .accent { font-size: 20px; font-weight: bold; }
      .metric-value { font-size: 22px; font-weight: bold; }
      .metric-label { font-size: 10px; fill: #999; letter-spacing: 1px; }
    </style>
