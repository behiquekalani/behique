  <text x="80" y="238" class="body">One-line pitch:</text>
  <rect x="80" y="248" width="460" height="18" rx="2" fill="none" stroke="#333" stroke-width="0.5"/>

  <text x="80" y="285" class="body">Target Reader:</text>
  <rect x="240" y="272" width="300" height="18" rx="2" fill="none" stroke="#333" stroke-width="0.5"/>

