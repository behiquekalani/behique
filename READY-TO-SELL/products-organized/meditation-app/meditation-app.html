<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mindful Breath</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --inhale: #00f0ff;
    --hold-in: #b44dff;
    --exhale: #00ff88;
    --hold-out: #ffc832;
    --bg: #060a10;
    --text: #c0c8d8;
    --accent: #00f0ff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    transition: background 2s ease;
  }

  /* Gradient overlay that shifts with breathing phase */
  #gradientOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.12;
    transition: background 3s ease;
    background: radial-gradient(ellipse at center, var(--inhale) 0%, transparent 70%);
  }

  /* --- SCREENS --- */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 480px;
    padding: 20px;
    z-index: 2;
    position: relative;
  }
  .screen.active { display: flex; }

  /* --- SETUP SCREEN --- */
  #setup {
    gap: 28px;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    animation: fadeIn 0.8s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
  }
  .brand h1 {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.8;
    margin-bottom: 6px;
  }
  .brand p {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
  }

  /* Stats bar on setup */
  .stats-bar {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .stat-item {
    text-align: center;
  }
  .stat-value {
    font-size: 24px;
    font-weight: 300;
    color: var(--accent);
    opacity: 0.7;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Section labels */
  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    width: 100%;
    text-align: left;
    margin-bottom: -12px;
  }

  /* Pattern selector */
  .pattern-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
  }
  .pattern-btn {
    background: rgba(0, 240, 255, 0.03);
    border: 1px solid rgba(0, 240, 255, 0.1);
    color: rgba(0, 240, 255, 0.5);
    font-family: inherit;
    font-size: 13px;
    padding: 14px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }
  .pattern-btn:hover, .pattern-btn.selected {
    background: rgba(0, 240, 255, 0.08);
    border-color: rgba(0, 240, 255, 0.35);
    color: var(--accent);
  }
  .pattern-btn.selected {
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
  }
  .pattern-btn .pattern-name {
    font-weight: 500;
    margin-bottom: 4px;
  }
  .pattern-btn .pattern-desc {
    font-size: 10px;
    opacity: 0.5;
  }

  /* Custom pattern editor */
  #customPatternEditor {
    display: none;
    width: 100%;
    gap: 10px;
  }
  #customPatternEditor.visible { display: flex; flex-wrap: wrap; }
  .custom-phase {
    flex: 1;
    min-width: 60px;
    text-align: center;
  }
  .custom-phase label {
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }
  .custom-phase input {
    background: rgba(0, 240, 255, 0.05);
    border: 1px solid rgba(0, 240, 255, 0.12);
    color: var(--accent);
    font-family: inherit;
    font-size: 18px;
    padding: 10px;
    border-radius: 8px;
    width: 100%;
    text-align: center;
    outline: none;
  }
  .custom-phase input:focus {
    border-color: rgba(0, 240, 255, 0.35);
  }

  /* Time grid */
  .time-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }
  .time-btn {
    background: rgba(0, 240, 255, 0.03);
    border: 1px solid rgba(0, 240, 255, 0.1);
    color: rgba(0, 240, 255, 0.5);
    font-family: inherit;
    font-size: 15px;
    font-weight: 400;
    padding: 12px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
    flex: 1;
    min-width: 52px;
    text-align: center;
  }
  .time-btn:hover, .time-btn.selected {
    background: rgba(0, 240, 255, 0.08);
    border-color: rgba(0, 240, 255, 0.35);
    color: var(--accent);
  }
  .time-btn.selected {
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
  }
  .time-btn span {
    font-size: 9px;
    opacity: 0.4;
    display: block;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* Custom time row */
  .custom-time-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .custom-time-row input {
    background: rgba(0, 240, 255, 0.05);
    border: 1px solid rgba(0, 240, 255, 0.12);
    color: var(--accent);
    font-family: inherit;
    font-size: 16px;
    padding: 10px 14px;
    border-radius: 8px;
    width: 70px;
    text-align: center;
    outline: none;
  }
  .custom-time-row input:focus {
    border-color: rgba(0, 240, 255, 0.35);
  }
  .custom-time-row label {
    font-size: 10px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
  }

  /* Ambient selector */
  .ambient-row {
    display: flex;
    gap: 8px;
    width: 100%;
  }
  .ambient-btn {
    flex: 1;
    background: rgba(0, 240, 255, 0.03);
    border: 1px solid rgba(0, 240, 255, 0.1);
    color: rgba(0, 240, 255, 0.5);
    font-family: inherit;
    font-size: 12px;
    padding: 10px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }
  .ambient-btn:hover, .ambient-btn.selected {
    background: rgba(0, 240, 255, 0.08);
    border-color: rgba(0, 240, 255, 0.35);
    color: var(--accent);
  }

  /* Start button */
  .start-btn {
    background: rgba(0, 240, 255, 0.06);
    border: 1px solid rgba(0, 240, 255, 0.25);
    color: var(--accent);
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 16px 50px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
  }
  .start-btn:hover {
    background: rgba(0, 240, 255, 0.12);
    border-color: rgba(0, 240, 255, 0.5);
    box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
  }

  /* --- MEDITATION SCREEN --- */
  #meditation {
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
  }

  .top-bar {
    position: fixed;
    top: 30px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    z-index: 5;
  }
  .total-timer {
    font-size: 20px;
    font-weight: 300;
    color: rgba(0, 240, 255, 0.35);
    letter-spacing: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* Breathing circle */
  .breath-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 240px;
    height: 240px;
  }

  .breath-ring {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 1.5px solid rgba(0, 240, 255, 0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: transform 4s ease-in-out, border-color 1s, box-shadow 1s;
    will-change: transform;
  }
  .breath-ring.inhale {
    transform: scale(1.5);
    border-color: rgba(0, 240, 255, 0.5);
    box-shadow: 0 0 60px rgba(0, 240, 255, 0.12), inset 0 0 40px rgba(0, 240, 255, 0.04);
  }
  .breath-ring.hold-in {
    transform: scale(1.5);
    border-color: rgba(180, 77, 255, 0.5);
    box-shadow: 0 0 50px rgba(180, 77, 255, 0.1), inset 0 0 35px rgba(180, 77, 255, 0.04);
  }
  .breath-ring.exhale {
    transform: scale(1.0);
    border-color: rgba(0, 255, 136, 0.4);
    box-shadow: 0 0 40px rgba(0, 255, 136, 0.08), inset 0 0 30px rgba(0, 255, 136, 0.03);
  }
  .breath-ring.hold-out {
    transform: scale(1.0);
    border-color: rgba(255, 200, 50, 0.35);
    box-shadow: 0 0 30px rgba(255, 200, 50, 0.06);
  }

  .breath-label {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 400;
    transition: color 1s;
  }
  .hold-in .breath-label { color: var(--hold-in); }
  .exhale .breath-label { color: var(--exhale); }
  .hold-out .breath-label { color: var(--hold-out); }

  .phase-timer {
    font-size: 36px;
    font-weight: 200;
    color: rgba(255,255,255,0.1);
    margin-top: 8px;
    font-variant-numeric: tabular-nums;
    min-height: 44px;
  }

  .cycle-count {
    margin-top: 40px;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.15);
    text-transform: uppercase;
  }

  .pattern-indicator {
    margin-top: 8px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.1);
  }

  .stop-btn {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: 1px solid rgba(255, 100, 100, 0.2);
    color: rgba(255, 100, 100, 0.4);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 12px 30px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
    z-index: 5;
    text-transform: uppercase;
  }
  .stop-btn:hover {
    border-color: rgba(255, 100, 100, 0.5);
    color: rgba(255, 100, 100, 0.7);
  }

  /* --- COMPLETION SCREEN --- */
  #complete {
    gap: 30px;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    animation: fadeIn 1s ease;
  }
  #complete h2 {
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--exhale);
    font-weight: 400;
    opacity: 0.7;
  }

  .complete-stats {
    text-align: center;
    line-height: 2.2;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
  }
  .complete-stats strong {
    color: rgba(255,255,255,0.5);
    font-weight: 400;
  }

  .motivational {
    font-size: 14px;
    color: rgba(255,255,255,0.2);
    text-align: center;
    font-style: italic;
    max-width: 300px;
    line-height: 1.6;
  }

  .btn-row {
    display: flex;
    gap: 12px;
  }
  .restart-btn, .history-btn {
    background: none;
    border: 1px solid rgba(0, 240, 255, 0.15);
    color: rgba(0, 240, 255, 0.4);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 12px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .restart-btn:hover, .history-btn:hover {
    border-color: rgba(0, 240, 255, 0.4);
    color: var(--accent);
  }

  /* --- HISTORY SCREEN --- */
  #history {
    gap: 24px;
    justify-content: flex-start;
    min-height: 100vh;
    min-height: 100dvh;
    padding-top: 40px;
    animation: fadeIn 0.6s ease;
    overflow-y: auto;
  }
  #history h2 {
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 400;
    opacity: 0.6;
  }

  .history-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 60vh;
    overflow-y: auto;
    padding-right: 4px;
  }
  .history-list::-webkit-scrollbar { width: 3px; }
  .history-list::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.1); border-radius: 2px; }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(0, 240, 255, 0.02);
    border: 1px solid rgba(0, 240, 255, 0.06);
    border-radius: 8px;
    font-size: 12px;
  }
  .history-item .hi-date {
    color: rgba(255,255,255,0.3);
  }
  .history-item .hi-pattern {
    color: rgba(0, 240, 255, 0.35);
    font-size: 10px;
    letter-spacing: 1px;
  }
  .history-item .hi-duration {
    color: rgba(255,255,255,0.4);
  }

  .history-empty {
    color: rgba(255,255,255,0.15);
    font-size: 13px;
    text-align: center;
    padding: 40px 0;
  }

  .clear-history-btn {
    background: none;
    border: 1px solid rgba(255, 100, 100, 0.15);
    color: rgba(255, 100, 100, 0.3);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .clear-history-btn:hover {
    border-color: rgba(255, 100, 100, 0.4);
    color: rgba(255, 100, 100, 0.6);
  }

  /* Background particles */
  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    opacity: 0.35;
    pointer-events: none;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .brand h1 { font-size: 22px; letter-spacing: 6px; }
    .pattern-grid { gap: 8px; }
    .pattern-btn { padding: 12px 8px; font-size: 12px; }
    .time-btn { padding: 10px 0; font-size: 14px; }
    .stats-bar { gap: 16px; }
    .stat-value { font-size: 20px; }
    .breath-container { width: 200px; height: 200px; }
    .breath-ring { width: 150px; height: 150px; }
    .phase-timer { font-size: 28px; }
  }

  @media (max-width: 360px) {
    .pattern-grid { grid-template-columns: 1fr; }
    .time-btn { min-width: 44px; }
  }
</style>
</head>
<body>

<div id="gradientOverlay"></div>
<canvas id="bg"></canvas>

<!-- SETUP SCREEN -->
<div id="setup" class="screen active">
  <div class="brand">
    <h1>Mindful Breath</h1>
    <p>guided breathing</p>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-item">
      <div class="stat-value" id="statSessions">0</div>
      <div class="stat-label">sessions</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statMinutes">0</div>
      <div class="stat-label">minutes</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statStreak">0</div>
      <div class="stat-label">day streak</div>
    </div>
  </div>

  <div class="section-label">Breathing Pattern</div>
  <div class="pattern-grid">
    <button class="pattern-btn selected" data-pattern="box">
      <div class="pattern-name">Box</div>
      <div class="pattern-desc">4-4-4-4</div>
    </button>
    <button class="pattern-btn" data-pattern="sleep">
      <div class="pattern-name">4-7-8 Sleep</div>
      <div class="pattern-desc">Inhale 4, hold 7, exhale 8</div>
    </button>
    <button class="pattern-btn" data-pattern="simple">
      <div class="pattern-name">Simple</div>
      <div class="pattern-desc">4 in, 4 out</div>
    </button>
    <button class="pattern-btn" data-pattern="custom">
      <div class="pattern-name">Custom</div>
      <div class="pattern-desc">Set your own</div>
    </button>
  </div>

  <div id="customPatternEditor">
    <div class="custom-phase">
      <label>Inhale</label>
      <input type="number" id="cpInhale" min="1" max="20" value="4">
    </div>
    <div class="custom-phase">
      <label>Hold</label>
      <input type="number" id="cpHoldIn" min="0" max="20" value="4">
    </div>
    <div class="custom-phase">
      <label>Exhale</label>
      <input type="number" id="cpExhale" min="1" max="20" value="4">
    </div>
    <div class="custom-phase">
      <label>Hold</label>
      <input type="number" id="cpHoldOut" min="0" max="20" value="4">
    </div>
  </div>

  <div class="section-label">Duration</div>
  <div class="time-grid">
    <button class="time-btn" data-minutes="2">2<span>min</span></button>
    <button class="time-btn selected" data-minutes="5">5<span>min</span></button>
    <button class="time-btn" data-minutes="10">10<span>min</span></button>
    <button class="time-btn" data-minutes="15">15<span>min</span></button>
    <button class="time-btn" data-minutes="20">20<span>min</span></button>
    <button class="time-btn" data-minutes="30">30<span>min</span></button>
  </div>
  <div class="custom-time-row">
    <input type="number" id="customMin" min="1" max="120" placeholder="--">
    <label>MIN</label>
  </div>

  <div class="section-label">Ambient Sound</div>
  <div class="ambient-row">
    <button class="ambient-btn selected" data-ambient="silence">Silence</button>
    <button class="ambient-btn" data-ambient="rain">Rain</button>
    <button class="ambient-btn" data-ambient="ocean">Ocean</button>
  </div>

  <button class="start-btn" id="startBtn">Begin</button>
</div>

<!-- MEDITATION SCREEN -->
<div id="meditation" class="screen">
  <div class="top-bar">
    <div class="total-timer" id="totalTimer">05:00</div>
  </div>
  <div class="breath-container">
    <div class="breath-ring" id="ring">
      <span class="breath-label" id="phaseLabel">Ready</span>
      <span class="phase-timer" id="phaseTimer"></span>
    </div>
  </div>
  <div class="cycle-count" id="cycleCount"></div>
  <div class="pattern-indicator" id="patternIndicator"></div>
  <button class="stop-btn" id="stopBtn">End Session</button>
</div>

<!-- COMPLETION SCREEN -->
<div id="complete" class="screen">
  <h2>Session Complete</h2>
  <div class="complete-stats" id="completeStats"></div>
  <div class="motivational" id="motivational"></div>
  <div class="btn-row">
    <button class="restart-btn" id="restartBtn">New Session</button>
    <button class="history-btn" id="viewHistoryBtn">History</button>
  </div>
</div>

<!-- HISTORY SCREEN -->
<div id="history" class="screen">
  <h2>Session History</h2>
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-value" id="hStatSessions">0</div>
      <div class="stat-label">sessions</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="hStatMinutes">0</div>
      <div class="stat-label">minutes</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="hStatStreak">0</div>
      <div class="stat-label">day streak</div>
    </div>
  </div>
  <div class="history-list" id="historyList"></div>
  <div class="btn-row">
    <button class="restart-btn" id="historyBackBtn">Back</button>
    <button class="clear-history-btn" id="clearHistoryBtn">Clear All</button>
  </div>
</div>

<script>
// =============================================
// MINDFUL BREATH - Guided Breathing App
// Single-file, zero dependencies
// =============================================

// --- AUDIO ENGINE (Web Audio API) ---
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, volume, type) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();

  osc.type = type || 'sine';
  osc.frequency.value = freq;

  filter.type = 'lowpass';
  filter.frequency.value = freq * 2.5;
  filter.Q.value = 0.7;

  const now = ctx.currentTime;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(volume, now + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  osc.start(now);
  osc.stop(now + duration);
}

function bellInhale() {
  playTone(528, 2.0, 0.15, 'sine');
  playTone(792, 2.5, 0.06, 'sine');
}

function bellExhale() {
  playTone(396, 2.0, 0.12, 'sine');
  playTone(528, 2.5, 0.05, 'sine');
}

function bellHold() {
  playTone(440, 0.8, 0.04, 'sine');
}

function bellComplete() {
  const ctx = getAudio();
  const now = ctx.currentTime;
  [528, 660, 792].forEach((f, i) => {
    setTimeout(() => playTone(f, 2.5, 0.2, 'sine'), i * 500);
  });
}

function bellStart() {

  setTimeout(() => playTone(528, 2.0, 0.18, 'sine'), 300);
}

// --- AMBIENT SOUND ENGINE ---
let ambientNodes = null;

function startAmbient(type) {
  stopAmbient();
  if (type === 'silence') return;

  const ctx = getAudio();
  const bufferSize = 2 * ctx.sampleRate;
  const buffer = ctx.createBuffer(2, bufferSize, ctx.sampleRate);

  // Generate white noise
  for (let ch = 0; ch < 2; ch++) {
    const data = buffer.getChannelData(ch);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
  }

  const source = ctx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;

  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  const filter2 = ctx.createBiquadFilter();

  if (type === 'rain') {
    filter.type = 'bandpass';
    filter.frequency.value = 3000;
    filter.Q.value = 0.4;
    filter2.type = 'highpass';
    filter2.frequency.value = 400;
    filter2.Q.value = 0.3;
    gain.gain.value = 0.06;
  } else if (type === 'ocean') {
    filter.type = 'lowpass';
    filter.frequency.value = 500;
    filter.Q.value = 0.5;
    filter2.type = 'lowpass';
    filter2.frequency.value = 800;
    filter2.Q.value = 0.3;
    gain.gain.value = 0.1;

    // Add a slow LFO for wave-like effect
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.type = 'sine';
    lfo.frequency.value = 0.12;
    lfoGain.gain.value = 250;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);
    lfo.start();
    ambientNodes = { source, gain, filter, filter2, lfo, lfoGain };
  }

  source.connect(filter);
  filter.connect(filter2);
  filter2.connect(gain);
  gain.connect(ctx.destination);
  source.start();

  if (!ambientNodes) {
    ambientNodes = { source, gain, filter, filter2 };
  } else {
    ambientNodes.source = source;
    ambientNodes.gain = gain;
  }
}

function stopAmbient() {
  if (ambientNodes) {
    try {
      ambientNodes.source.stop();
      if (ambientNodes.lfo) ambientNodes.lfo.stop();
    } catch(e) {}
    ambientNodes = null;
  }
}

// --- SESSION HISTORY (localStorage) ---
const STORAGE_KEY = 'mindful_breath_history';

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch(e) { return []; }
}

function saveSession(session) {
  const hist = loadHistory();
  hist.unshift(session);
  // Keep last 200 sessions max
  if (hist.length > 200) hist.length = 200;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(hist));
}

function clearHistory() {
  localStorage.removeItem(STORAGE_KEY);
}

function getStats() {
  const hist = loadHistory();
  const totalSessions = hist.length;
  const totalMinutes = Math.round(hist.reduce((sum, s) => sum + (s.duration || 0), 0) / 60);

  // Calculate streak
  let streak = 0;
  if (hist.length > 0) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const dates = new Set();
    hist.forEach(s => {
      const d = new Date(s.date);
      d.setHours(0,0,0,0);
      dates.add(d.getTime());
    });

    const sortedDates = Array.from(dates).sort((a,b) => b - a);
    const oneDay = 86400000;

    // Check if today or yesterday has a session
    const todayMs = today.getTime();
    const yesterdayMs = todayMs - oneDay;

    if (sortedDates[0] === todayMs || sortedDates[0] === yesterdayMs) {
      streak = 1;
      for (let i = 1; i < sortedDates.length; i++) {
        if (sortedDates[i] === sortedDates[i-1] - oneDay) {
          streak++;
        } else {
          break;
        }
      }
    }
  }

  return { totalSessions, totalMinutes, streak };
}

function updateStatsDisplay() {
  const stats = getStats();
  document.getElementById('statSessions').textContent = stats.totalSessions;
  document.getElementById('statMinutes').textContent = stats.totalMinutes;
  document.getElementById('statStreak').textContent = stats.streak;
}

// --- BREATHING ENGINE ---
function enterPhase(idx) {
  const phase = activePhases[idx];
  phaseRemaining = phase.duration;

  ring.className = 'breath-ring ' + phase.key;
  phaseLabel.textContent = phase.name;

  // Set transition duration to match the phase
  ring.style.transitionDuration = phase.duration + 's';

  // Play appropriate sound
  if (phase.key === 'inhale') bellInhale();
  else if (phase.key === 'exhale') bellExhale();
  else bellHold();

  // Update gradient overlay color
  const colors = {
    'inhale': 'radial-gradient(ellipse at center, rgba(0,240,255,0.6) 0%, transparent 70%)',
    'hold-in': 'radial-gradient(ellipse at center, rgba(180,77,255,0.5) 0%, transparent 70%)',
    'exhale': 'radial-gradient(ellipse at center, rgba(0,255,136,0.5) 0%, transparent 70%)',
    'hold-out': 'radial-gradient(ellipse at center, rgba(255,200,50,0.4) 0%, transparent 70%)',
  };
  gradientOverlay.style.background = colors[phase.key];

  // Track cycles
  if (idx === 0) cycles++;
  cycleCountEl.textContent = 'Cycle ' + cycles;
}

function tick() {
  if (!running) return;

  remainingSeconds--;
  phaseRemaining--;

  // Update total timer
  const m = Math.floor(Math.max(0, remainingSeconds) / 60);
  const s = Math.max(0, remainingSeconds) % 60;
  totalTimerEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');

  // Update phase countdown
  phasTimerEl.textContent = phaseRemaining > 0 ? phaseRemaining : '';

  // Session done
  if (remainingSeconds <= 0) {
    endSession();
    return;
  }

  // Next phase
  if (phaseRemaining <= 0) {
    currentPhase = (currentPhase + 1) % activePhases.length;
    enterPhase(currentPhase);
  }
}

function endSession() {
  running = false;
  clearInterval(intervalId);
  stopAmbient();
  bellComplete();

  // Reset gradient
  gradientOverlay.style.background = 'radial-gradient(ellipse at center, rgba(0,255,136,0.4) 0%, transparent 70%)';

  const elapsed = totalSeconds - Math.max(0, remainingSeconds);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  // Only save if session was at least 10 seconds
  if (elapsed >= 10) {
    saveSession({
      date: new Date().toISOString(),
      duration: elapsed,
      pattern: PATTERNS[selectedPattern].name,
      cycles: cycles,
    });
  }

  const totalBreaths = cycles * activePhases.filter(p => p.key === 'inhale').length;

  document.getElementById('completeStats').innerHTML =
    '<strong>' + mins + ' min ' + secs + ' sec</strong><br>' +
    cycles + ' breath cycles<br>' +
    totalBreaths + ' breaths';

  // Motivational messages
  const messages = [
    'Every breath is a small act of returning to yourself.',
    'Stillness is not doing nothing. It is aligning everything.',
    'The mind that pauses grows clearer with each return.',
    'You chose presence. That matters more than you think.',
    'Calm is not a place you find. It is a practice you build.',
    'A few minutes of stillness can shift the entire day.',
    'Consistency over intensity. You showed up.',
    'The breath was always there, waiting for your attention.',
  ];
  document.getElementById('motivational').textContent =
    messages[Math.floor(Math.random() * messages.length)];

  showScreen('complete');
  updateStatsDisplay();
}

// --- BACKGROUND PARTICLES ---
const canvas = document.getElementById('bg');
const ctx2 = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const particleCount = Math.min(80, Math.floor(window.innerWidth * window.innerHeight / 15000));
for (let i = 0; i < particleCount; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    dx: (Math.random() - 0.5) * 0.25,
    dy: (Math.random() - 0.5) * 0.25,
    phase: Math.random() * Math.PI * 2,
  });
}

// Track breathing phase for particle color
let currentPhaseKey = 'inhale';
const phaseColors = {
  'inhale':   [0, 240, 255],
  'hold-in':  [180, 77, 255],
  'exhale':   [0, 255, 136],
  'hold-out': [255, 200, 50],
};
let particleColor = [0, 240, 255];
let targetColor = [0, 240, 255];

function lerpColor(a, b, t) {
  return [
    a[0] + (b[0] - a[0]) * t,
    a[1] + (b[1] - a[1]) * t,
    a[2] + (b[2] - a[2]) * t,
  ];
}

// Override enterPhase to track color
const origEnterPhase = enterPhase;
// We can't reassign const, but we update currentPhaseKey inside enterPhase already
// Let's use a MutationObserver-like approach: check ring class

function drawParticles() {
  ctx2.clearRect(0, 0, canvas.width, canvas.height);
  const t = Date.now() * 0.001;

  // Update target color based on ring class
  if (ring.classList.contains('inhale')) targetColor = phaseColors['inhale'];
  else if (ring.classList.contains('hold-in')) targetColor = phaseColors['hold-in'];
  else if (ring.classList.contains('exhale')) targetColor = phaseColors['exhale'];
  else if (ring.classList.contains('hold-out')) targetColor = phaseColors['hold-out'];
  else targetColor = phaseColors['inhale'];

  // Smooth lerp
  particleColor = lerpColor(particleColor, targetColor, 0.02);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;
    if (p.x < -5) p.x = canvas.width + 5;
    if (p.x > canvas.width + 5) p.x = -5;
    if (p.y < -5) p.y = canvas.height + 5;
    if (p.y > canvas.height + 5) p.y = -5;

    const alpha = 0.25 + 0.25 * Math.sin(t * 0.8 + p.phase);
    ctx2.beginPath();
    ctx2.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx2.fillStyle = 'rgba(' +
      Math.round(particleColor[0]) + ',' +
      Math.round(particleColor[1]) + ',' +
      Math.round(particleColor[2]) + ',' +
      alpha.toFixed(3) + ')';
    ctx2.fill();
  });

  // Draw subtle connections between nearby particles
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        const lineAlpha = (1 - dist / 120) * 0.06;
        ctx2.beginPath();
        ctx2.moveTo(particles[i].x, particles[i].y);
        ctx2.lineTo(particles[j].x, particles[j].y);
        ctx2.strokeStyle = 'rgba(' +
          Math.round(particleColor[0]) + ',' +
          Math.round(particleColor[1]) + ',' +
          Math.round(particleColor[2]) + ',' +
          lineAlpha.toFixed(4) + ')';
        ctx2.lineWidth = 0.5;
        ctx2.stroke();
      }
    }
  }

  requestAnimationFrame(drawParticles);
}
drawParticles();
