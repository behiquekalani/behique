<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Face - Audio-Reactive Generative Art</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:crosshair}
canvas{display:block}
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10;background:rgba(0,0,0,.7);padding:12px 20px;border-radius:50px;backdrop-filter:blur(10px);border:1px solid #222}
.ctrl{padding:8px 20px;border-radius:50px;border:1px solid #333;background:transparent;color:#888;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .3s;letter-spacing:1px}
.ctrl:hover{border-color:#00e5ff;color:#00e5ff}
.ctrl.active{background:#00e5ff;color:#000;border-color:#00e5ff}
.brand{position:fixed;top:20px;right:20px;font-family:monospace;font-size:11px;color:#222;letter-spacing:3px;z-index:10}
.info{position:fixed;top:20px;left:20px;font-family:monospace;font-size:11px;color:#333;z-index:10;line-height:1.8}
.mic-status{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);font-family:monospace;font-size:11px;color:#444;z-index:10}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="info">
  <div>PARTICLE FACE ENGINE</div>
  <div id="fps">60 FPS</div>
  <div id="particles-count">0 particles</div>
  <div id="mode-label">Mode: Ambient</div>
</div>

<div class="brand">BEHIKE</div>
<div class="mic-status" id="mic-status">Click MIC to enable audio reactivity</div>

<div class="controls">
  <button class="ctrl active" onclick="setMode('ambient')">Ambient</button>
  <button class="ctrl" onclick="setMode('breathe')">Breathe</button>
  <button class="ctrl" onclick="setMode('pulse')">Pulse</button>
  <button class="ctrl" onclick="setMode('explode')">Explode</button>
  <button class="ctrl" onclick="setMode('audio')">MIC</button>
  <button class="ctrl" onclick="cycleColor()">Color</button>
  <button class="ctrl" onclick="screenshot()">Save</button>
</div>

<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H, cx, cy;
var particles = [];
var mouseX = 0, mouseY = 0;
var mode = 'ambient';
var colorIdx = 0;
var colors = [
  {r:0,g:229,b:255},   // cyan
  {r:180,g:77,b:255},   // purple
  {r:0,g:255,b:136},    // green
  {r:255,g:215,b:0},    // gold
  {r:255,g:68,b:68},    // red
  {r:255,g:255,b:255},  // white
];
var color = colors[0];
var audioCtx = null, analyser = null, audioData = null;
var breathPhase = 0;
var frameCount = 0;
var lastTime = performance.now();

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
resize();
window.addEventListener('resize', resize);

// Face geometry - create particles in face shape
function createFace() {
  particles = [];
  var faceR = Math.min(W,H) * 0.25;

  // Head outline (circle)
  for (var i = 0; i < 200; i++) {
    var a = (i/200) * Math.PI * 2;
    particles.push(makeParticle(cx + Math.cos(a)*faceR, cy + Math.sin(a)*faceR * 0.95, 2));
  }

  // Left eye
  var eyeY = cy - faceR*0.15;
  var eyeLX = cx - faceR*0.3;
  var eyeRX = cx + faceR*0.3;
  var eyeR = faceR*0.12;

  for (var i = 0; i < 40; i++) {
    var a = (i/40)*Math.PI*2;
    particles.push(makeParticle(eyeLX + Math.cos(a)*eyeR, eyeY + Math.sin(a)*eyeR*0.6, 1.5));
    particles.push(makeParticle(eyeRX + Math.cos(a)*eyeR, eyeY + Math.sin(a)*eyeR*0.6, 1.5));
  }

  // Pupils
  for (var i = 0; i < 15; i++) {
    var a = (i/15)*Math.PI*2;
    var pr = eyeR*0.4;
    particles.push(makeParticle(eyeLX + Math.cos(a)*pr, eyeY + Math.sin(a)*pr*0.6, 2.5));
    particles.push(makeParticle(eyeRX + Math.cos(a)*pr, eyeY + Math.sin(a)*pr*0.6, 2.5));
  }

  // Nose
  for (var i = 0; i < 20; i++) {
    var t = i/20;
    particles.push(makeParticle(cx, cy + t*faceR*0.3, 1));
  }

  // Mouth
  for (var i = 0; i < 50; i++) {
    var t = (i/50)*Math.PI;
    var mouthW = faceR*0.35;
    var mouthY = cy + faceR*0.35;
    particles.push(makeParticle(cx - mouthW/2 + Math.cos(t)*mouthW/2*(-1), mouthY + Math.sin(t)*faceR*0.08, 1.5));
  }

  // Jawline
  for (var i = 0; i < 60; i++) {
    var a = Math.PI*0.3 + (i/60)*Math.PI*0.4;
    particles.push(makeParticle(cx + Math.cos(a)*faceR*1.02, cy + Math.sin(a)*faceR*0.98, 1));
  }

  // Fill particles (scattered inside face)
  for (var i = 0; i < 150; i++) {
    var a = Math.random()*Math.PI*2;
    var r = Math.random()*faceR*0.85;
    particles.push(makeParticle(cx + Math.cos(a)*r, cy + Math.sin(a)*r*0.95, Math.random()*1.5+0.5));
  }

  document.getElementById('particles-count').textContent = particles.length + ' particles';
}

function makeParticle(tx, ty, size) {
  return {
    x: cx + (Math.random()-0.5)*W, // start scattered
    y: cy + (Math.random()-0.5)*H,
    tx: tx, ty: ty, // target position
    ox: tx, oy: ty, // original target
    vx: 0, vy: 0,
    size: size,
    alpha: Math.random()*0.5 + 0.5,
    phase: Math.random()*Math.PI*2
  };
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.ctrl').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  document.getElementById('mode-label').textContent = 'Mode: '+m.charAt(0).toUpperCase()+m.slice(1);

  if (m === 'audio') {
    enableMic();
  } else if (m === 'explode') {
    particles.forEach(function(p){
      p.vx = (Math.random()-0.5)*20;
      p.vy = (Math.random()-0.5)*20;
    });
    setTimeout(function(){ mode = 'ambient'; }, 2000);
  }
}

function cycleColor() {
  colorIdx = (colorIdx+1) % colors.length;
  color = colors[colorIdx];
}

function enableMic() {
  if (audioCtx) return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    audioCtx = new AudioContext();
    var source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    audioData = new Uint8Array(analyser.frequencyBinCount);
    document.getElementById('mic-status').textContent = 'MIC ACTIVE — speak or play music';
  }).catch(function(){
    document.getElementById('mic-status').textContent = 'MIC denied — try again';
  });
}

function getAudioLevel() {
  if (!analyser || !audioData) return 0;
  analyser.getByteFrequencyData(audioData);
  var sum = 0;
  for (var i = 0; i < audioData.length; i++) sum += audioData[i];
  return sum / audioData.length / 255;
}

function screenshot() {
  var link = document.createElement('a');
  link.download = 'particle-face-'+Date.now()+'.png';
  link.href = canvas.toDataURL();
  link.click();
}

canvas.addEventListener('mousemove', function(e){ mouseX = e.clientX; mouseY = e.clientY; });

function animate() {
  var now = performance.now();
  var dt = (now - lastTime) / 16.67;
  lastTime = now;
  frameCount++;

  if (frameCount % 30 === 0) {
    document.getElementById('fps').textContent = Math.round(1000/((now-lastTime)||16.67)) + ' FPS';
  }

  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0,0,W,H);

  var audioLevel = getAudioLevel();
  breathPhase += 0.02;

  particles.forEach(function(p) {
    var tx = p.ox, ty = p.oy;

    // Mode behaviors
    if (mode === 'breathe') {
      var breathScale = 1 + Math.sin(breathPhase)*0.15;
      tx = cx + (p.ox - cx)*breathScale;
      ty = cy + (p.oy - cy)*breathScale;
    } else if (mode === 'pulse') {
      var pulseScale = 1 + Math.sin(breathPhase*3)*0.08;
      tx = cx + (p.ox - cx)*pulseScale;
      ty = cy + (p.oy - cy)*pulseScale;
      p.alpha = 0.5 + Math.sin(breathPhase*3 + p.phase)*0.5;
    } else if (mode === 'audio' && audioLevel > 0) {
      var audioScale = 1 + audioLevel*0.5;
      tx = cx + (p.ox - cx)*audioScale;
      ty = cy + (p.oy - cy)*audioScale;
      p.size = (p.ox === cx ? 1 : 2) + audioLevel*4;
    }

    // Mouse repulsion
    var dx = p.x - mouseX;
    var dy = p.y - mouseY;
    var dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 100) {
      var force = (100 - dist) / 100 * 3;
      p.vx += (dx/dist)*force;
      p.vy += (dy/dist)*force;
    }

    // Spring to target
    p.vx += (tx - p.x) * 0.05;
    p.vy += (ty - p.y) * 0.05;
    p.vx *= 0.85;
    p.vy *= 0.85;
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Draw
    var r = color.r, g = color.g, b = color.b;
    if (mode === 'audio' && audioLevel > 0.3) {
      // Shift color with audio
      r = Math.min(255, color.r + audioLevel*100);
      g = Math.min(255, color.g * (1-audioLevel*0.5));
    }

    ctx.globalAlpha = p.alpha * (mode === 'audio' ? (0.5+audioLevel) : 1);
    ctx.fillStyle = 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();

    // Glow
    ctx.globalAlpha = p.alpha * 0.1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size*3, 0, Math.PI*2);
    ctx.fill();
  });

  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}

createFace();
animate();
</script>
</body>
</html>
