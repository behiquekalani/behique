<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 600px; height: 600px; background: #0a0a0a; color: #fff;
    font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center;
    padding: 60px; overflow: hidden;
  }
  .badge { background: #00e5ff; color: #000; padding: 4px 14px; border-radius: 4px; font-size: 12px; font-weight: 800; letter-spacing: 1px; margin-bottom: 20px; }
  .title { font-size: 38px; font-weight: 900; line-height: 1.1; margin-bottom: 12px; }
  .title span { color: #00e5ff; }
  .cyan-line { width: 60px; height: 3px; background: #00e5ff; margin-bottom: 16px; }
  .sub { font-size: 14px; color: #888; margin-bottom: 20px; }
  .brand { font-size: 11px; color: #333; letter-spacing: 4px; text-transform: uppercase; }
</style></head><body>
  <div class="badge">BUNDLE</div>
  <div class="title">ALL 15<br><span>BLUEPRINTS</span></div>
  <div class="cyan-line"></div>
  <div class="sub">$49 — Save $250+</div>
  <div class="brand">BEHIKE</div>
</body></html>
