<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html{overflow:hidden}
body{width:600px;height:600px;background:#0a0a0f;font-family:-apple-system,'SF Pro Display',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative}
.card::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(0,212,255,0.04) 0%,transparent 70%)}
h1{color:#fff;font-size:38px;font-weight:200;letter-spacing:6px;line-height:1.15;margin-bottom:12px}
h2{color:#555;font-size:13px;font-weight:300;letter-spacing:3px}
.line{width:40px;height:1px;background:#00D4FF;margin:20px auto}
.brand{position:absolute;bottom:40px;font-size:9px;color:#333;letter-spacing:4px}
</style></head><body>
<div class="card">
<h1>FIRST<br>DOLLAR</h1>
<div class="line"></div>
<h2>Guide</h2>
<div class="brand">BEHIKE</div>
</div>
</body></html>
