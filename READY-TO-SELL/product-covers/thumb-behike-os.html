<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:600px;height:600px;background:#0a0a0f;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card{width:560px;height:560px;border:1px solid #222;border-radius:20px;padding:44px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(0,212,255,0.06) 0%,transparent 70%)}
.tag{font-size:10px;color:#00D4FF;letter-spacing:3px;margin-bottom:16px;font-weight:700}
h1{color:#fff;font-size:36px;font-weight:200;letter-spacing:6px;margin-bottom:4px}
h2{color:#666;font-size:12px;font-weight:300;margin-bottom:24px;letter-spacing:1px}
.mods{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:20px}
.mod{background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:8px 10px;font-size:9px;display:flex;justify-content:space-between}
.mod .num{color:#00D4FF;letter-spacing:2px;font-weight:700}
.mod .name{color:#888}
.price{font-size:32px;font-weight:600;color:#fff;margin-top:auto}
.price span{font-size:12px;color:#555;font-weight:300;margin-left:8px}
.includes{font-size:10px;color:#444;margin-top:8px}
</style></head><body>
<div class="card">
<div class="tag">FLAGSHIP</div>
<h1>BEHIKE</h1>
<h2>Operating System</h2>
<div class="mods">
<div class="mod"><span class="num">01</span><span class="name">Brand Identity</span></div>
<div class="mod"><span class="num">02</span><span class="name">Revenue Engine</span></div>
<div class="mod"><span class="num">03</span><span class="name">Product Stack</span></div>
<div class="mod"><span class="num">04</span><span class="name">Content System</span></div>
<div class="mod"><span class="num">05</span><span class="name">Marketing</span></div>
<div class="mod"><span class="num">06</span><span class="name">Operations</span></div>
<div class="mod"><span class="num">07</span><span class="name">Finance</span></div>
<div class="mod"><span class="num">08</span><span class="name">Health + Energy</span></div>
<div class="mod"><span class="num">09</span><span class="name">Quarterly Review</span></div>
<div class="mod"><span class="num">10</span><span class="name">12-Month Timeline</span></div>
</div>
<div class="price">$97<span>Standard + Wide format</span></div>
<div class="includes">Includes all 15 niche blueprints. ADHD-optimized.</div>
</div>
</body></html>
