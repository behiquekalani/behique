<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 600px;
    height: 600px;
    background: #0a0a0f;
    font-family: -apple-system, 'Helvetica Neue', 'SF Pro Display', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Subtle gradient overlay */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 50% 40%, rgba(0,212,255,0.06) 0%, transparent 70%);
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .title-1 {
    font-size: 48px;
    font-weight: 700;
    color: #F5F5F7;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .title-2 {
    font-size: 48px;
    font-weight: 700;
    color: #F5F5F7;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-top: 4px;
  }
  .line {
    width: 60px;
    height: 2px;
    background: #00D4FF;
    margin: 24px 0;
  }
  .subtitle {
    font-size: 20px;
    color: #86868B;
    font-weight: 400;
    letter-spacing: 0.02em;
  }
  .brand {
    position: absolute;
    bottom: 36px;
    font-size: 13px;
    font-weight: 600;
    color: #86868B;
    letter-spacing: 0.2em;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="title-1">CLAUDE</div>
    <div class="title-2">COWORK</div>
    <div class="line"></div>
    <div class="subtitle">for Non-Coders</div>
  </div>
  <div class="brand">BEHIKE</div>
</body>
</html>
