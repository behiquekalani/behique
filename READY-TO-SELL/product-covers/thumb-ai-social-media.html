<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 600px; height: 600px;
    overflow: hidden;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }
  .wrap {
    text-align: center;
  }
  .title {
    font-size: 48px;
    font-weight: 200;
    color: #ffffff;
    letter-spacing: 8px;
    margin-bottom: 24px;
  }
  .line {
    width: 60px;
    height: 2px;
    background: #00D4FF;
    margin: 0 auto 24px;
  }
  .subtitle {
    font-size: 22px;
    font-weight: 300;
    color: #86868B;
    letter-spacing: 2px;
  }
  .brand {
    position: absolute;
    bottom: 40px;
    left: 0; right: 0;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="title">SOCIAL MEDIA</div>
    <div class="line"></div>
    <div class="subtitle">AI Automation</div>
  </div>
  <div class="brand">BEHIKE</div>
</body>
</html>
