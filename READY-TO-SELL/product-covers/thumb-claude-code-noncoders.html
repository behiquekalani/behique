<!DOCTYPE html>
<html lang="en" style="margin:0;padding:0;overflow:hidden;">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 600px; height: 600px; overflow: hidden; background: #0a0a0f; font-family: -apple-system, 'Helvetica Neue', sans-serif; }
  .wrap { width: 600px; height: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .title { font-size: 42px; font-weight: 700; color: #F5F5F7; letter-spacing: 0.15em; text-align: center; }
  .line { width: 60px; height: 2px; background: #00D4FF; margin: 18px 0; }
  .sub { font-size: 13px; color: #86868B; letter-spacing: 0.1em; text-align: center; }
  .brand { position: absolute; bottom: 36px; font-size: 11px; color: #333; letter-spacing: 0.3em; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">CLAUDE CODE</div>
  <div class="line"></div>
  <div class="sub">for Non-Coders</div>
  <div class="brand">BEHIKE</div>
</div>
</body>
</html>
