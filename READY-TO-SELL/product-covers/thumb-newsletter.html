<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:600px;height:600px;background:#0a0a0f;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card{width:560px;height:560px;border:1px solid #222;border-radius:20px;padding:48px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-60px;right:-60px;width:250px;height:250px;background:radial-gradient(circle,rgba(0,212,255,0.06) 0%,transparent 70%)}
.tag{font-size:10px;color:#00D4FF;letter-spacing:3px;margin-bottom:20px;font-weight:700}
h1{color:#fff;font-size:28px;font-weight:200;letter-spacing:4px;margin-bottom:6px}
h2{color:#666;font-size:13px;font-weight:300;margin-bottom:28px}
.desc{color:#888;font-size:12px;line-height:1.8;margin-bottom:24px}
.price{font-size:28px;font-weight:600;color:#fff;margin-top:auto}
.price span{font-size:13px;color:#555;font-weight:300;margin-left:8px}
</style></head><body>
<div class="card">
<div class="tag">BLUEPRINT</div>
<h1>NEWSLETTER</h1>
<h2>Newsletter Blueprint v3</h2>
<div class="desc">List growth, monetization, automation</div>
<div class="price">$19.99<span>PDF</span></div>
</div>
</body></html>
