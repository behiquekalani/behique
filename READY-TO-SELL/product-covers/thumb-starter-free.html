<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:600px;height:600px;background:#0a0a0f;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card{width:560px;height:560px;border:1px solid #1a1a1a;border-radius:20px;padding:48px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(0,212,255,0.06) 0%,transparent 70%)}
.badge{display:inline-block;padding:4px 14px;border:1px solid rgba(52,199,89,0.4);border-radius:20px;font-size:12px;color:#34C759;letter-spacing:2px;margin-bottom:24px;width:fit-content;font-weight:700}
h1{color:#fff;font-size:36px;font-weight:200;letter-spacing:6px;margin-bottom:6px}
h2{color:#666;font-size:14px;font-weight:300;margin-bottom:28px}
.weeks{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.week{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.week .w-num{font-size:9px;color:#00D4FF;letter-spacing:2px;font-weight:700}
.week .w-title{font-size:12px;color:#fff;font-weight:500}
.upsell{font-size:11px;color:#00D4FF;margin-top:auto}
</style></head><body>
<div class="card">
<div class="badge">FREE</div>
<h1>BEHIKE</h1>
<h2>Starter Blueprint</h2>
<div class="weeks">
<div class="week"><span class="w-num">WEEK 1</span><span class="w-title">Foundation</span></div>
<div class="week"><span class="w-num">WEEK 2</span><span class="w-title">First Product</span></div>
<div class="week"><span class="w-num">WEEK 3</span><span class="w-title">Content Engine</span></div>
<div class="week"><span class="w-num">WEEK 4</span><span class="w-title">First Sales</span></div>
</div>
<div class="upsell">Module 01 of the Behike Operating System</div>
</div>
</body></html>
