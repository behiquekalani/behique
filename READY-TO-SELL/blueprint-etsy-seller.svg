  <rect x="1350" y="1330" width="530" height="55" rx="4" fill="none" stroke="#ffffff" stroke-width="1"/>
  <text x="1615" y="1363" text-anchor="middle" class="body-bold">High Ticket: $20-$49</text>

  <rect x="1350" y="1405" width="530" height="55" rx="4" fill="none" stroke="#ffffff" stroke-width="1"/>
  <text x="1615" y="1438" text-anchor="middle" class="body-bold">Premium Bundle: $50+</text>

  <rect x="1910" y="1180" width="540" height="280" rx="4" fill="#111111"/>
