  <text x="1530" y="1620" class="small">Test niches. Optimize SEO. Target: $100/mo</text>

  <circle cx="1500" cy="1670" r="8" fill="#007AFF"/>
  <text x="1530" y="1665" class="body-bold">Month 3-4: Scale to 30 listings</text>
  <text x="1530" y="1690" class="small">Double down on winners. Target: $500/mo</text>

  <circle cx="1500" cy="1740" r="8" fill="#007AFF"/>
  <text x="1530" y="1735" class="body-bold">Month 5-8: 50+ listings, ads</text>
  <text x="1530" y="1760" class="small">Pinterest + Etsy Ads. Target: $2K/mo</text>

  <circle cx="1500" cy="1810" r="8" fill="#007AFF"/>
  <text x="1530" y="1805" class="body-bold">Month 9-12: 100+ listings</text>
  <text x="1530" y="1830" class="small">Outsource creation. Target: $5-10K/mo</text>

  <!-- Revenue Tracker -->
  <text x="100" y="1900" class="section-num">REVENUE TRACKER</text>
  <line x1="100" y1="1915" x2="2450" y2="1915" stroke="#007AFF" stroke-width="1"/>

  <rect x="100" y="1940" width="380" height="100" rx="4" fill="#111111"/>
  <text x="290" y="1990" text-anchor="middle" class="metric-value">$____</text>
  <text x="290" y="2020" text-anchor="middle" class="metric-label">MONTHLY REVENUE</text>

  <rect x="510" y="1940" width="380" height="100" rx="4" fill="#111111"/>
  <text x="700" y="1990" text-anchor="middle" class="metric-value">____</text>
  <text x="700" y="2020" text-anchor="middle" class="metric-label">ACTIVE LISTINGS</text>

  <rect x="920" y="1940" width="380" height="100" rx="4" fill="#111111"/>
  <text x="1110" y="1990" text-anchor="middle" class="metric-value">____</text>
  <text x="1110" y="2020" text-anchor="middle" class="metric-label">TOTAL ORDERS</text>

  <rect x="1330" y="1940" width="380" height="100" rx="4" fill="#111111"/>
  <text x="1520" y="1990" text-anchor="middle" class="metric-value">$____</text>
  <text x="1520" y="2020" text-anchor="middle" class="metric-label">AVG ORDER VALUE</text>

  <rect x="1740" y="1940" width="380" height="100" rx="4" fill="#111111"/>
  <text x="1930" y="1990" text-anchor="middle" class="metric-value">____%</text>
  <text x="1930" y="2020" text-anchor="middle" class="metric-label">CONVERSION RATE</text>

  <rect x="2150" y="1940" width="280" height="100" rx="4" fill="#111111"/>
  <text x="2290" y="1990" text-anchor="middle" class="metric-value">____</text>
  <text x="2290" y="2020" text-anchor="middle" class="metric-label">REVIEWS</text>

