<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2550 3300" width="2550" height="3300">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #ffffff; }
      .title { font-size: 56px; font-weight: 700; letter-spacing: 3px; }
      .subtitle { font-size: 24px; fill: #999999; letter-spacing: 2px; font-weight: 300; }
