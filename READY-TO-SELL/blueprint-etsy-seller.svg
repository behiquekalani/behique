  <text x="800" y="1085" text-anchor="middle" class="body">Most specific subcategory available</text>
  <text x="1500" y="1085" text-anchor="middle" class="body">Etsy-defined</text>
  <text x="2100" y="1085" text-anchor="middle" class="body">Medium</text>

