  <text x="300" y="858" text-anchor="middle" class="body-bold">ELEMENT</text>
  <text x="800" y="858" text-anchor="middle" class="body-bold">BEST PRACTICE</text>
  <text x="1500" y="858" text-anchor="middle" class="body-bold">CHARACTER LIMIT</text>
  <text x="2100" y="858" text-anchor="middle" class="body-bold">PRIORITY</text>

  <line x1="100" y1="875" x2="2450" y2="875" stroke="#333333" stroke-width="0.5"/>
  <text x="300" y="905" text-anchor="middle" class="body">Title</text>
  <text x="800" y="905" text-anchor="middle" class="body">Front-load keywords, natural language</text>
  <text x="1500" y="905" text-anchor="middle" class="body">140 characters</text>
  <text x="2100" y="905" text-anchor="middle" class="body-bold">Critical</text>

  <line x1="100" y1="920" x2="2450" y2="920" stroke="#222222" stroke-width="0.5"/>
  <text x="300" y="950" text-anchor="middle" class="body">Tags</text>
  <text x="800" y="950" text-anchor="middle" class="body">13 tags, long-tail keywords, no repeats</text>
  <text x="1500" y="950" text-anchor="middle" class="body">20 chars each</text>
  <text x="2100" y="950" text-anchor="middle" class="body-bold">Critical</text>

  <line x1="100" y1="965" x2="2450" y2="965" stroke="#222222" stroke-width="0.5"/>
  <text x="300" y="995" text-anchor="middle" class="body">Description</text>
  <text x="800" y="995" text-anchor="middle" class="body">Keywords in first paragraph, benefits-focused</text>
  <text x="1500" y="995" text-anchor="middle" class="body">Unlimited</text>
  <text x="2100" y="995" text-anchor="middle" class="body">High</text>

  <line x1="100" y1="1010" x2="2450" y2="1010" stroke="#222222" stroke-width="0.5"/>
  <text x="300" y="1040" text-anchor="middle" class="body">Images</text>
  <text x="800" y="1040" text-anchor="middle" class="body">10 mockups, lifestyle shots, feature callouts</text>
  <text x="1500" y="1040" text-anchor="middle" class="body">10 images max</text>
  <text x="2100" y="1040" text-anchor="middle" class="body">High</text>

  <line x1="100" y1="1055" x2="2450" y2="1055" stroke="#222222" stroke-width="0.5"/>
