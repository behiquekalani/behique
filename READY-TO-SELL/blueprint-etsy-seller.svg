  <rect x="100" y="1760" width="16" height="16" rx="2" fill="none" stroke="#999999" stroke-width="1"/>
  <text x="130" y="1774" class="checkbox">Offer free bonus for 5-star review</text>
  <rect x="100" y="1790" width="16" height="16" rx="2" fill="none" stroke="#999999" stroke-width="1"/>
  <text x="130" y="1804" class="checkbox">Target: 100+ reviews per listing</text>

