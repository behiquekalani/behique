  <rect x="940" y="465" width="240" height="55" rx="4" fill="none" stroke="#ffffff" stroke-width="1"/>
  <text x="1060" y="498" text-anchor="middle" class="body-bold">Social Media Kits</text>

  <line x1="710" y1="560" x2="1060" y2="580" stroke="#333333" stroke-width="1"/>
  <circle cx="1060" cy="580" r="5" fill="#007AFF"/>
  <rect x="940" y="555" width="240" height="55" rx="4" fill="none" stroke="#ffffff" stroke-width="1"/>
  <text x="1060" y="588" text-anchor="middle" class="body-bold">Notion Templates</text>

  <line x1="700" y1="590" x2="1060" y2="670" stroke="#333333" stroke-width="1"/>
  <circle cx="1060" cy="670" r="5" fill="#007AFF"/>
  <rect x="940" y="645" width="240" height="55" rx="4" fill="none" stroke="#ffffff" stroke-width="1"/>
  <text x="1060" y="678" text-anchor="middle" class="body-bold">Ebooks / Guides</text>

