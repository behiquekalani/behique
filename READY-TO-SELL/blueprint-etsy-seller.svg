  <line x1="1930" y1="1235" x2="2430" y2="1235" stroke="#333333" stroke-width="0.5"/>
  <text x="1940" y="1265" class="small">Start low, raise with reviews</text>
  <text x="1940" y="1290" class="small">Bundle related items (3x value)</text>
  <text x="1940" y="1315" class="small">Etsy takes ~12% total fees</text>
  <text x="1940" y="1340" class="small">Free shipping for digital</text>
  <text x="1940" y="1365" class="small">Seasonal pricing bumps</text>
  <text x="1940" y="1390" class="small">$0.20 listing fee per 4 months</text>
  <text x="1940" y="1415" class="small">Compare top 10 competitor prices</text>

