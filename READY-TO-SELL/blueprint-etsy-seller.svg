      .body-white { font-size: 18px; fill: #ffffff; }
      .body-bold { font-size: 18px; fill: #ffffff; font-weight: 600; }
      .small { font-size: 15px; fill: #999999; }
      .small-white { font-size: 15px; fill: #ffffff; }
      .checkbox { font-size: 16px; fill: #999999; }
      .metric-value { font-size: 36px; font-weight: 700; fill: #ffffff; }
      .metric-label { font-size: 14px; fill: #999999; letter-spacing: 1px; text-transform: uppercase; }
      .hub-label { font-size: 20px; font-weight: 600; fill: #ffffff; }
      .footer { font-size: 16px; fill: #999999; letter-spacing: 3px; }
