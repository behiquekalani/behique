  <rect x="100" y="1160" width="16" height="16" rx="2" fill="none" stroke="#999999" stroke-width="1"/>
  <text x="130" y="1174" class="checkbox">eRank (free tier) for keyword research</text>
  <rect x="100" y="1190" width="16" height="16" rx="2" fill="none" stroke="#999999" stroke-width="1"/>
