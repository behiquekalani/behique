<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Behike Wellness Icon</title>
<style>
  body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #1a1a1a;
  }
  .icon-canvas {
    width: 512px;
    height: 512px;
    position: relative;
    overflow: hidden;
  }
  .icon-bg {
    width: 512px;
    height: 512px;
    border-radius: 112px;
    background: radial-gradient(circle at 30% 30%, #162544, #0A0E17 70%);
    position: absolute;
    top: 0;
    left: 0;
    box-shadow:
      inset 0 1px 0 rgba(124, 200, 255, 0.08),
      0 20px 60px rgba(0,0,0,0.6);
  }
  .icon-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 320px;
    height: 320px;
    margin-top: -160px;
    margin-left: -160px;
    border-radius: 50%;
    border: 3px solid rgba(100, 200, 255, 0.12);
    box-shadow:
      0 0 40px rgba(100, 200, 255, 0.06),
      inset 0 0 40px rgba(100, 200, 255, 0.03);
  }
  .icon-inner-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 240px;
    height: 240px;
    margin-top: -120px;
    margin-left: -120px;
    border-radius: 50%;
    border: 2px solid rgba(100, 200, 255, 0.06);
  }
  .icon-monogram {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 140px;
    font-weight: 700;
    letter-spacing: -6px;
    background: linear-gradient(160deg, #64E8FF 0%, #7C9EFF 40%, #B8D4FF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 2px 20px rgba(100, 180, 255, 0.25));
  }
  .icon-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 180px;
    height: 180px;
    margin-top: -90px;
    margin-left: -90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100, 200, 255, 0.08) 0%, transparent 70%);
  }
  .icon-accent-dot {
    position: absolute;
    bottom: 130px;
    right: 130px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, #64E8FF, #7C9EFF);
    box-shadow: 0 0 12px rgba(100, 200, 255, 0.4);
  }
</style>
</head>
<body>
  <div class="icon-canvas">
    <div class="icon-bg"></div>
    <div class="icon-ring"></div>
    <div class="icon-inner-ring"></div>
    <div class="icon-glow"></div>
    <div class="icon-monogram">BW</div>
    <div class="icon-accent-dot"></div>
  </div>
</body>
</html>
