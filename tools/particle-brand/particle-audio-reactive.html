<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noai, noimageai">
    <meta name="description" content="Behike Particle Brand — audio-reactive generative art face">
    <title>Behike — Particle Brand</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #ui {
            position: fixed;
            bottom: 28px;
            left: 0; right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
            pointer-events: none;
        }
        #brand {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            letter-spacing: 10px;
            color: rgba(124, 158, 255, 0.12);
            text-transform: uppercase;
            user-select: none;
        }
        #hint {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.06);
            text-transform: uppercase;
            user-select: none;
        }
        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 8px;
        }
        .mode-btn {
            background: rgba(124, 158, 255, 0.04);
            border: 1px solid rgba(124, 158, 255, 0.10);
            color: rgba(124, 158, 255, 0.3);
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 14px;
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 2px;
        }
        .mode-btn:hover {
            background: rgba(124, 158, 255, 0.10);
            color: rgba(124, 158, 255, 0.6);
            border-color: rgba(124, 158, 255, 0.22);
        }
        .mode-btn.active {
            background: rgba(124, 158, 255, 0.08);
            color: rgba(124, 158, 255, 0.55);
            border-color: rgba(124, 158, 255, 0.30);
        }
        #vol-wrap {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #vol-label {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(124,158,255,0.25);
            text-transform: uppercase;
        }
        #vol-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 2px;
            background: rgba(124,158,255,0.12);
            outline: none;
            border-radius: 1px;
        }
        #vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(124,158,255,0.4);
            cursor: pointer;
        }
        #copyright {
            position: fixed;
            bottom: 8px;
            right: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 9px;
            color: rgba(255,255,255,0.05);
            z-index: 10;
            user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="controls">
        <button class="mode-btn active" data-mode="ambient">Ambient</button>
        <button class="mode-btn" data-mode="pulse">Pulse</button>
        <button class="mode-btn" data-mode="wave">Wave</button>
    </div>

    <div id="vol-wrap">
        <span id="vol-label">Vol</span>
        <input type="range" id="vol-slider" min="0" max="100" value="30">
    </div>

    <div id="ui">
        <div id="brand">BEHIKE</div>
        <div id="hint">Screen record this. Post it. Watch it go viral.</div>
    </div>
    <div id="copyright">&copy; 2026 Behike</div>

    <script>
    (function() {
        'use strict';

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, centerX, centerY, scale;
        let mouse = { x: -9999, y: -9999 };
        let particles = [];
        let dustParticles = [];
        let audioAmplitude = 0;
        let smoothAmplitude = 0;
        let analyser, audioCtx, dataArray;
        let masterGain, speakerGain;
        let currentMode = 'ambient';
        let audioStarted = false;

        // ---- AUDIO SYNTHESIS ENGINE ----

        // Mode configs
        const MODES = {
            ambient: {
                freqs: [110, 165, 220],       // A2, E3, A3 — open fifth
                lfoSpeed: 0.4,                 // Hz — slow breath
                lfoDepth: 0.35,
                baseGain: 0.6,
                filterFreq: 800,
                color: [124, 158, 255]
            },
            pulse: {
                freqs: [82.4, 123.5, 164.8],   // E2, B2, E3 — grounded power
                lfoSpeed: 1.2,                  // Hz — rhythmic pulse
                lfoDepth: 0.7,
                baseGain: 0.7,
                filterFreq: 1200,
                color: [48, 209, 136]
            },
            wave: {
                freqs: [196, 261.6, 329.6],    // G3, C4, E4 — rising wave
                lfoSpeed: 0.18,                 // Hz — very slow sweep
                lfoDepth: 0.5,
                baseGain: 0.55,
                filterFreq: 1800,
                color: [191, 90, 242]
            }
        };

        let oscillators = [];
        let lfo, lfoGain, filter;
        let accentColor = [124, 158, 255];

        function startAudio() {
            if (audioStarted) return;
            audioStarted = true;

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            analyser.smoothingTimeConstant = 0.82;
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            speakerGain = audioCtx.createGain();
            speakerGain.gain.value = 0.30;

            masterGain = audioCtx.createGain();
            masterGain.gain.value = 1.0;

            filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 800;
            filter.Q.value = 0.8;

            lfo = audioCtx.createOscillator();
            lfoGain = audioCtx.createGain();
            lfo.type = 'sine';
            lfo.frequency.value = 0.4;
            lfoGain.gain.value = 0.35;
            lfo.connect(lfoGain);
            lfoGain.connect(masterGain.gain);
            lfo.start();

            buildOscillators('ambient');

            masterGain.connect(filter);
            filter.connect(analyser);
            analyser.connect(speakerGain);
            speakerGain.connect(audioCtx.destination);
        }

        function buildOscillators(mode) {
            const cfg = MODES[mode];
            // Stop previous
            oscillators.forEach(function(o) { try { o.stop(); } catch(e) {} });
            oscillators = [];

            cfg.freqs.forEach(function(freq, i) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                g.gain.value = cfg.baseGain / cfg.freqs.length * (1 - i * 0.2);
                osc.connect(g);
                g.connect(masterGain);
                osc.start();
                oscillators.push(osc);
            });

            // Update LFO
            lfo.frequency.setTargetAtTime(cfg.lfoSpeed, audioCtx.currentTime, 0.1);
            lfoGain.gain.setTargetAtTime(cfg.lfoDepth, audioCtx.currentTime, 0.1);
            filter.frequency.setTargetAtTime(cfg.filterFreq, audioCtx.currentTime, 0.3);

            accentColor = cfg.color;
        }

        function setMode(mode) {
            if (!audioStarted) startAudio();
            currentMode = mode;
            buildOscillators(mode);
            document.querySelectorAll('.mode-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
        }

        // Mode buttons
        document.querySelectorAll('.mode-btn').forEach(function(btn) {
            btn.addEventListener('click', function() { setMode(btn.dataset.mode); });
        });

        // Volume slider
        const volSlider = document.getElementById('vol-slider');
        volSlider.addEventListener('input', function() {
            if (speakerGain) speakerGain.gain.setTargetAtTime(
                volSlider.value / 100 * 0.6, audioCtx.currentTime, 0.05
            );
        });

        // Start audio on first interaction
        document.addEventListener('click', function startOnce() {
            startAudio();
            document.removeEventListener('click', startOnce);
        }, { once: false });

        // ---- FACE GEOMETRY ---- (identical to particle-face.html)
        function cubicBezier(p0, p1, p2, p3, t) {
            const mt = 1 - t;
            return [
                mt*mt*mt*p0[0] + 3*mt*mt*t*p1[0] + 3*mt*t*t*p2[0] + t*t*t*p3[0],
                mt*mt*mt*p0[1] + 3*mt*mt*t*p1[1] + 3*mt*t*t*p2[1] + t*t*t*p3[1]
            ];
        }

        function sampleBezier(p0, p1, p2, p3, count, jitter) {
            const pts = [];
            jitter = jitter || 0;
            for (let i = 0; i <= count; i++) {
                const t = i / count;
                const [x, y] = cubicBezier(p0, p1, p2, p3, t);
                pts.push([x + (Math.random() - 0.5) * jitter, y + (Math.random() - 0.5) * jitter]);
            }
            return pts;
        }

        function ellipseEdge(cx, cy, rx, ry, count, jitter) {
            const pts = [];
            jitter = jitter || 0;
            for (let i = 0; i < count; i++) {
                const a = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.15;
                pts.push([
                    cx + Math.cos(a) * rx + (Math.random() - 0.5) * jitter,
                    cy + Math.sin(a) * ry + (Math.random() - 0.5) * jitter
                ]);
            }
            return pts;
        }

        function scatterInEllipse(cx, cy, rx, ry, count) {
            const pts = [];
            for (let i = 0; i < count; i++) {
                const a = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random());
                pts.push([cx + Math.cos(a) * rx * r, cy + Math.sin(a) * ry * r]);
            }
            return pts;
        }

        function getFaceWidth(fy) {
            if (fy < -140) return Math.max(0, 80 + (fy + 155) * 1.4);
            if (fy < 0) return 105 + fy * 0.1;
            if (fy < 100) return 100 - fy * 0.4;
            return Math.max(0, 60 - (fy - 100) * 1.1);
        }

        function generateFacePoints() {
            let pts = [];
            pts.push(...sampleBezier([0, -155], [100, -150], [115, -50], [100, 30], 90, 2));
            pts.push(...sampleBezier([100, 30], [90, 90], [55, 135], [0, 150], 70, 2));
            pts.push(...sampleBezier([0, -155], [-100, -150], [-115, -50], [-100, 30], 90, 2));
            pts.push(...sampleBezier([-100, 30], [-90, 90], [-55, 135], [0, 150], 70, 2));
            pts.push(...sampleBezier([0, -150], [92, -142], [108, -45], [93, 32], 50, 4));
            pts.push(...sampleBezier([93, 32], [83, 85], [50, 130], [0, 145], 40, 4));
            pts.push(...sampleBezier([0, -150], [-92, -142], [-108, -45], [-93, 32], 50, 4));
            pts.push(...sampleBezier([-93, 32], [-83, 85], [-50, 130], [0, 145], 40, 4));
            pts.push(...sampleBezier([-85, -135], [-45, -178], [45, -178], [85, -135], 80, 3));
            pts.push(...sampleBezier([-75, -125], [-35, -165], [35, -165], [75, -125], 50, 4));
            for (let i = 0; i < 150; i++) {
                const x = (Math.random() - 0.5) * 150;
                const y = -125 - Math.random() * 45;
                if (Math.abs(x) < 70 + (y + 170) * 0.8) pts.push([x, y]);
            }
            pts.push(...sampleBezier([16, -58], [28, -68], [52, -66], [68, -55], 25, 2));
            pts.push(...sampleBezier([20, -55], [32, -63], [50, -61], [64, -52], 15, 3));
            pts.push(...sampleBezier([-16, -58], [-28, -68], [-52, -66], [-68, -55], 25, 2));
            pts.push(...sampleBezier([-20, -55], [-32, -63], [-50, -61], [-64, -52], 15, 3));
            pts.push(...ellipseEdge(39, -34, 22, 11, 60, 2));
            pts.push(...ellipseEdge(39, -34, 17, 7, 40, 3));
            pts.push(...scatterInEllipse(39, -34, 15, 7, 30));
            pts.push(...ellipseEdge(-39, -34, 22, 11, 60, 2));
            pts.push(...ellipseEdge(-39, -34, 17, 7, 40, 3));
            pts.push(...scatterInEllipse(-39, -34, 15, 7, 30));
            pts.push(...sampleBezier([0, 40], [20, 45], [30, 55], [25, 70], 30, 2));
            pts.push(...sampleBezier([0, 40], [-20, 45], [-30, 55], [-25, 70], 30, 2));
            pts.push(...sampleBezier([-25, 70], [-15, 78], [15, 78], [25, 70], 25, 2));
            pts.push(...sampleBezier([0, 40], [10, 43], [18, 52], [13, 60], 15, 2));
            pts.push(...sampleBezier([0, 40], [-10, 43], [-18, 52], [-13, 60], 15, 2));
            pts.push(...sampleBezier([-13, 60], [0, 65], [0, 65], [13, 60], 12, 2));
            pts.push(...sampleBezier([-5, 85], [-15, 80], [-20, 88], [-5, 95], 20, 2));
            pts.push(...sampleBezier([5, 85], [15, 80], [20, 88], [5, 95], 20, 2));
            pts.push(...sampleBezier([-14, 95], [-6, 100], [6, 100], [14, 95], 12, 2));
            for (let i = 0; i < 200; i++) {
                const fx = (Math.random() - 0.5) * 180;
                const fy = -120 + Math.random() * 280;
                const fw = getFaceWidth(fy);
                if (Math.abs(fx) < fw * 0.75) {
                    pts.push([fx, fy]);
                }
            }
            return pts;
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            centerX = W / 2;
            centerY = H * 0.42;
            scale = Math.min(W / 360, H / 520) * 0.92;
        }

        function createParticle(fx, fy, opts) {
            opts = opts || {};
            const x = centerX + fx * scale;
            const y = centerY + fy * scale;
            const rEyeDist = Math.sqrt((fx-39)*(fx-39) + (fy+34)*(fy+34));
            const lEyeDist = Math.sqrt((fx+39)*(fx+39) + (fy+34)*(fy+34));
            const nearEye = Math.min(rEyeDist, lEyeDist) < 22;
            const eyeDim = nearEye ? 0.6 : 1.0;
            return {
                x, y, homeX: x, homeY: y, faceX: fx, faceY: fy,
                vx: 0, vy: 0,
                size: (opts.size || (0.6 + Math.random() * 1.8)) * (nearEye ? 0.7 : 1.0),
                brightness: (opts.brightness || (0.35 + Math.random() * 0.55)) * eyeDim,
                blueShift: opts.blueShift || (0.05 + Math.random() * 0.45),
                phase: Math.random() * Math.PI * 2,
                driftPhaseX: Math.random() * Math.PI * 2,
                driftPhaseY: Math.random() * Math.PI * 2,
                driftSpeedX: 0.15 + Math.random() * 0.4,
                driftSpeedY: 0.15 + Math.random() * 0.4,
                driftAmpX: 0.3 + Math.random() * 1.2,
                driftAmpY: 0.3 + Math.random() * 1.2,
            };
        }

        function initParticles() {
            particles = [];
            const facePoints = generateFacePoints();
            for (let i = 0; i < facePoints.length; i++) {
                particles.push(createParticle(facePoints[i][0], facePoints[i][1]));
            }
            while (particles.length < 4500) {
                const fx = (Math.random() - 0.5) * 220;
                const fy = -170 + Math.random() * 390;
                const fw = getFaceWidth(fy);
                if (Math.abs(fx) < fw * 0.85) {
                    particles.push(createParticle(fx, fy, {
                        size: 0.5 + Math.random() * 1.2,
                        brightness: 0.2 + Math.random() * 0.35,
                        blueShift: 0.5 + Math.random() * 0.5,
                    }));
                }
            }
            dustParticles = [];
            for (let i = 0; i < 200; i++) {
                dustParticles.push({
                    x: Math.random() * W, y: Math.random() * H,
                    vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2,
                    size: 0.3 + Math.random() * 0.8,
                    alpha: 0.02 + Math.random() * 0.06,
                    phase: Math.random() * Math.PI * 2,
                });
            }
        }

        function updateMouse(e) {
            if (e.clientX !== undefined) {
                mouse.x = e.clientX; mouse.y = e.clientY;
            } else if (e.touches && e.touches.length > 0) {
                mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
            }
        }
        canvas.addEventListener('mousemove', updateMouse);
        canvas.addEventListener('touchmove', function(e) { e.preventDefault(); updateMouse(e); }, { passive: false });
        canvas.addEventListener('mouseleave', function() { mouse.x = -9999; mouse.y = -9999; });
        canvas.addEventListener('touchend', function() { mouse.x = -9999; mouse.y = -9999; });

        let time = 0, lastTime = 0;
        const MOUSE_RADIUS = 90, MOUSE_FORCE = 6, RETURN_FORCE = 0.035, DAMPING = 0.91;

        // Smooth accent color transition
        let currentAccentR = 124, currentAccentG = 158, currentAccentB = 255;

        function animate(timestamp) {
            requestAnimationFrame(animate);
            const dt = lastTime ? Math.min((timestamp - lastTime) / 16.667, 2) : 1;
            lastTime = timestamp;
            time += 0.016 * dt;

            // Read analyser data from internal synth
            if (audioStarted && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                audioAmplitude = (sum / dataArray.length) / 255;
            } else {
                // Idle breathing animation when audio not started
                audioAmplitude = 0.15 + 0.12 * Math.sin(time * 0.7);
            }
            smoothAmplitude += (audioAmplitude - smoothAmplitude) * 0.15;

            // Smooth accent color toward target
            currentAccentR += (accentColor[0] - currentAccentR) * 0.03;
            currentAccentG += (accentColor[1] - currentAccentG) * 0.03;
            currentAccentB += (accentColor[2] - currentAccentB) * 0.03;
            const aR = Math.round(currentAccentR), aG = Math.round(currentAccentG), aB = Math.round(currentAccentB);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            const breathe = 0.75 + 0.25 * Math.sin(time * 0.7);
            const audioPulse = 1 + smoothAmplitude * 1.8;

            // Dust
            for (let i = 0; i < dustParticles.length; i++) {
                const d = dustParticles[i];
                d.x += d.vx * dt; d.y += d.vy * dt;
                if (d.x < -10) d.x = W + 10;
                if (d.x > W + 10) d.x = -10;
                if (d.y < -10) d.y = H + 10;
                if (d.y > H + 10) d.y = -10;
                const flicker = 0.4 + 0.6 * Math.sin(time * 1.5 + d.phase);
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + aR + ',' + aG + ',' + aB + ',' + (d.alpha * flicker).toFixed(4) + ')';
                ctx.fill();
            }

            // Face particles
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                const driftX = Math.sin(time * p.driftSpeedX + p.driftPhaseX) * p.driftAmpX;
                const driftY = Math.cos(time * p.driftSpeedY + p.driftPhaseY) * p.driftAmpY;
                const audioExpand = smoothAmplitude * 0.8;
                const expandX = p.faceX * audioExpand * 0.1;
                const expandY = p.faceY * audioExpand * 0.1;
                const targetX = p.homeX + driftX + expandX;
                const targetY = p.homeY + driftY + expandY;

                const dx = p.x - mouse.x, dy = p.y - mouse.y;
                const distSq = dx * dx + dy * dy;
                if (distSq < MOUSE_RADIUS * MOUSE_RADIUS && distSq > 1) {
                    const dist = Math.sqrt(distSq);
                    const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS * MOUSE_FORCE;
                    p.vx += (dx / dist) * force * dt;
                    p.vy += (dy / dist) * force * dt;
                }

                p.vx += (targetX - p.x) * RETURN_FORCE * dt;
                p.vy += (targetY - p.y) * RETURN_FORCE * dt;
                p.vx *= DAMPING; p.vy *= DAMPING;
                p.x += p.vx * dt; p.y += p.vy * dt;

                // Color follows accent
                const b = p.blueShift;
                const r = Math.round(aR * 0.85 + b * 38);
                const g = Math.round(aG * 0.88 + b * 30);
                const bl = Math.round(aB * 0.90 + b * 25);

                const wave = 0.85 + 0.15 * Math.sin(time * 1.0 + p.phase);
                const alpha = Math.min(1, p.brightness * breathe * wave * audioPulse);
                const s = p.size * (1 + smoothAmplitude * 0.4);

                ctx.beginPath();
                ctx.arc(p.x, p.y, s, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + bl + ',' + alpha.toFixed(3) + ')';
                ctx.fill();
            }

            // Ambient glow — color follows accent
            const glowRadius = 300 * scale;
            const glow = ctx.createRadialGradient(centerX, centerY, 20 * scale, centerX, centerY, glowRadius);
            const ga = (0.012 * audioPulse).toFixed(4);
            glow.addColorStop(0, 'rgba(' + aR + ',' + aG + ',' + aB + ',' + ga + ')');
            glow.addColorStop(0.3, 'rgba(' + Math.round(aR*0.9) + ',' + Math.round(aG*0.9) + ',' + Math.round(aB*0.9) + ',' + (0.009 * audioPulse).toFixed(4) + ')');
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, W, H);
        }

        window.addEventListener('resize', function() {
            resize();
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.homeX = centerX + p.faceX * scale;
                p.homeY = centerY + p.faceY * scale;
            }
            for (let i = 0; i < dustParticles.length; i++) {
                dustParticles[i].x = Math.random() * W;
                dustParticles[i].y = Math.random() * H;
            }
        });

        resize();
        initParticles();
        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
