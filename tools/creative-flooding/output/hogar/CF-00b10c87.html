<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #f8f5f0; color: #2c2c2c;
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; padding: 86px;
    overflow: hidden; position: relative;
  }
  .headline {
    font-size: 59px; font-weight: 900;
    line-height: 1.15; margin-bottom: 32px;
    max-width: 90%;
  }
  .headline .accent { color: #2d6a4f; }
  .body {
    font-size: 30px; color: #6b6b6b;
    line-height: 1.6; margin-bottom: 43px;
    max-width: 85%;
  }
  .cta-wrap {
    display: flex; align-items: center; gap: 21px;
  }
  .cta {
    background: #2d6a4f; color: #f8f5f0;
    padding: 16px 43px;
    border-radius: 50px; font-weight: 700;
    font-size: 27px; letter-spacing: 0.5px;
  }
  .price {
    font-size: 43px; font-weight: 800;
    color: #2d6a4f; margin-left: 21px;
  }
  .offer {
    position: absolute; top: 43px; right: 64px;
    background: #2d6a4f; color: #f8f5f0;
    padding: 12px 27px;
    border-radius: 8px; font-weight: 700;
    font-size: 23px;
    transform: rotate(3deg);
  }
  .brand {
    position: absolute; bottom: 43px; right: 64px;
    font-size: 19px; color: #6b6b6b;
    letter-spacing: 3px; text-transform: uppercase; opacity: 0.5;
  }
  .angle-tag {
    font-size: 17px; color: #2d6a4f;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 21px; font-weight: 600;
  }
  .id-tag {
    position: absolute; bottom: 43px; left: 64px;
    font-size: 15px; color: #6b6b6b; opacity: 0.3;
  }
</style>
</head>
<body>
  <div class="angle-tag">identity</div>
  <div class="headline">Hecho para gente que investiga hogares, visita varios, toma meses para decidir.</div>
  <div class="body">Este no es otro producto generico. Vivienda Asistida 24/7 fue hecho para gente como tu. era la casa de nuestros propios abuelos.</div>
  <div class="cta-wrap">
    <div class="cta">Informacion</div>
    
  </div>
  <div class='offer'>Visita sin compromiso</div>
  <div class="brand">Hogar Ana Gabriel</div>
  <div class="id-tag">CF-00b10c87</div>
</body>
</html>
