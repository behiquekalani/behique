<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0a0a0a; color: #f0f0f0;
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; padding: 86px;
    overflow: hidden; position: relative;
  }
  .headline {
    font-size: 59px; font-weight: 900;
    line-height: 1.15; margin-bottom: 32px;
    max-width: 90%;
  }
  .headline .accent { color: #c8ff00; }
  .body {
    font-size: 30px; color: #888888;
    line-height: 1.6; margin-bottom: 43px;
    max-width: 85%;
  }
  .cta-wrap {
    display: flex; align-items: center; gap: 21px;
  }
  .cta {
    background: #c8ff00; color: #0a0a0a;
    padding: 16px 43px;
    border-radius: 50px; font-weight: 700;
    font-size: 27px; letter-spacing: 0.5px;
  }
  .price {
    font-size: 43px; font-weight: 800;
    color: #c8ff00; margin-left: 21px;
  }
  .offer {
    position: absolute; top: 43px; right: 64px;
    background: #c8ff00; color: #0a0a0a;
    padding: 12px 27px;
    border-radius: 8px; font-weight: 700;
    font-size: 23px;
    transform: rotate(3deg);
  }
  .brand {
    position: absolute; bottom: 43px; right: 64px;
    font-size: 19px; color: #888888;
    letter-spacing: 3px; text-transform: uppercase; opacity: 0.5;
  }
  .angle-tag {
    font-size: 17px; color: #c8ff00;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 21px; font-weight: 600;
  }
  .id-tag {
    position: absolute; bottom: 43px; left: 64px;
    font-size: 15px; color: #888888; opacity: 0.3;
  }
</style>
</head>
<body>
  <div class="angle-tag">before after</div>
  <div class="headline">every course was 40 hours of fluff → Hormozi-style: no fluff, just systems. Asi de simple.</div>
  <div class="body">Antes de Behike OS: every course was 40 hours of fluff. Despues: Hormozi-style: no fluff, just systems. No es magia. Es un sistema.</div>
  <div class="cta-wrap">
    <div class="cta">Get the System</div>
    <div class='price'>$97</div>
  </div>
  <div class='offer'>$4.99 — less than coffee</div>
  <div class="brand">Behike</div>
  <div class="id-tag">CF-3ddf8bdd</div>
</body>
</html>
