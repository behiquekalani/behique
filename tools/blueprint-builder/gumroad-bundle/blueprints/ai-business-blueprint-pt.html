<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPANY Plano de Negócio Vv1.0</title>
    <style>

/* ========================================================================
   BLUEPRINT V2 - CORE STYLES
   ======================================================================== */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #0a0a0a;
    --bg-secondary: #111111;
    --text: #ffffff;
    --text-secondary: #a0a0a0;
    --text-muted: #666666;
    --border: #333333;
    --border-light: #222222;
    --accent: #f0c040;
    --accent-secondary: #d4a017;
    --card-bg: #0f0f0f;
    --nav-bg: rgba(10,10,10,0.95);
    --hover: #1a1a1a;
    --success: #22c55e;
    --info: #3b82f6;
    --font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace;
}

html { scroll-behavior: smooth; font-size: 14px; transition: font-size 0.3s ease; }
html.fs-small { font-size: 12px; }
html.fs-medium { font-size: 14px; }
html.fs-large { font-size: 18px; }
html.fs-xl { font-size: 22px; }

body {
    font-family: var(--font-family);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ---- NAVIGATION ---- */

.bp-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: var(--nav-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 48px;
    display: flex;
    align-items: center;
    gap: 0;
}

.bp-nav-brand {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-right: 1rem;
    white-space: nowrap;
    flex-shrink: 0;
}

.bp-nav-links {
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    flex: 1;
    min-width: 0;
}

.bp-nav-links::-webkit-scrollbar { display: none; }

.bp-nav-link {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 0.85rem 0.6rem;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
}

/* ---- FONT SIZE CONTROLS ---- */

.bp-font-controls {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-left: 0.5rem;
    padding-left: 0.5rem;
    border-left: 1px solid var(--border);
    flex-shrink: 0;
}

.bp-font-controls span {
    font-size: 0.55rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 2px;
}

.bp-font-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 24px;
    height: 24px;
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--font-family);
    font-weight: 600;
    font-size: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.bp-font-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--hover);
}

.bp-font-btn.active {
    border-color: var(--accent);
    color: var(--bg);
    background: var(--accent);
}

.bp-nav-link:hover {
    color: var(--text);
    border-bottom-color: var(--accent);
}

.bp-nav-link.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
}

.bp-nav-version {
    font-size: 0.55rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    font-family: var(--font-mono);
    margin-left: 0.5rem;
    white-space: nowrap;
    flex-shrink: 0;
}

/* ---- MAIN CONTENT ---- */

.bp-main { padding-top: 48px; }

.bp-section {
    padding: 4rem 2rem;
    border-bottom: 1px solid var(--border-light);
    scroll-margin-top: 48px;
}

/* ---- SECTION HEADERS ---- */

.bp-section-header {
    text-align: center;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
}

.bp-section-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
}

.bp-section-name {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 0.5rem;
}

.bp-section-subtitle {
    font-size: 0.8rem;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    max-width: 600px;
    margin: 0 auto;
}

.bp-section-line {
    width: 60px;
    height: 1px;
    background: var(--accent);
    margin: 1.5rem auto 0;
}

/* ---- GRID LAYOUTS ---- */

.bp-grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
}

.bp-grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
}

.bp-grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    max-width: 1400px;
    margin: 0 auto;
}

.bp-grid-6 {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 1rem;
    max-width: 1400px;
    margin: 0 auto;
}

/* ---- CARDS ---- */

.bp-card {
    border: 1px solid var(--border);
    background: var(--card-bg);
    padding: 1.5rem;
    position: relative;
}

.bp-card-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border-light);
}

.bp-card-icon {
    font-size: 1.2rem;
    width: 2rem;
    text-align: center;
    flex-shrink: 0;
}

.bp-card-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-secondary);
}

.bp-card-number {
    font-size: 0.55rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--accent);
    font-family: var(--font-mono);
}

.bp-card-title {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 0.5rem;
}

.bp-card-text {
    font-size: 0.8rem;
    color: var(--text-secondary);
    line-height: 1.7;
}

/* ---- LISTS ---- */

.bp-list {
    list-style: none;
    padding: 0;
}

.bp-list li {
    font-size: 0.8rem;
    color: var(--text-secondary);
    padding: 0.4rem 0;
    padding-left: 1rem;
    position: relative;
    line-height: 1.5;
}

.bp-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.75rem;
    width: 4px;
    height: 4px;
    background: var(--accent);
}

.bp-list-numbered li {
    padding-left: 1.5rem;
    counter-increment: bp-counter;
}

.bp-list-numbered li::before {
    content: counter(bp-counter, decimal-leading-zero);
    background: none;
    width: auto;
    height: auto;
    top: 0.4rem;
    font-size: 0.6rem;
    color: var(--accent);
    font-family: var(--font-mono);
    font-weight: 600;
}

.bp-list-numbered { counter-reset: bp-counter; }

/* ---- KEY-VALUE PAIRS ---- */

.bp-kv {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border-light);
    font-size: 0.8rem;
}

.bp-kv:last-child { border-bottom: none; }

.bp-kv-key {
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 0.65rem;
    font-weight: 600;
}

.bp-kv-value {
    color: var(--text);
    text-align: right;
    font-weight: 500;
}

/* ---- TAGS / BADGES ---- */

.bp-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }

.bp-tag {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    background: var(--bg-secondary);
}

.bp-tag-accent {
    border-color: var(--accent);
    color: var(--accent);
}

/* ---- FLOW DIAGRAM ---- */

.bp-flow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 1.5rem 0;
    flex-wrap: wrap;
}

.bp-flow-node {
    border: 1px solid var(--border);
    padding: 1rem 1.5rem;
    text-align: center;
    min-width: 140px;
    background: var(--card-bg);
    position: relative;
}

.bp-flow-node-label {
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.25rem;
}

.bp-flow-node-title {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
}

.bp-flow-arrow {
    width: 40px;
    height: 1px;
    background: var(--border);
    position: relative;
    flex-shrink: 0;
}

.bp-flow-arrow::after {
    content: '';
    position: absolute;
    right: 0;
    top: -4px;
    width: 0;
    height: 0;
    border-left: 6px solid var(--border);
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
}

.bp-flow-arrow-accent { background: var(--accent); }
.bp-flow-arrow-accent::after { border-left-color: var(--accent); }

/* ---- PHASE TIMELINE ---- */

.bp-phases {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    max-width: 1200px;
    margin: 0 auto 3rem;
    border: 1px solid var(--border);
}

.bp-phase {
    padding: 2rem;
    border-right: 1px solid var(--border);
    position: relative;
}

.bp-phase:last-child { border-right: none; }

.bp-phase-number {
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    font-family: var(--font-mono);
    margin-bottom: 0.75rem;
}

.bp-phase-title {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 0.5rem;
}

.bp-phase-desc {
    font-size: 0.75rem;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 1rem;
}

.bp-phase-timeline {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: var(--font-mono);
}

/* ---- TOOLS GRID ---- */

.bp-tool {
    border: 1px solid var(--border);
    padding: 1rem;
    text-align: center;
    background: var(--card-bg);
    transition: border-color 0.2s;
}

.bp-tool:hover { border-color: var(--accent); }

.bp-tool-icon {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
}

.bp-tool-name {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
}

.bp-tool-category {
    font-size: 0.55rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.25rem;
}

/* ---- DEPARTMENT NAV CARDS ---- */

.bp-dept-card {
    border: 1px solid var(--border);
    padding: 1.5rem;
    background: var(--card-bg);
    text-decoration: none;
    display: block;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
}

.bp-dept-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
}

.bp-dept-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
}

.bp-dept-card:hover::before { opacity: 1; }

.bp-dept-card-icon {
    font-size: 1.5rem;
    margin-bottom: 0.75rem;
}

.bp-dept-card-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 0.5rem;
}

.bp-dept-card-desc {
    font-size: 0.7rem;
    color: var(--text-secondary);
    line-height: 1.6;
}

.bp-dept-card-count {
    font-size: 0.55rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.1em;
    margin-top: 0.75rem;
}

/* ---- DEPARTMENT BLUEPRINT LAYOUT ---- */

.bp-dept-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
}

.bp-dept-col { display: flex; flex-direction: column; gap: 1.5rem; }

/* ---- GROWTH WHEEL ---- */

.bp-wheel {
    width: 500px;
    height: 500px;
    margin: 2rem auto;
    position: relative;
}

.bp-wheel-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 2;
}

.bp-wheel-center-text {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
}

.bp-wheel-spoke {
    position: absolute;
    width: 160px;
    text-align: center;
    z-index: 2;
}

.bp-wheel-spoke-title {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 0.25rem;
}

.bp-wheel-spoke-desc {
    font-size: 0.6rem;
    color: var(--text-secondary);
    line-height: 1.5;
}

.bp-wheel-line {
    position: absolute;
    background: var(--border);
    transform-origin: center center;
    z-index: 1;
}

/* Spoke positions (5 spokes, evenly distributed) */
.bp-wheel-spoke:nth-child(2) { top: -10px; left: 50%; transform: translateX(-50%); }
.bp-wheel-spoke:nth-child(3) { top: 25%; right: -40px; }
.bp-wheel-spoke:nth-child(4) { bottom: 5%; right: -20px; }
.bp-wheel-spoke:nth-child(5) { bottom: 5%; left: -20px; }
.bp-wheel-spoke:nth-child(6) { top: 25%; left: -40px; }

/* Connecting lines */
.bp-wheel-line:nth-child(7) { top: 50%; left: 50%; width: 130px; height: 1px; transform: translateX(-50%) rotate(-90deg) translateY(-65px); }
.bp-wheel-line:nth-child(8) { top: 50%; left: 50%; width: 130px; height: 1px; transform: translateX(-50%) rotate(-18deg) translateY(-65px); }
.bp-wheel-line:nth-child(9) { top: 50%; left: 50%; width: 130px; height: 1px; transform: translateX(-50%) rotate(54deg) translateY(-65px); }
.bp-wheel-line:nth-child(10) { top: 50%; left: 50%; width: 130px; height: 1px; transform: translateX(-50%) rotate(126deg) translateY(-65px); }
.bp-wheel-line:nth-child(11) { top: 50%; left: 50%; width: 130px; height: 1px; transform: translateX(-50%) rotate(198deg) translateY(-65px); }

/* ---- FUNNEL ---- */

.bp-funnel {
    max-width: 700px;
    margin: 2rem auto;
}

.bp-funnel-step {
    border: 1px solid var(--border);
    padding: 1.25rem 2rem;
    margin-bottom: -1px;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: relative;
    background: var(--card-bg);
}

.bp-funnel-step::before {
    content: '';
    position: absolute;
    left: -1px;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
}

.bp-funnel-num {
    font-size: 1.5rem;
    font-weight: 200;
    color: var(--accent);
    font-family: var(--font-mono);
    min-width: 2rem;
}

.bp-funnel-content { flex: 1; }

.bp-funnel-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.15rem;
}

.bp-funnel-text {
    font-size: 0.85rem;
    color: var(--text);
    font-weight: 500;
}

/* ---- ARCHITECTURE DIAGRAM ---- */

.bp-arch {
    max-width: 1000px;
    margin: 2rem auto;
}

.bp-arch-layer {
    border: 1px solid var(--border);
    padding: 1.5rem;
    margin-bottom: 0.75rem;
    position: relative;
}

.bp-arch-layer::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 12px;
    background: var(--border);
}

.bp-arch-layer:last-child::after { display: none; }

.bp-arch-layer-title {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
}

.bp-arch-nodes {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
}

.bp-arch-node {
    border: 1px solid var(--border);
    padding: 0.6rem 1rem;
    font-size: 0.7rem;
    color: var(--text-secondary);
    background: var(--bg);
}

/* ---- STAT BOX ---- */

.bp-stat {
    text-align: center;
    padding: 1.5rem;
    border: 1px solid var(--border);
    background: var(--card-bg);
}

.bp-stat-value {
    font-size: 2rem;
    font-weight: 200;
    color: var(--accent);
    font-family: var(--font-mono);
    margin-bottom: 0.25rem;
}

.bp-stat-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
}

/* ---- SEPARATOR ---- */

.bp-sep {
    border: none;
    border-top: 1px solid var(--border-light);
    margin: 2rem 0;
}

/* ---- CONTAINER ---- */

.bp-container {
    max-width: 1400px;
    margin: 0 auto;
}

/* ---- SECTION LABEL (inline) ---- */

.bp-label {
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.bp-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}

/* ---- FOOTER ---- */

.bp-footer {
    text-align: center;
    padding: 3rem 2rem;
    border-top: 1px solid var(--border);
}

.bp-footer-text {
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
}

.bp-footer-brand {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 0.5rem;
}

/* ---- RESPONSIVE ---- */

@media (max-width: 1200px) {
    .bp-grid-6 { grid-template-columns: repeat(3, 1fr); }
    .bp-dept-layout { grid-template-columns: 1fr; }
}

@media (max-width: 768px) {
    .bp-phases { grid-template-columns: 1fr; }
    .bp-phase { border-right: none; border-bottom: 1px solid var(--border); }
    .bp-phase:last-child { border-bottom: none; }
    .bp-grid-2, .bp-grid-3, .bp-grid-4 { grid-template-columns: 1fr; }
    .bp-nav { padding: 0 0.75rem; }
    .bp-nav-brand { margin-right: 0.5rem; font-size: 0.6rem; }
    .bp-nav-link { padding: 0.85rem 0.4rem; font-size: 0.55rem; }
    .bp-nav-version { display: none; }
    .bp-section { padding: 2rem 1rem; }
    .bp-flow { flex-direction: column; }
    .bp-flow-arrow { width: 1px; height: 30px; }
    .bp-flow-arrow::after {
        right: -4px;
        top: auto;
        bottom: 0;
        border-left: 4px solid transparent;
        border-right: 4px solid transparent;
        border-top: 6px solid var(--border);
        border-bottom: none;
    }
    .bp-wheel { width: 300px; height: 300px; }
}

@media (max-width: 480px) {
    .bp-font-controls span { display: none; }
    .bp-nav-brand { letter-spacing: 0.1em; }
}

/* ---- PRINT ---- */

@media print {
    .bp-nav { display: none; }
    .bp-main { padding-top: 0; }
    .bp-section {
        min-height: auto;
        page-break-after: always;
        page-break-inside: avoid;
        border-bottom: none;
        padding: 1.5rem;
    }
    .bp-section:last-child { page-break-after: auto; }
    body { background: white; color: #1a1a1a; font-size: 10pt; }
    .bp-card, .bp-tool, .bp-dept-card, .bp-flow-node, .bp-arch-node, .bp-funnel-step, .bp-stat {
        border-color: #ccc;
        background: white;
    }
    .bp-section-name, .bp-card-title, .bp-flow-node-title, .bp-dept-card-title { color: #1a1a1a; }
    .bp-nav-link, .bp-tag, .bp-card-text, .bp-list li, .bp-kv-key, .bp-kv-value { color: #333; }
    .bp-accent-print { color: #333 !important; border-color: #333 !important; }
}

:root {
    --bg: #0a0a0a;
    --bg-secondary: #111111;
    --text: #ffffff;
    --text-secondary: #a0a0a0;
    --text-muted: #666666;
    --border: #333333;
    --border-light: #222222;
    --accent: #f0c040;
    --accent-secondary: #d4a017;
    --card-bg: #0f0f0f;
    --nav-bg: rgba(10,10,10,0.95);
    --hover: #1a1a1a;
    --success: #22c55e;
    --info: #3b82f6;
}
    </style>
</head>
<body>

<nav class="bp-nav">
    <span class="bp-nav-brand">COMPANY</span>
    <div class="bp-nav-links"><a class="bp-nav-link" href="#overview">VISÃO GERAL</a></div>
    <div class="bp-font-controls">
        <span>Aa</span>
        <button class="bp-font-btn" data-size="fs-small" title="Texto pequeno">S</button>
        <button class="bp-font-btn active" data-size="fs-medium" title="Texto médio (padrão)">M</button>
        <button class="bp-font-btn" data-size="fs-large" title="Texto grande">L</button>
        <button class="bp-font-btn" data-size="fs-xl" title="Texto extra grande (acessibilidade)">XL</button>
    </div>
    <span class="bp-nav-version">Vv1.0 / MIDNIGHT</span>
</nav>
<main class="bp-main">

<section class="bp-section" id="overview">
    <div class="bp-section-header">
        <div class="bp-section-title">COMPANY</div>
        <div class="bp-section-name">Plano de Negócio</div>
        <div class="bp-section-subtitle">Versão v1.0 / Gerado 2026-03-20</div>
        <div class="bp-section-line"></div>
    </div>
</section>




<footer class="bp-footer">
    <div class="bp-footer-text">GERADO 2026-03-20 18:12 / TEMA: MIDNIGHT</div>
    <div class="bp-footer-brand">COMPANY PLANO Vv1.0</div>
</footer>

</main>
<script>
// Highlight active nav link on scroll
(function() {
    var links = document.querySelectorAll('.bp-nav-link');
    var sections = [];
    links.forEach(function(link) {
        var id = link.getAttribute('href');
        if (id && id.startsWith('#')) {
            var el = document.querySelector(id);
            if (el) sections.push({ el: el, link: link });
        }
    });
    function onScroll() {
        var scrollY = window.scrollY + 100;
        var active = null;
        sections.forEach(function(s) {
            if (s.el.offsetTop <= scrollY) active = s;
        });
        links.forEach(function(l) { l.classList.remove('active'); });
        if (active) active.link.classList.add('active');
    }
    window.addEventListener('scroll', onScroll);
    onScroll();

    // --- Font Size Controls ---
    var fontBtns = document.querySelectorAll('.bp-font-btn');
    fontBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
            var size = this.getAttribute('data-size');
            document.documentElement.className = size;
            fontBtns.forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            try { localStorage.setItem('bp-font-size', size); } catch(e) {}
        });
    });
    // Restore saved font size preference
    try {
        var saved = localStorage.getItem('bp-font-size');
        if (saved) {
            document.documentElement.className = saved;
            fontBtns.forEach(function(b) {
                b.classList.remove('active');
                if (b.getAttribute('data-size') === saved) b.classList.add('active');
            });
        }
    } catch(e) {}
})();
</script>
</body>
