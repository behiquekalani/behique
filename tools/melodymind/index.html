<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MelodyMind - AI Melody Suggestions</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    border-bottom: 1px solid #1a1a2e;
  }

  header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  header h1 span { color: #0066ff; }

  header p {
    color: #777;
    font-size: 0.95rem;
    margin-top: 0.4rem;
  }

  main {
    flex: 1;
    max-width: 960px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .control-group label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    font-weight: 600;
  }

  select, input[type="range"] {
    background: #141420;
    border: 1px solid #2a2a3e;
    color: #e0e0e0;
    padding: 0.55rem 0.7rem;
    border-radius: 6px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus { border-color: #0066ff; }
  select option { background: #141420; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    padding: 0;
    border: none;
    border-radius: 3px;
    background: #2a2a3e;
    cursor: pointer;
    margin-top: 0.6rem;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #0066ff;
    cursor: pointer;
  }

  .range-value {
    font-size: 0.85rem;
    color: #0066ff;
    font-weight: 600;
    min-height: 1.2em;
  }

  .btn-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  button {
    background: #0066ff;
    color: #fff;
    border: none;
    padding: 0.65rem 1.4rem;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  button:hover { background: #0055dd; }
  button:active { transform: scale(0.97); }

  button.secondary {
    background: #1a1a2e;
    border: 1px solid #2a2a3e;
  }

  button.secondary:hover { background: #252540; }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .melodies-container {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .melody-card {
    background: #111118;
    border: 1px solid #1e1e30;
    border-radius: 8px;
    padding: 1rem;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .melody-card:hover { border-color: #0066ff44; }

  .melody-card.selected {
    border-color: #0066ff;
    box-shadow: 0 0 12px #0066ff22;
  }

  .melody-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .melody-card-header h3 {
    font-size: 0.85rem;
    color: #aaa;
    font-weight: 600;
  }

  .melody-card-actions {
    display: flex;
    gap: 0.5rem;
  }

  .melody-card-actions button {
    padding: 0.35rem 0.75rem;
    font-size: 0.78rem;
  }

  .piano-roll {
    position: relative;
    background: #0d0d14;
    border-radius: 4px;
    overflow: hidden;
    height: 160px;
  }

  .piano-roll canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .note-names {
    font-size: 0.82rem;
    color: #777;
    margin-top: 0.6rem;
    word-break: break-all;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #444;
  }

  .empty-state p { font-size: 1rem; }

  footer {
    text-align: center;
    padding: 1.5rem 1rem;
    border-top: 1px solid #1a1a2e;
    color: #444;
    font-size: 0.78rem;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #0066ff;
    color: #fff;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 600px) {
    header h1 { font-size: 1.6rem; }
    .controls { grid-template-columns: 1fr 1fr; }
    .btn-row { flex-direction: column; }
    .btn-row button { width: 100%; }
    .piano-roll { height: 120px; }
  }
</style>
</head>
<body>

<header>
  <h1>Melody<span>Mind</span></h1>
  <p>AI melody suggestions that actually sound musical.</p>
</header>

<main>
  <div class="controls">
    <div class="control-group">
      <label>Key</label>
      <select id="keySelect">
        <option value="0">C</option>
        <option value="1">C# / Db</option>
        <option value="2">D</option>
        <option value="3">D# / Eb</option>
        <option value="4">E</option>
        <option value="5">F</option>
        <option value="6">F# / Gb</option>
        <option value="7">G</option>
        <option value="8">G# / Ab</option>
        <option value="9">A</option>
        <option value="10">A# / Bb</option>
        <option value="11">B</option>
      </select>
    </div>

    <div class="control-group">
      <label>Scale</label>
      <select id="scaleSelect">
        <option value="major">Major</option>
        <option value="minor">Minor</option>
        <option value="pentatonic">Pentatonic</option>
        <option value="blues">Blues</option>
        <option value="dorian">Dorian</option>
      </select>
    </div>

    <div class="control-group">
      <label>Mood</label>
      <select id="moodSelect">
        <option value="happy">Happy</option>
        <option value="sad">Sad</option>
        <option value="dark">Dark</option>
        <option value="chill">Chill</option>
        <option value="epic">Epic</option>
      </select>
    </div>

    <div class="control-group">
      <label>Notes: <span class="range-value" id="noteCountVal">8</span></label>
      <input type="range" id="noteCount" min="4" max="16" value="8">
    </div>

    <div class="control-group">
      <label>Tempo: <span class="range-value" id="tempoVal">120</span> BPM</label>
      <input type="range" id="tempo" min="60" max="200" value="120">
    </div>
  </div>

  <div class="btn-row">
    <button id="generateBtn" onclick="generateMelodies()">Generate Melodies</button>
    <button id="regenBtn" class="secondary" onclick="regenerateMelodies()" disabled>Regenerate</button>
  </div>

  <div id="melodiesContainer" class="melodies-container">
    <div class="empty-state">
      <p>Set your parameters and hit Generate to create melodies.</p>
    </div>
  </div>
</main>

<footer>
  Built by Behike. Part of the FL Studio AI Plugin Suite.
</footer>

<div class="toast" id="toast"></div>

<script>
// ---- Constants & Scale Definitions ----
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const SCALES = {
  major:      [0, 2, 4, 5, 7, 9, 11],
  minor:      [0, 2, 3, 5, 7, 8, 10],
  pentatonic: [0, 2, 4, 7, 9],
  blues:      [0, 3, 5, 6, 7, 10],
  dorian:     [0, 2, 3, 5, 7, 9, 10]
};

let audioCtx = null;
let currentlyPlaying = null;
let melodyData = [];

// ---- UI Bindings ----
const noteCountSlider = document.getElementById('noteCount');
const tempoSlider = document.getElementById('tempo');
const noteCountVal = document.getElementById('noteCountVal');
const tempoVal = document.getElementById('tempoVal');

noteCountSlider.addEventListener('input', () => noteCountVal.textContent = noteCountSlider.value);
tempoSlider.addEventListener('input', () => tempoVal.textContent = tempoSlider.value);

// ---- Utility ----
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[rand(0, arr.length - 1)]; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function midiToName(midi) {
  const octave = Math.floor(midi / 12) - 1;
  return NOTE_NAMES[midi % 12] + octave;
}

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function getScaleNotes(root, scaleType, lo, hi) {
  const intervals = SCALES[scaleType];
  const notes = [];
  for (let midi = lo; midi <= hi; midi++) {
    if (intervals.includes((midi - root + 120) % 12)) notes.push(midi);
  }
  return notes;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ---- Melody Generation Engine ----
function generateMelody(root, scaleType, mood, noteCount) {
  const lo = 48; // C3
  const hi = 84; // C6
  const scaleNotes = getScaleNotes(root, scaleType, lo, hi);
  if (scaleNotes.length === 0) return [];

  // Find root and fifth indices in scale
  const rootNotes = scaleNotes.filter(n => (n - root + 120) % 12 === 0);
  const fifthNotes = scaleNotes.filter(n => (n - root + 120) % 12 === 7);
  const startPool = [...rootNotes, ...fifthNotes].filter(n => n >= 55 && n <= 72);
  const startNote = startPool.length ? pick(startPool) : scaleNotes[Math.floor(scaleNotes.length / 2)];

  const melody = [{ midi: startNote, velocity: 0.7 + Math.random() * 0.25, durationMult: 1 }];

  // Mood configuration
  const moodConfig = {
    happy:  { ascendBias: 0.65, leapChance: 0.25, maxLeap: 4, chromaticChance: 0, sparse: false },
    sad:    { ascendBias: 0.35, leapChance: 0.2,  maxLeap: 3, chromaticChance: 0, sparse: false },
    dark:   { ascendBias: 0.45, leapChance: 0.35, maxLeap: 5, chromaticChance: 0.15, sparse: false },
    chill:  { ascendBias: 0.5,  leapChance: 0.15, maxLeap: 3, chromaticChance: 0, sparse: true },
    epic:   { ascendBias: 0.55, leapChance: 0.4,  maxLeap: 6, chromaticChance: 0.05, sparse: false }
  };

  const cfg = moodConfig[mood] || moodConfig.happy;

  for (let i = 1; i < noteCount; i++) {
    const prev = melody[i - 1].midi;
    const prevIdx = scaleNotes.indexOf(prev);
    let nextMidi;

    // Decide step vs leap
    const isLeap = Math.random() < cfg.leapChance;
    const stepSize = isLeap ? rand(2, cfg.maxLeap) : rand(1, 2);

    // Decide direction
    const progress = i / noteCount;
    let goUp;
    if (progress > 0.7) {
      // Tend toward resolution near end
      const endTarget = pick(rootNotes.filter(n => n >= 55 && n <= 72) || rootNotes);
      goUp = prev < endTarget;
    } else {
      goUp = Math.random() < cfg.ascendBias;
    }

    // Chromatic passing tone (dark mood)
    if (Math.random() < cfg.chromaticChance) {
      nextMidi = prev + (goUp ? 1 : -1);
      // Tritone injection for dark mood
      if (mood === 'dark' && Math.random() < 0.3) {
        nextMidi = prev + 6;
      }
    } else if (prevIdx >= 0) {
      const targetIdx = clamp(prevIdx + (goUp ? stepSize : -stepSize), 0, scaleNotes.length - 1);
      nextMidi = scaleNotes[targetIdx];
    } else {
      // Previous note was chromatic, snap back to scale
      let closest = scaleNotes[0];
      for (const sn of scaleNotes) {
        if (Math.abs(sn - prev) < Math.abs(closest - prev)) closest = sn;
      }
      nextMidi = closest;
    }

    nextMidi = clamp(nextMidi, lo, hi);

    // Velocity humanization
    let vel = 0.55 + Math.random() * 0.35;
    // Emphasize downbeats (every 4th note) for epic
    if (mood === 'epic' && i % 4 === 0) vel = Math.min(1, vel + 0.2);
    // Softer for chill
    if (mood === 'chill') vel *= 0.8;

    // Duration variation
    let durMult = 1;
    if (cfg.sparse && Math.random() < 0.3) durMult = 1.5 + Math.random();
    if (mood === 'epic' && i % 4 === 0) durMult = 1.3;

    melody.push({ midi: nextMidi, velocity: vel, durationMult: durMult });
  }

  // Force last note to root or fifth
  const endPool = [...rootNotes, ...fifthNotes].filter(n => Math.abs(n - melody[melody.length - 1].midi) <= 7);
  if (endPool.length) {
    melody[melody.length - 1].midi = pick(endPool);
  }
  melody[melody.length - 1].durationMult = 1.5;

  return melody;
}

// ---- Generate Multiple Melodies ----
function generateMelodies() {
  const root = parseInt(document.getElementById('keySelect').value);
  const scaleType = document.getElementById('scaleSelect').value;
  const mood = document.getElementById('moodSelect').value;
  const noteCount = parseInt(noteCountSlider.value);
  const bpm = parseInt(tempoSlider.value);

  stopAll();
  melodyData = [];

  for (let i = 0; i < 4; i++) {
    const notes = generateMelody(root, scaleType, mood, noteCount);
    melodyData.push({ notes, bpm, id: i });
  }

  renderMelodies();
  document.getElementById('regenBtn').disabled = false;
}

function regenerateMelodies() {
  generateMelodies();
}

// ---- Rendering ----
function renderMelodies() {
  const container = document.getElementById('melodiesContainer');
  container.innerHTML = '';

  melodyData.forEach((mel, idx) => {
    const card = document.createElement('div');
    card.className = 'melody-card' + (idx === 0 ? ' selected' : '');
    card.dataset.idx = idx;

    const noteStr = mel.notes.map(n => midiToName(n.midi)).join('  ');

    card.innerHTML = `
      <div class="melody-card-header">
        <h3>Melody ${idx + 1}</h3>
        <div class="melody-card-actions">
          <button onclick="event.stopPropagation(); playMelody(${idx})">Play</button>
          <button class="secondary" onclick="event.stopPropagation(); stopAll()">Stop</button>
          <button class="secondary" onclick="event.stopPropagation(); copyNotes(${idx})">Copy</button>
        </div>
      </div>
      <div class="piano-roll"><canvas id="canvas${idx}"></canvas></div>
      <div class="note-names">${noteStr}</div>
    `;

    card.addEventListener('click', () => {
      document.querySelectorAll('.melody-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    });

    container.appendChild(card);
    drawPianoRoll(idx);
  });
}

function drawPianoRoll(idx) {
  const canvas = document.getElementById('canvas' + idx);
  if (!canvas) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width;
  const H = rect.height;

  const notes = melodyData[idx].notes;
  if (!notes.length) return;

  const midis = notes.map(n => n.midi);
  const minMidi = Math.min(...midis) - 2;
  const maxMidi = Math.max(...midis) + 2;
  const range = maxMidi - minMidi || 1;

  const noteW = W / notes.length;
  const noteH = Math.max(4, (H / range) * 0.7);

  // Grid lines
  ctx.strokeStyle = '#1a1a28';
  ctx.lineWidth = 0.5;
  for (let m = minMidi; m <= maxMidi; m++) {
    const y = H - ((m - minMidi) / range) * H;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
    // Black key shading
    if ([1,3,6,8,10].includes(m % 12)) {
      ctx.fillStyle = '#0e0e18';
      ctx.fillRect(0, y - (H / range) / 2, W, H / range);
    }
  }

  // Vertical beat lines
  ctx.strokeStyle = '#1e1e30';
  for (let i = 0; i < notes.length; i++) {
    if (i % 4 === 0) {
      ctx.beginPath();
      ctx.moveTo(i * noteW, 0);
      ctx.lineTo(i * noteW, H);
      ctx.stroke();
    }
  }

  // Notes
  notes.forEach((n, i) => {
    const x = i * noteW + 2;
    const y = H - ((n.midi - minMidi) / range) * H - noteH / 2;
    const w = noteW - 4;

    const alpha = 0.5 + n.velocity * 0.5;
    ctx.fillStyle = `rgba(0, 102, 255, ${alpha})`;
    ctx.beginPath();
    ctx.roundRect(x, y, w, noteH, 2);
    ctx.fill();

    // Bright top edge
    ctx.fillStyle = `rgba(100, 170, 255, ${alpha * 0.5})`;
    ctx.fillRect(x, y, w, 1.5);
  });
}

// ---- Audio Playback ----
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playMelody(idx) {
  stopAll();
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  const mel = melodyData[idx];
  const beatDur = 60 / mel.bpm;
  const now = ctx.currentTime + 0.05;
  const oscNodes = [];

  // Select card
  document.querySelectorAll('.melody-card').forEach(c => c.classList.remove('selected'));
  const cards = document.querySelectorAll('.melody-card');
  if (cards[idx]) cards[idx].classList.add('selected');

  mel.notes.forEach((n, i) => {
    const startTime = now + i * beatDur + (Math.random() - 0.5) * 0.02; // timing humanization
    const dur = beatDur * n.durationMult * 0.85;

    // Oscillator
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(midiToFreq(n.midi), startTime);

    // Gain envelope
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(n.velocity * 0.3, startTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + dur);

    // Filter for warmth
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000 + n.velocity * 2000, startTime);
    filter.Q.setValueAtTime(1, startTime);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);

    osc.start(startTime);
    osc.stop(startTime + dur + 0.05);
    oscNodes.push(osc);
  });

  const totalDur = mel.notes.length * beatDur * 1000 + 500;
  currentlyPlaying = {
    oscs: oscNodes,
    timeout: setTimeout(() => { currentlyPlaying = null; }, totalDur)
  };
}

function stopAll() {
  if (currentlyPlaying) {
    currentlyPlaying.oscs.forEach(o => { try { o.stop(); } catch(e) {} });
    clearTimeout(currentlyPlaying.timeout);
    currentlyPlaying = null;
  }
}

function copyNotes(idx) {
  const noteStr = melodyData[idx].notes.map(n => midiToName(n.midi)).join(' ');
  navigator.clipboard.writeText(noteStr).then(() => {
    showToast('Notes copied to clipboard');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = noteStr;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Notes copied to clipboard');
  });
}

// Redraw on resize
window.addEventListener('resize', () => {
  melodyData.forEach((_, idx) => drawPianoRoll(idx));
});
</script>

</body>
</html>
